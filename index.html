<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">

<link rel="apple-touch-icon" href="icon-180.png">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --paper:#f4f3ef; --card:#fbfaf6; --muted:#ebe9e2; --ink:#131311; --sub:#6b6b66; --faint:#9a988f;
  --line:rgba(19,19,17,.08); --line-soft:rgba(19,19,17,.06);
  --accent:#ff5a36; --on-accent:#ffffff;
  --sans:'Inter',-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  --mono:'IBM Plex Mono',"Hiragino Kaku Gothic ProN",ui-monospace,monospace;
}
@media (prefers-color-scheme: dark){
  :root{ --paper:#141412; --card:#1d1c19; --muted:#282722; --ink:#f4f3ef; --sub:#a5a299; --faint:#6e6c64;
    --line:rgba(244,243,239,.1); --line-soft:rgba(244,243,239,.07); }
}
:root[data-theme="light"]{ --paper:#f4f3ef; --card:#fbfaf6; --muted:#ebe9e2; --ink:#131311; --sub:#6b6b66; --faint:#9a988f;
  --line:rgba(19,19,17,.08); --line-soft:rgba(19,19,17,.06); }
:root[data-theme="dark"]{ --paper:#141412; --card:#1d1c19; --muted:#282722; --ink:#f4f3ef; --sub:#a5a299; --faint:#6e6c64;
  --line:rgba(244,243,239,.1); --line-soft:rgba(244,243,239,.07); }
*{ box-sizing:border-box; }
body{ margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased; }
main{ max-width:560px; margin:0 auto; padding:14px 16px 60px; }
header.app{ position:relative; text-align:center; padding:2px 0 8px; }
#menu{ position:absolute; top:2px; right:0; width:40px; height:40px; display:flex; align-items:center; justify-content:center; background:none; border:none; color:var(--ink); cursor:pointer; }
#menu:active{ transform:scale(.95); }
#logo{ width:172px; max-width:56%; height:auto; display:inline-block; padding:6px 14px; border-radius:22px; }
@media (prefers-color-scheme: dark){ #logo{ background:#f4f3ef; } }
:root[data-theme="dark"] #logo{ background:#f4f3ef; }
:root[data-theme="light"] #logo{ background:none; }
#net{ display:none; font-size:12px; color:var(--accent); border:1px solid var(--line); background:var(--card); border-radius:12px; padding:10px 14px; margin-bottom:10px; }
#net.on{ display:block; }
#toast{ position:fixed; left:50%; bottom:28px; transform:translateX(-50%); background:var(--ink); color:var(--paper); font-size:13px; padding:10px 18px; border-radius:999px; opacity:0; transition:opacity .25s; pointer-events:none; z-index:40; max-width:86vw; }
#toast.on{ opacity:1; }
.banner{ font-size:13px; color:var(--sub); background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px 14px; margin-top:10px; line-height:1.8; }
.banner button{ background:var(--muted); border:none; color:var(--ink); border-radius:6px; padding:5px 12px; font-size:12px; font-family:var(--sans); font-weight:500; cursor:pointer; margin-right:6px; }
.banner button.acc{ background:var(--ink); color:var(--paper); }
.ptext{ font-size:12px; color:var(--sub); background:var(--paper); border:1px solid var(--line-soft); border-radius:8px; padding:8px 10px; margin:8px 0; white-space:pre-wrap; word-break:break-all; line-height:1.7; }
#bento{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
.bcard{ border-radius:16px; padding:14px 16px; min-height:82px; display:flex; align-items:center; justify-content:space-between; }
.bcard.dark{ background:var(--ink); color:var(--paper); }
.bcard.hot{ background:var(--accent); color:var(--on-accent); }
.blabel{ font-size:13px; font-weight:600; }
.bnum{ display:flex; align-items:baseline; gap:3px; }
.bbig{ font-size:34px; font-weight:700; letter-spacing:-0.03em; line-height:1; }
.bunit{ font-size:13px; font-weight:500; opacity:.85; }
#recbtn{ width:100%; display:flex; align-items:center; justify-content:center; gap:8px; background:var(--muted); border:none; color:var(--ink); border-radius:16px; padding:16px; font-size:15px; font-weight:600; font-family:var(--sans); cursor:pointer; margin-bottom:4px; }
#recbtn:active{ transform:scale(.99); }
#recbtn .plus{ width:24px; height:24px; border-radius:50%; background:var(--ink); color:var(--paper); display:flex; align-items:center; justify-content:center; font-size:16px; }
#filterwrap{ position:relative; margin-top:14px; }
#filter{ display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; padding-right:26px; scroll-behavior:smooth; }
#filter::-webkit-scrollbar{ display:none; }
.chip{ display:flex; align-items:center; gap:6px; flex:none; background:var(--card); border:1px solid var(--line); color:var(--sub); border-radius:999px; padding:6px 13px; font-size:12px; font-weight:500; font-family:var(--sans); cursor:pointer; }
.chip.on{ background:var(--ink); border-color:var(--ink); color:var(--paper); }
.dot{ display:inline-block; width:8px; height:8px; border-radius:50%; flex:none; }
#filtnext{ position:absolute; right:0; top:0; bottom:0; width:26px; display:flex; align-items:center; justify-content:flex-end; background:linear-gradient(90deg, transparent, var(--paper) 55%); border:none; color:var(--sub); cursor:pointer; }
#monthback{ display:none; align-items:center; gap:8px; font-size:12px; color:var(--sub); margin-top:12px; }
#monthback.on{ display:flex; }
#monthback button{ background:var(--muted); border:none; color:var(--ink); border-radius:8px; padding:6px 12px; font-size:12px; font-weight:500; font-family:var(--sans); cursor:pointer; }
.sect{ margin-top:20px; }
.sect>.head{ display:flex; align-items:center; gap:8px; padding:0 2px 10px; }
.sect .stitle{ font-size:14px; font-weight:600; display:flex; align-items:center; gap:7px; }
.sect .stitle .mk{ width:7px; height:7px; border-radius:50%; background:var(--ink); flex:none; }
.sect .scount{ font-family:var(--mono); font-size:12px; color:var(--ink); }
.sect .scount b{ color:var(--accent); font-weight:600; }
.mkimg{ margin-left:auto; background:none; border:none; color:var(--faint); cursor:pointer; display:flex; align-items:center; gap:4px; font-family:var(--mono); font-size:10px; letter-spacing:.05em; }
.mkimg:active{ transform:scale(.96); }
.grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px 14px; }
.gcard{ min-width:0; }
.gcard.mine .cvwrap{ cursor:pointer; }
.cvwrap{ position:relative; aspect-ratio:1/1; border-radius:12px; overflow:hidden; background:var(--muted); border:1px solid var(--line); }
.cvwrap img{ width:100%; height:100%; object-fit:contain; display:block; }
.cvwrap .noimg{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--faint); font-family:var(--mono); font-size:15px; font-weight:500; letter-spacing:.1em; text-align:center; line-height:1.5; }
.sharebtn{ position:absolute; top:8px; right:8px; width:30px; height:30px; border-radius:9px; background:rgba(251,250,246,.92); border:1px solid var(--line); color:var(--ink); display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0; }
:root[data-theme="dark"] .sharebtn{ background:rgba(29,28,25,.92); }
@media (prefers-color-scheme: dark){ .sharebtn{ background:rgba(29,28,25,.92); } }
.sharebtn:active{ transform:scale(.92); }
.gg{ font-size:10.5px; color:var(--sub); margin-top:9px; }
.gt{ font-size:13.5px; font-weight:600; line-height:1.4; letter-spacing:-0.01em; margin-top:3px; }
.gm{ display:flex; align-items:center; flex-wrap:wrap; gap:6px; margin-top:6px; font-size:11px; color:var(--sub); }
.gm .d{ font-family:var(--mono); font-size:10px; color:var(--faint); }
.pill{ font-family:var(--mono); font-size:9px; letter-spacing:.08em; padding:2px 7px; border-radius:4px; font-weight:500; }
.rstars{ color:var(--accent); font-size:10px; letter-spacing:1px; }
.gnote{ font-size:11.5px; color:var(--sub); margin-top:5px; line-height:1.65; }
.blink{ display:inline-block; margin-top:5px; color:var(--accent); font-size:11px; text-decoration:none; border-bottom:1px solid var(--accent); }
.fin1{ margin-top:8px; background:none; border:1px solid var(--accent); color:var(--accent); border-radius:8px; padding:5px 12px; font-size:11px; font-weight:600; font-family:var(--sans); cursor:pointer; }
.fin1:active{ transform:scale(.98); }
.empty{ text-align:center; color:var(--sub); font-size:13px; padding:44px 10px; line-height:2; }
.empty .big{ font-size:16px; font-weight:600; color:var(--ink); letter-spacing:-0.02em; }
footer.app{ margin-top:40px; text-align:center; }
footer.app button{ background:none; border:none; color:var(--faint); font-family:var(--mono); font-size:10px; letter-spacing:.12em; cursor:pointer; padding:4px 6px; }
/* edit card (spans grid) */
.ecard{ grid-column:1/-1; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; }
.ecard input[type="text"]{ width:100%; border:none; border-bottom:1px solid var(--line); background:none; color:var(--ink); padding:8px 2px; font-size:14px; font-family:var(--sans); outline:none; border-radius:0; }
.ecard input[type="text"]:focus{ border-bottom-color:var(--accent); }
.ecard .es{ margin-top:8px; }
.ecard .row{ display:flex; align-items:center; gap:8px; margin-top:12px; flex-wrap:wrap; }
.ecard .row input[type="date"]{ border:1px solid var(--line); background:none; color:var(--sub); border-radius:8px; padding:6px 8px; font-size:12px; font-family:var(--mono); color-scheme:light dark; }
.es{ display:flex; gap:2px; }
.estar{ background:none; border:none; font-size:22px; line-height:1; color:var(--faint); cursor:pointer; padding:2px; }
.estar.on{ color:var(--accent); }
.btn{ background:var(--muted); border:none; color:var(--ink); border-radius:8px; padding:8px 14px; font-size:12.5px; font-weight:500; font-family:var(--sans); cursor:pointer; }
.btn:active{ transform:scale(.98); }
.btn.save{ background:var(--ink); color:var(--paper); }
.btn.del{ margin-left:auto; background:none; color:var(--faint); }
/* modals */
.modal{ position:fixed; inset:0; background:rgba(19,19,17,.5); display:none; z-index:30; }
.modal.on{ display:flex; }
#overlay, #pick, #entrymodal{ align-items:center; justify-content:center; padding:20px; }
#sheet, #picksheet, #esheet{ background:var(--card); border-radius:18px; padding:16px; max-width:440px; width:100%; max-height:92vh; overflow:auto; }
#shot{ width:100%; border-radius:10px; display:block; }
#sheet .hint{ font-size:12px; color:var(--sub); margin:10px 2px; line-height:1.7; }
#sheet .row{ display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; }
.mhead{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.mhead span{ font-size:16px; font-weight:600; }
.xbtn{ width:30px; height:30px; border-radius:8px; background:var(--muted); border:none; color:var(--ink); font-size:14px; cursor:pointer; }
#esheet input#title{ font-size:16px; font-weight:500; }
#esheet input#note{ font-size:15px; }
.ncount{ text-align:right; font-family:var(--mono); font-size:10px; color:var(--faint); margin-top:2px; }
.isbnrow{ display:flex; align-items:center; gap:10px; margin-top:6px; }
.isbnrow input{ width:150px; flex:none; font-size:13px !important; font-family:var(--mono); }
#isbnst{ font-size:11px; color:var(--sub); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#esheet input#link{ font-size:12px !important; margin-top:6px; }
.starsrow{ display:flex; align-items:center; gap:10px; margin-top:12px; }
.starsrow .lbl{ font-size:12px; color:var(--sub); }
.datebtns{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:14px; }
.datebtns label{ font-size:12px; color:var(--sub); }
.datebtns input[type="date"]{ border:1px solid var(--line); background:none; color:var(--sub); border-radius:8px; padding:7px 8px; font-size:13px; font-family:var(--mono); color-scheme:light dark; }
.datebtns .acts{ display:flex; gap:8px; }
#want{ background:var(--muted); border:none; color:var(--ink); border-radius:10px; padding:11px 16px; font-size:14px; font-weight:600; font-family:var(--sans); cursor:pointer; white-space:nowrap; }
#add{ background:var(--ink); color:var(--paper); border:none; border-radius:10px; padding:11px 20px; font-size:14px; font-weight:600; font-family:var(--sans); cursor:pointer; white-space:nowrap; }
#want:active, #add:active{ transform:scale(.98); }
#want:disabled, #add:disabled{ opacity:.5; }
#esheet input#title{ width:100%; }
#esheet > #esheet-form input[type="text"]{ width:100%; border:none; border-bottom:1px solid var(--line); background:none; color:var(--ink); padding:9px 2px; font-family:var(--sans); outline:none; border-radius:0; }
#esheet input[type="text"]{ width:100%; border:none; border-bottom:1px solid var(--line); background:none; color:var(--ink); padding:9px 2px; font-family:var(--sans); outline:none; border-radius:0; }
#esheet input[type="text"]:focus{ border-bottom-color:var(--accent); }
#sugg{ display:none; background:var(--paper); border:1px solid var(--line); border-radius:12px; margin-top:6px; overflow:hidden; }
#sugg.on{ display:block; }
.sg{ display:block; width:100%; text-align:left; background:none; border:none; border-top:1px solid var(--line-soft); padding:10px 12px; cursor:pointer; font-family:var(--sans); }
.sg:first-child{ border-top:none; }
.sg:active{ background:var(--muted); }
.sg .st{ font-size:13px; font-weight:600; color:var(--ink); line-height:1.4; }
.sg .sa{ font-size:11px; color:var(--sub); margin-top:2px; }
/* pick */
#picksheet h2{ font-size:17px; font-weight:600; letter-spacing:-0.02em; margin:6px 4px 4px; }
#picksheet .lead{ font-size:12px; color:var(--sub); margin:0 4px 14px; }
#members{ display:flex; flex-direction:column; gap:8px; }
.mem{ display:flex; align-items:center; gap:10px; background:var(--paper); border:1px solid var(--line); color:var(--ink); border-radius:12px; padding:12px 14px; font-size:14px; font-weight:500; font-family:var(--sans); cursor:pointer; text-align:left; }
.mem:active{ transform:scale(.99); }
#picksheet .newrow{ display:flex; gap:8px; margin-top:16px; padding-top:14px; border-top:1px solid var(--line); }
#newname{ flex:1; min-width:0; border:none; border-bottom:1px solid var(--line); background:none; color:var(--ink); padding:8px 2px; font-size:14px; font-family:var(--sans); outline:none; border-radius:0; }
#picksheet .foot{ display:flex; justify-content:flex-end; gap:8px; margin-top:12px; }
#pickmsg{ font-size:12px; color:var(--accent); margin:0 4px 12px; }
/* drawer */
#drawer{ justify-content:flex-end; }
#dsheet{ background:var(--card); width:82%; max-width:340px; height:100%; padding:18px 16px; overflow:auto; }
#drawer .mhead{ margin-bottom:16px; }
.dsect{ margin-bottom:22px; }
.dlabel{ font-family:var(--mono); font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--faint); margin-bottom:8px; }
#dwho{ display:flex; align-items:center; gap:9px; width:100%; background:var(--paper); border:1px solid var(--line); color:var(--ink); border-radius:12px; padding:12px 14px; font-size:14px; font-weight:500; font-family:var(--sans); cursor:pointer; text-align:left; }
#dmonths{ display:flex; flex-direction:column; gap:2px; }
.mrow{ display:flex; align-items:center; justify-content:space-between; width:100%; background:none; border:none; color:var(--ink); border-radius:10px; padding:11px 8px; font-size:14px; font-family:var(--sans); cursor:pointer; text-align:left; border-bottom:1px solid var(--line-soft); }
.mrow:last-child{ border-bottom:none; }
.mrow.on{ color:var(--accent); font-weight:600; }
.mrow .mc{ font-family:var(--mono); font-size:12px; color:var(--faint); }
</style>
</head>
<body>
<main>

<script>
(function(){
'use strict';
var DB_URL='https://lkctqbrpifyyofkcippj.supabase.co';
var DB_KEY='sb_publishable_YLr0hTxmAOmE6ebF6-rS7A_LUKzdr7z';
var TAG='#waУфГТЏИжЃе';
var CLUB='сЂѓсЂѕсѓІУфГТЏИжЃе';
var APP_URL='https://lachimym.github.io/dokusho-log/';
var DISP="'Inter','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif";
var SANS="'Inter','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif";
var MONO="'IBM Plex Mono','Hiragino Kaku Gothic ProN',monospace";
var NOTE_MAX=80;

var state={me:'', members:[], books:[], editing:null, filter:'*', viewMonth:null};

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
var toastTimer=null;
function toast(msg){
  var t=$('toast');
  t.textContent=msg;
  t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ t.classList.remove('on'); }, 2600);
}
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function today(){
  var n=new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}
function md(iso){ var p=iso.split('-'); return (+p[1])+'/'+(+p[2]); }
function ymLabel(ym){ var p=ym.split('-'); return (+p[0])+'т╣┤'+(+p[1])+'Тюѕ'; }
function ymDot(ym){ var p=ym.split('-'); return (+p[0])+'.'+(+p[1]); }

var MEMCOL=[['#ff5a36','#ffffff'],['#8e6cff','#ffffff'],['#2456f0','#ffffff'],['#d4ff52','#131311']];
function memCol(name){
  var i=state.members.indexOf(name);
  if(i<0) i=0;
  return MEMCOL[i%MEMCOL.length];
}

function api(path, opts){
  opts=opts||{};
  opts.headers=Object.assign({
    'apikey':DB_KEY,
    'Authorization':'Bearer '+DB_KEY,
    'Content-Type':'application/json',
    'Prefer':'return=representation'
  }, opts.headers||{});
  return fetch(DB_URL+'/rest/v1/'+path, opts).then(function(r){
    if(r.status===204) return null;
    if(!r.ok) return r.json().catch(function(){ return {}; }).then(function(e){ var err=new Error('api '+r.status); err.status=r.status; err.body=e; throw err; });
    return r.json();
  });
}
function normBook(b){ b.desc=b.description||''; b.status=b.status||'read'; b.rating=+(b.rating||0); b.link=b.link||''; b.genre=b.genre||''; return b; }
function loadAll(){
  return Promise.all([
    api('members?select=name&order=name.asc'),
    api('books?select=*&order=date.desc,created_at.desc&limit=2000')
  ]).then(function(rs){
    state.members=rs[0].map(function(m){ return m.name; });
    state.books=rs[1].map(normBook);
    lsSet('yonda-cache-v1', JSON.stringify({members:state.members, books:state.books}));
    $('net').classList.remove('on');
  });
}
function netFail(){
  $('net').textContent='сЃЇсЃЃсЃѕсЂФсЂцсЂфсЂїсѓісЂЙсЂЏсѓЊсЂДсЂЌсЂЪсђѓУАеуц║сЂ»тЅЇтЏъсЂ«тєЁт«╣сЂДсЂЎсђѓжЏ╗Т│бсЂ«УЅ»сЂёсЂесЂЊсѓЇсЂДжќІсЂЇуЏ┤сЂЌсЂдсЂЈсЂасЂЋсЂёсђѓ';
  $('net').classList.add('on');
}

function starsHtml(v){
  var h='';
  for(var i=1;i<=5;i++){ h+='<button type="button" class="estar'+(i<=v?' on':'')+'" data-n="'+i+'">РўЁ</button>'; }
  return h;
}

function cardHtml(b){
  if(state.editing===b.id){
    return '<div class="ecard" data-id="'+b.id+'">'+
      '<input type="text" class="et" value="'+esc(b.title)+'">'+
      '<input type="text" class="en" placeholder="сЂ▓сЂесЂЊсЂе" maxlength="'+NOTE_MAX+'" value="'+esc(b.note||'')+'">'+
      '<input type="text" class="ei" placeholder="ISBN№╝ѕтЁЦсѓїсѓІсЂеУАеу┤ЎсЃ╗у┤╣С╗ІТќЄсЃ╗сѓИсЃБсЃ│сЃФсѓњтЈќтЙЌ№╝Ѕ" value="'+esc(b.isbn||'')+'">'+
      '<input type="text" class="eg" placeholder="сѓИсЃБсЃ│сЃФ№╝ѕУЄфтІЋсЃ╗ТЅІуЏ┤сЂЌOK№╝Ѕ" value="'+esc(b.genre||'')+'">'+
      '<input type="text" class="el" placeholder="сЃфсЃ│сѓ»№╝ѕС╗╗ТёЈ№╝Ѕ" value="'+esc(b.link||'')+'">'+
      '<div class="es" data-v="'+(b.rating||0)+'">'+starsHtml(b.rating||0)+'</div>'+
      '<div class="row"><input type="date" class="ed" value="'+b.date+'">'+
      '<button class="btn save" data-act="save">С┐ЮтГў</button>'+
      '<button class="btn" data-act="cancel">сѓёсѓЂсѓІ</button>'+
      '<button class="btn del" data-act="del">тЅіжЎц</button></div></div>';
  }
  var mine=b.member===state.me;
  var c=memCol(b.member);
  var isWant=b.status==='want';
  var shareSvg='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><path d="M12 3v13"/><path d="M8 7l4-4 4 4"/></svg>';
  return '<div class="gcard'+(mine?' mine':'')+'" data-id="'+b.id+'">'+
    '<div class="cvwrap">'+
      (b.cover?'<img class="cv" src="'+esc(b.cover)+'" alt="" loading="lazy">':'<span class="noimg">NO<br>IMAGE</span>')+
      '<button class="sharebtn" aria-label="сѓисѓДсѓб">'+shareSvg+'</button>'+
    '</div>'+
    (b.genre?'<div class="gg">'+esc(b.genre)+'</div>':'')+
    '<div class="gt">'+esc(b.title)+'</div>'+
    '<div class="gm"><span class="pill" style="background:'+c[0]+';color:'+c[1]+'">'+esc(b.member)+'</span>'+
    (isWant?'':'<span class="d">'+md(b.date)+'</span>')+
    (b.rating?'<span class="rstars">'+'РўЁРўЁРўЁРўЁРўЁ'.slice(0,b.rating)+'</span>':'')+'</div>'+
    (b.note?'<div class="gnote">'+esc(b.note)+'</div>':'')+
    (b.link?'<a class="blink" href="'+esc(b.link)+'" target="_blank" rel="noopener">сЃфсЃ│сѓ»РєЌ</a>':'')+
    (isWant&&mine?'<div><button class="fin1">УфГС║єсЂФсЂЎсѓІ</button></div>':'')+
    '</div>';
}

function render(){
  var nowYm=today().slice(0,7), nowY=today().slice(0,4);
  var clubM=state.books.filter(function(b){ return b.status!=='want'&&b.date.slice(0,7)===nowYm; }).length;
  var clubY=state.books.filter(function(b){ return b.status!=='want'&&b.date.slice(0,4)===nowY; }).length;
  $('bento').innerHTML=
    '<div class="bcard dark"><span class="blabel">С╗іТюѕ</span><span class="bnum"><span class="bbig">'+clubM+'</span><span class="bunit">тєі</span></span></div>'+
    '<div class="bcard hot"><span class="blabel">С╗іт╣┤</span><span class="bnum"><span class="bbig">'+clubY+'</span><span class="bunit">тєі</span></span></div>';

  var f=$('filter');
  if(state.members.length){
    var chips='<button class="chip'+(state.filter==='*'?' on':'')+'" data-f="*">ALL</button>';
    state.members.forEach(function(m){
      var c=memCol(m);
      chips+='<button class="chip'+(state.filter===m?' on':'')+'" data-f="'+esc(m)+'"><span class="dot" style="background:'+c[0]+'"></span>'+esc(m)+'</button>';
    });
    f.innerHTML=chips;
  }else{ f.innerHTML=''; }

  var viewingPast=!!state.viewMonth && state.viewMonth!==nowYm;
  var mb=$('monthback');
  if(viewingPast){ mb.classList.add('on'); $('mbnow').textContent=ymLabel(state.viewMonth)+'сѓњУАеуц║СИГ'; }
  else{ mb.classList.remove('on'); }

  var shelf=$('shelf');
  var byMember=state.books.filter(function(b){ return state.filter==='*'||b.member===state.filter; });
  var html='';

  if(!viewingPast){
    var wants=byMember.filter(function(b){ return b.status==='want'; });
    if(wants.length){
      html+='<section class="sect"><div class="head"><span class="stitle"><span class="mk"></span>УфГсЂ┐сЂЪсЂё</span></div><div class="grid">';
      wants.forEach(function(b){ html+=cardHtml(b); });
      html+='</div></section>';
    }
  }

  var targetYm=viewingPast?state.viewMonth:nowYm;
  var reads=byMember.filter(function(b){ return b.status!=='want'&&b.date.slice(0,7)===targetYm; })
    .sort(function(a,b){ return a.date<b.date?1:-1; });
  html+='<section class="sect"><div class="head"><span class="stitle"><span class="mk"></span>'+ymDot(targetYm)+'</span>'+
    '<span class="scount"><b>'+reads.length+'</b>тєі</span>'+
    '<button class="mkimg" data-ym="'+targetYm+'"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 15l4-4 5 5"/><circle cx="9" cy="9" r="1.5"/></svg>сЂЙсЂесѓЂућ╗тЃЈ</button></div>';
  if(reads.length){
    html+='<div class="grid">';
    reads.forEach(function(b){ html+=cardHtml(b); });
    html+='</div>';
  }else{
    html+='<div class="empty"><div class="big">сЂЙсЂаУеўжї▓сЂїсЂѓсѓісЂЙсЂЏсѓЊ</div>сђї№╝ІУеўжї▓сЂЎсѓІсђЇсЂІсѓЅТюђтѕЮсЂ«1тєісѓњсЂЕсЂєсЂъсђѓ</div>';
  }
  html+='</section>';
  shelf.innerHTML=html;
}

function fmtDrawer(){
  var who=state.me||'сѓ▓сѓ╣сЃѕ№╝ѕУдІсѓІсЂасЂЉ№╝Ѕ';
  var c=memCol(state.me);
  $('dwho').innerHTML=(state.me?'<span class="dot" style="background:'+c[0]+'"></span>':'')+esc(who)+'сђђ<span style="color:var(--faint);margin-left:auto">тѕЄТЏ┐ РќЙ</span>';
  var nowYm=today().slice(0,7);
  var groups={};
  state.books.forEach(function(b){ if(b.status!=='want'){ var ym=b.date.slice(0,7); groups[ym]=(groups[ym]||0)+1; } });
  var yms=Object.keys(groups).sort().reverse();
  var html='<button class="mrow'+((!state.viewMonth||state.viewMonth===nowYm)?' on':'')+'" data-ym="__now"><span>С╗іТюѕ</span><span class="mc">'+(groups[nowYm]||0)+'тєі</span></button>';
  yms.forEach(function(ym){
    if(ym===nowYm) return;
    html+='<button class="mrow'+(state.viewMonth===ym?' on':'')+'" data-ym="'+ym+'"><span>'+ymLabel(ym)+'</span><span class="mc">'+groups[ym]+'тєі</span></button>';
  });
  $('dmonths').innerHTML=html;
}
function openDrawer(){ fmtDrawer(); $('drawer').classList.add('on'); }
$('menu').addEventListener('click', openDrawer);
$('dclose').addEventListener('click', function(){ $('drawer').classList.remove('on'); });
$('drawer').addEventListener('click', function(e){
  if(e.target===$('drawer')){ $('drawer').classList.remove('on'); return; }
  var mr=e.target.closest('.mrow');
  if(mr){
    var ym=mr.getAttribute('data-ym');
    state.viewMonth=(ym==='__now')?null:ym;
    $('drawer').classList.remove('on');
    render();
    window.scrollTo(0,0);
    return;
  }
  if(e.target.closest('#dwho')){ $('drawer').classList.remove('on'); openPick(); }
});
$('tonow').addEventListener('click', function(){ state.viewMonth=null; render(); });

/* filter scroll */
$('filtnext').addEventListener('click', function(){ $('filter').scrollBy({left:160,behavior:'smooth'}); });
$('filter').addEventListener('click', function(e){
  var c=e.target.closest('.chip');
  if(!c) return;
  state.filter=c.getAttribute('data-f');
  render();
});

/* record modal */
function openEntry(){
  if(!state.me){ openPick('Уеўжї▓сЂЎсѓІсЂФсЂ»тљЇтЅЇсЂїт┐ЁУдЂсЂДсЂЎсђѓжЂИсЂХсЂІсђЂСИІсЂ«ТгёсЂДУ┐йтіасЂЌсЂдсЂЈсЂасЂЋсЂёсђѓ'); return; }
  $('entrymodal').classList.add('on');
  setTimeout(function(){ $('title').focus(); }, 50);
}
function closeEntry(){ $('entrymodal').classList.remove('on'); hideSugg(); }
$('recbtn').addEventListener('click', openEntry);
$('ecancel').addEventListener('click', closeEntry);
$('entrymodal').addEventListener('click', function(e){ if(e.target===$('entrymodal')) closeEntry(); });

function renderPick(){
  var box=$('members');
  box.innerHTML=state.members.map(function(m){
    var c=memCol(m);
    return '<button class="mem" data-m="'+esc(m)+'"><span class="dot" style="background:'+c[0]+'"></span>'+esc(m)+(m===state.me?'сђђРюЊ':'')+'</button>';
  }).join('')||'<div style="font-size:13px;color:var(--sub);">сЂЙсЂажЃетЊАсЂїсЂёсЂЙсЂЏсѓЊсђѓСИІсЂДТюђтѕЮсЂ«жЃетЊАсѓњУ┐йтіасЂЌсЂдсЂЈсЂасЂЋсЂёсђѓ</div>';
  $('pickclose').hidden=!state.me;
  $('guest').hidden=!!state.me;
}
function openPick(msg){
  renderPick();
  var pm=$('pickmsg');
  if(msg){ pm.textContent=msg; pm.hidden=false; }
  else{ pm.hidden=true; }
  $('pick').classList.add('on');
}
$('pick').addEventListener('click', function(e){
  var mb=e.target.closest('.mem');
  if(mb){
    state.me=mb.getAttribute('data-m');
    lsSet('yonda-me', state.me);
    lsSet('yonda-guest','');
    $('pick').classList.remove('on');
    render(); checkMigrate();
    return;
  }
  if(e.target===$('pick')&&(state.me||lsGet('yonda-guest'))){ $('pick').classList.remove('on'); }
});
$('pickclose').addEventListener('click', function(){ $('pick').classList.remove('on'); });
$('guest').addEventListener('click', function(){
  lsSet('yonda-guest','1');
  $('pick').classList.remove('on');
  render();
});
$('addmem').addEventListener('click', function(){
  var n=$('newname').value.trim();
  if(!n) return;
  if(state.members.indexOf(n)>=0){
    state.me=n; lsSet('yonda-me', n);
    $('pick').classList.remove('on'); render(); checkMigrate(); return;
  }
  api('members', {method:'POST', body:JSON.stringify({name:n})})
    .then(function(){
      state.members.push(n); state.members.sort();
      state.me=n; lsSet('yonda-me', n);
      lsSet('yonda-guest','');
      $('newname').value='';
      $('pick').classList.remove('on');
      render(); checkMigrate();
    })
    .catch(function(e){
      if(e.status===409){
        state.me=n; lsSet('yonda-me', n);
        $('pick').classList.remove('on'); render();
      }else{
        toast('У┐йтіасЂДсЂЇсЂЙсЂЏсѓЊсЂДсЂЌсЂЪсђѓжЏ╗Т│бсѓњуб║УфЇсЂЌсЂдсѓѓсЂєСИђт║дсЂіУЕдсЂЌсЂЈсЂасЂЋсЂёсђѓ');
      }
    });
});

$('fin').value=today();
$('stars').innerHTML=starsHtml(0);
$('stars').addEventListener('click', function(e){
  var b=e.target.closest('.estar');
  if(!b) return;
  var cur=+(this.getAttribute('data-v')||0), n=+b.getAttribute('data-n');
  var nv=(n===cur)?0:n;
  this.setAttribute('data-v', nv);
  this.innerHTML=starsHtml(nv);
});
$('note').addEventListener('input', function(){ $('ncount').textContent=this.value.length; });

function makePostText(b){
  var lines=[];
  var who=b.author?'№╝ѕ'+b.author+'№╝Ѕ':'';
  if(b.status==='want'){
    lines.push('УфГсЂ┐сЂЪсЂёТюгсђј'+b.title+'сђЈ'+who);
  }else{
    var dp=b.date.split('-');
    lines.push((+dp[0])+'.'+(+dp[1])+'.'+(+dp[2])+' УфГС║єсђј'+b.title+'сђЈ'+who);
  }
  if(b.rating) lines.push('РўЁРўЁРўЁРўЁРўЁ'.slice(0,b.rating)+'РўєРўєРўєРўєРўє'.slice(0,5-b.rating));
  if(b.note) lines.push('сђї'+b.note+'сђЇ');
  if(b.link) lines.push(b.link);
  lines.push(TAG+' '+APP_URL);
  return lines.join('\n');
}
function fallbackCopy(txt){
  var ta=document.createElement('textarea');
  ta.value=txt;
  ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand('copy'); toast('ТіЋуе┐ућесЃєсѓГсѓ╣сЃѕсѓњсѓ│сЃћсЃ╝сЂЌсЂЙсЂЌсЂЪсђѓ'); }
  catch(e){ toast('сѓ│сЃћсЃ╝сЂДсЂЇсЂЙсЂЏсѓЊсЂДсЂЌсЂЪсђѓжЋиТі╝сЂЌсЂДжЂИТіъсЂЌсЂдсѓ│сЃћсЃ╝сЂЌсЂдсЂЈсЂасЂЋсЂёсђѓ'); }
  ta.remove();
}
function copyText(txt){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(
      function(){ toast('ТіЋуе┐ућесЃєсѓГсѓ╣сЃѕсѓњсѓ│сЃћсЃ╝сЂЌсЂЙсЂЌсЂЪсђѓ'); },
      function(){ fallbackCopy(txt); }
    );
  }else{ fallbackCopy(txt); }
}
function showPostBanner(b){
  var box=$('postbox');
  box.innerHTML='<div class="banner">уЎ╗жї▓сЂЌсЂЙсЂЌсЂЪсђѓMisskeyсЂФУ▓╝сѓІућесЂ«сЃєсѓГсѓ╣сЃѕ№╝џ'+
    '<div class="ptext">'+esc(makePostText(b))+'</div>'+
    '<button class="acc" id="pb-copy">сЃєсѓГсѓ╣сЃѕсѓњсѓ│сЃћсЃ╝</button>'+
    '<button id="pb-close">сЂесЂўсѓІ</button></div>';
  $('pb-copy').onclick=function(){ copyText(makePostText(b)); };
  $('pb-close').onclick=function(){ box.innerHTML=''; };
}
function submitBook(status){
  var t=$('title').value.trim();
  if(!t){ $('title').focus(); return; }
  if(!state.me){ closeEntry(); openPick('Уеўжї▓сЂЎсѓІсЂФсЂ»тљЇтЅЇсЂїт┐ЁУдЂсЂДсЂЎсђѓжЂИсЂХсЂІсђЂСИІсЂ«ТгёсЂДУ┐йтіасЂЌсЂдсЂЈсЂасЂЋсЂёсђѓ'); return; }
  $('add').disabled=true; $('want').disabled=true;
  var row={
    member:state.me, title:t, note:$('note').value.trim().slice(0,NOTE_MAX),
    date:(status==='want'?today():($('fin').value||today())), status:status,
    rating:+($('stars').getAttribute('data-v')||0),
    link:$('link').value.trim(),
    isbn:pending?pending.isbn:'', author:pending?pending.author:'',
    cover:pending?pending.cover:'', description:pending?pending.desc:'',
    genre:pending?(pending.genre||''):''
  };
  api('books', {method:'POST', body:JSON.stringify(row)})
    .then(function(rs){
      var saved=normBook(rs[0]);
      state.books.unshift(saved);
      state.books.sort(function(a,b){ return a.date<b.date?1:-1; });
      $('title').value=''; $('note').value=''; $('ncount').textContent='0'; $('fin').value=today();
      $('isbn').value=''; $('isbnst').textContent=''; pending=null;
      $('link').value='';
      $('stars').setAttribute('data-v','0');
      $('stars').innerHTML=starsHtml(0);
      state.viewMonth=null;
      closeEntry();
      render();

function genreFromId(gid){
  if(!gid) return '';
  var paths=String(gid).split('/');
  var content='', fmt='';
  for(var i=0;i<paths.length;i++){
    var p=paths[i], top=p.slice(0,6);
    if(top==='001019'||top==='001020'){
      var sub=GEN_SUB[p.slice(6,9)];
      if(sub&&!fmt) fmt=sub;
    }else if(GEN_TOP[top]){
      if(!content) content=GEN_TOP[top];
    }
  }
  return content||fmt||'';
}
function rakutenGenreByTitle(title){
  if(!RKT_APP||!RKT_KEY||!title) return Promise.resolve('');

    .then(function(r){ return r.json(); })
    .then(function(d){
      var items=(d&&d.Items)||[];
      for(var i=0;i<items.length;i++){
        var it=items[i]; if(it&&it.Item) it=it.Item;

}

function fetchBookFull(v){

['сЂ«','сЂФ','сЂ»','сѓњ','сЂЪ','сЂї','сЂД','сЂд','сЂе','сЂЌ','сѓї','сЂЋ','сѓѓ','сЂф','сЂа','сЂДсЂЎ','сЂЙсЂЎ','сЂЙсЂЌсЂЪ','сЂДсЂЌсЂЪ','сЂЎсѓІ','сЂЌсЂЪ','сЂёсѓІ','сЂѓсѓІ','сЂфсѓІ','сЂфсЂБсЂЪ','сЂфсЂё','сЂЊсЂе','сѓѓсЂ«','сѓѓсЂ«сЂ«','сѓѕсЂє','сЂЮсѓї','сЂЊсѓї','сЂѓсѓї','сЂ«сЂД','сЂІсѓЅ','сЂЉсЂЕ','сЂДсѓѓ','сЂЙсЂЪ','сЂесЂдсѓѓ','сЂЎсЂћсЂЈ','сЂЎсЂћсЂё','сЂАсѓЄсЂБсЂе','сѓёсЂБсЂ▒сѓі','сЂЪсЂё','сЂЪсЂЈ','сЂЪсѓЂ','сЂесЂЊсѓЇ','сЂесЂЇ','сЂЮсЂє','сЂёсЂє','сЂесЂёсЂє','сЂесЂёсЂБсЂЪ','сѓѕсЂЈ','сЂЙсЂа','сѓѓсЂє','сЂџсЂБсЂе','сЂесЂІ','сЂЉсѓїсЂЕ','сЂ╗сЂЕ','сЂЈсѓЅсЂё','сЂфсѓЊсЂІ','сѓёсЂ»сѓі','сЂ╗сѓЊсЂе','сЂ╗сѓЊсЂесЂФ','ТюгтйЊ','ТюгтйЊсЂФ','Тюг','СИђтєі','УфГсѓђ','УфГсѓЊсЂа','УфГсЂ┐','УфГсѓЂсѓІ','жЮбуЎйсЂё','жЮбуЎйсЂІсЂБсЂЪ','сЂісѓѓсЂЌсѓЇсЂё','сЂісѓѓсЂЌсѓЇсЂІсЂБсЂЪ','УЅ»сЂё','УЅ»сЂІсЂБсЂЪ','сѓѕсЂё','сѓѕсЂІсЂБсЂЪ','сЂёсЂё','УЉЌУђЁ','ТюгТЏИ','СйютЊЂ','у┤╣С╗І','УДБУфг','тЄ║уЅѕ','тѕіУАї','ТќЄт║Ф','Тќ░ТЏИ','тЇўУАїТюг','сѓисЃфсЃ╝сѓ║','сЂфсЂЕ','сЂЪсЂА','ТЌЦТюг','СИќуЋїСИђ','т░ЈУфг','уЅЕУфъ','Сйют«Х','ТЈЈсЂЈ','ТЈЈсЂёсЂЪ','тЈЌУ│ъ','уЎ║тБ▓','тЈјжї▓','тЙЁТюЏ','тѓЉСйю','тљЇСйю','УЕ▒жАї','сЃЄсЃЊсЃЦсЃ╝','сЃџсЃ╝сѓИ','жЋиуие','уЪГуие','сЃЎсѓ╣сЃѕсѓ╗сЃЕсЃ╝','сѓЅсѓїсѓІ','сЂЋсѓїсѓІ','сЂАсѓЃсѓЊ','сЂЋсѓЊ','сЂЈсѓЊ','тцДУ│ъ','сЃјсЃЪсЃЇсЃ╝сЃѕ','тђЎУБю','сЃЪсЃфсѓфсЃ│','сЃЪсЃфсѓфсЃ│сѓ╗сЃЕсЃ╝','Тюгт▒І'].forEach(function(w){ STOP[w]=1; });

function topWords(items, max){
  var freq={};
  function feed(item){
    var t=item.t, ex=item.ex||'';
    if(!t) return;
    var words=[];
    if(window.Intl&&Intl.Segmenter){
      var seg=new Intl.Segmenter('ja',{granularity:'word'});
      for(var it of seg.segment(t)){ if(it.isWordLike) words.push(it.segment); }
    }else{
      words=t.split(/[\sсђЂсђѓ№╝Ђ№╝Ъ!?сЃ╗сђїсђЇсђјсђЈ№╝ѕ№╝Ѕ()]+/);
    }
    var perText={};
    words.forEach(function(w){
      w=w.trim();
      if(w.length<2) return;
      if(STOP[w]) return;
      if(ex&&ex.indexOf(w)!==-1) return;
      if(/^[\d\p{P}\p{S}\s]+$/u.test(w)) return;
      if(/^[сЃ╝сђюсЃ╗РђдРђЦРђЋРђћРђЊ~]+$/.test(w)) return;
      if(w.length<=3&&/^[сЂђ-сѓЪсЃ╝]+$/.test(w)) return;
      perText[w]=(perText[w]||0)+1;
      if(perText[w]>2) return;
      freq[w]=(freq[w]||0)+1;
    });
  }
  items.forEach(feed);
  var list=Object.keys(freq).map(function(w){ return {w:w, f:freq[w]}; })
    .sort(function(a,b){ return b.f-a.f; });
  var strong=list.filter(function(x){ return x.f>=2; });
  return (strong.length>=3?strong:list).slice(0,max);
}

var IPAPER='#f4f3ef', ICARD='#fbfaf6', IINK='#131311', ISUB='#6b6b66', IACC='#ff5a36', ILINE='#e0ded5';

function drawKeywords(ctx, W, M, topY, bottomY, words){
  if(!words.length) return;
  ctx.font='40px '+DISP;
  function joinLine(ws){ return ws.map(function(x){ return x.w; }).join('сђђсђђ'); }
  var lines=[joinLine(words)];
  if(ctx.measureText(lines[0]).width>W-2*M){
    var half=Math.ceil(words.length/2);
    lines=[joinLine(words.slice(0,half)), joinLine(words.slice(half))];
  }
  var blockH=34+18+lines.length*64;
  var y=topY+Math.max(0,(bottomY-topY-blockH)/2);
  ctx.textAlign='center';
  ctx.fillStyle=ISUB;
  ctx.font='22px '+MONO;
  try{ ctx.letterSpacing='8px'; }catch(e){}
  ctx.fillText('KEYWORD', W/2, y+24);
  try{ ctx.letterSpacing='0px'; }catch(e){}
  ctx.fillStyle=IINK;
  ctx.font='40px '+DISP;
  var wy=y+24+18+52;
  lines.forEach(function(l){
    ctx.fillText(l, W/2, wy);
    wy+=64;
  });
  ctx.textAlign='left';
}

function loadCovers(urls){
  return Promise.all(urls.map(function(u){
    return new Promise(function(res){
      var im=new Image();
      im.crossOrigin='anonymous';
      var to=setTimeout(function(){ res(null); }, 6000);
      im.onload=function(){ clearTimeout(to); res(im); };
      im.onerror=function(){ clearTimeout(to); res(null); };
      im.src='https://images.weserv.nl/?url='+encodeURIComponent(u.replace(/^https?:\/\//,''));
    });
  })).then(function(a){ return a.filter(Boolean); });
}
function fontsReady(){
  return (document.fonts&&document.fonts.ready)?document.fonts.ready:Promise.resolve();
}

function makeImage(ym){
  var arr=state.books.filter(function(b){
    return b.status!=='want'&&b.date.slice(0,7)===ym&&(state.filter==='*'||b.member===state.filter);
  }).sort(function(a,b){ return a.date<b.date?-1:1; });
  if(!arr.length){ toast('сЂЊсЂ«ТюѕсЂ«Уеўжї▓сЂїсЂЙсЂасЂѓсѓісЂЙсЂЏсѓЊсђѓ'); return; }
  var who=state.filter==='*'?CLUB:state.filter;
  var mixed=state.filter==='*';
  Promise.all([loadCovers(arr.map(function(b){ return b.cover; }).filter(Boolean).slice(0,8)), fontsReady()])
    .then(function(rs){ renderImage(ym, arr, rs[0], who, mixed); });
}
function renderImage(ym, arr, imgs, who, mixed){
  var W=1080, H=1350, M=90;
  var cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  var ctx=cv.getContext('2d');
  ctx.fillStyle=IPAPER; ctx.fillRect(0,0,W,H);
  ctx.textBaseline='alphabetic';
  ctx.fillStyle=ISUB;
  ctx.font='24px '+MONO;
  try{ ctx.letterSpacing='10px'; }catch(e){}
  ctx.fillText('DOKUSHO LOG', M, 138);
  try{ ctx.letterSpacing='0px'; }catch(e){}
  ctx.fillStyle=IINK;
  ctx.font='600 56px '+DISP;
  ctx.fillText(ymLabel(ym)+'сЂ«УфГТЏИ', M, 224);
  ctx.fillStyle=ISUB;
  ctx.font='26px '+MONO;
  ctx.fillText(who||'', M, 274);
  if(mixed){
    var bw=250, bh=182, bx=W-M-bw, by=104;
    ctx.fillStyle=IINK;
    if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,24); ctx.fill(); }
    else{ ctx.fillRect(bx,by,bw,bh); }
    ctx.fillStyle=IPAPER;
    ctx.globalAlpha=.55;
    ctx.font='19px '+MONO;
    try{ ctx.letterSpacing='4px'; }catch(e){}
    ctx.fillText('BOOKS', bx+26, by+48);
    try{ ctx.letterSpacing='0px'; }catch(e){}
    ctx.globalAlpha=1;
    ctx.font='600 96px '+DISP;
    ctx.fillText(String(arr.length), bx+22, by+150);
    var numW=ctx.measureText(String(arr.length)).width;
    ctx.fillStyle=IACC;
    ctx.font='600 32px '+DISP;
    ctx.fillText('тєі', bx+22+numW+12, by+148);
  }
  ctx.strokeStyle=ILINE;
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(M,330); ctx.lineTo(W-M,330); ctx.stroke();
  var maxLines=9;
  var lineH=58, ly=396;
  var shown=arr.slice(0, arr.length>maxLines?maxLines-1:maxLines);
  var rightW=mixed?320:140;
  ctx.font='500 33px '+DISP;
  shown.forEach(function(b){
    var maxTW=W-2*M-rightW;
    var t='сђј'+b.title+'сђЈ';
    if(ctx.measureText(t).width>maxTW){
      var base=b.title;
      while(base.length>1 && ctx.measureText('сђј'+base+'РђдсђЈ').width>maxTW){ base=base.slice(0,-1); }
      t='сђј'+base+'РђдсђЈ';
    }
    ctx.fillStyle=IINK;
    ctx.fillText(t, M, ly);
    ctx.fillStyle=ISUB;
    ctx.font='24px '+MONO;
    ctx.textAlign='right';
    ctx.fillText((mixed?b.member+'сђђ':'')+md(b.date), W-M, ly-3);
    ctx.textAlign='left';
    ctx.font='500 33px '+DISP;
    ly+=lineH;
  });
  if(arr.length>shown.length){
    ctx.fillStyle=ISUB;
    ctx.font='28px '+DISP;
    ctx.fillText(mixed?('сЂ╗сЂІ '+(arr.length-shown.length)+'тєі'):'сЂ╗сЂІсЂФсѓѓТЋ░тєі', M, ly);
  }
  if(imgs.length){
    var ch=110, gap=18;
    var cw=imgs.map(function(im){ return Math.round(ch*im.width/im.height); });
    var total=cw.reduce(function(a,b){ return a+b; },0)+gap*(cw.length-1);
    while(total>W-2*M && cw.length>1){
      imgs=imgs.slice(0,imgs.length-1); cw.pop();
      total=cw.reduce(function(a,b){ return a+b; },0)+gap*(cw.length-1);
    }
    var cx=(W-total)/2, cy=ly+16;
    imgs.forEach(function(im,i){
      ctx.drawImage(im, cx, cy, cw[i], ch);
      ctx.strokeStyle=ILINE; ctx.lineWidth=1;
      ctx.strokeRect(cx+0.5, cy+0.5, cw[i]-1, ch-1);
      cx+=cw[i]+gap;
    });
    ly=cy+ch+10;
  }
  var kwItems=[];
  arr.forEach(function(b){
    kwItems.push({t:b.note, ex:b.title});
    kwItems.push({t:b.note, ex:b.title});
    kwItems.push({t:b.desc||'', ex:b.title});
  });
  var words=topWords(kwItems, 6);
  drawKeywords(ctx, W, M, ly+40, 1230, words);
  ctx.textAlign='left';
  ctx.textBaseline='alphabetic';
  ctx.fillStyle=IACC;
  ctx.font='500 28px '+MONO;
  ctx.fillText(TAG, M, 1290);
  ctx.fillStyle=ISUB;
  ctx.font='26px '+DISP;
  ctx.textAlign='right';
  ctx.fillText('УфГТЏИlog', W-M, 1290);
  ctx.textAlign='left';
  var url;
  try{ url=cv.toDataURL('image/png'); }
  catch(e){ if(imgs.length){ renderImage(ym, arr, [], who, mixed); } return; }
  presentImage(url, 'dokusho-'+ym+'.png');
}
function presentImage(url, fname, book){
  $('shot').src=url;
  $('overlay').classList.add('on');
  var tc=$('txtcopy');
  tc.hidden=!book;
  if(book){ tc.onclick=function(){ copyText(makePostText(book)); }; }
  $('dl').onclick=function(){
    var a=document.createElement('a');
    a.href=url; a.download=fname; a.click();
  };
  var sh=$('share');
  sh.hidden=true;
  if(navigator.canShare&&window.fetch){
    fetch(url).then(function(r){ return r.blob(); }).then(function(bl){
      var f=new File([bl],fname,{type:'image/png'});
      if(navigator.canShare({files:[f]})){
        sh.hidden=false;
        sh.onclick=function(){ navigator.share({files:[f], text:TAG}).catch(function(){}); };
      }
    }).catch(function(){});
  }
}
function wrapLines(ctx, text, maxW){
  var lines=[], cur='';
  for(var i=0;i<text.length;i++){
    var t=cur+text[i];
    if(ctx.measureText(t).width>maxW && cur){ lines.push(cur); cur=text[i]; }
    else cur=t;
  }
  if(cur) lines.push(cur);
  return lines;
}
function makeBookImage(id){
  var b=state.books.find(function(x){ return String(x.id)===String(id); });
  if(!b) return;
  Promise.all([loadCovers(b.cover?[b.cover]:[]), fontsReady()])
    .then(function(rs){ renderBookImage(b, rs[0][0]||null); });
}
function renderBookImage(b, cover){
  var W=1080, H=1080, M=90;
  var cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  var ctx=cv.getContext('2d');
  ctx.fillStyle=IPAPER; ctx.fillRect(0,0,W,H);
  ctx.textBaseline='alphabetic';
  ctx.fillStyle=ISUB;
  ctx.font='24px '+MONO;
  try{ ctx.letterSpacing='10px'; }catch(e){}
  ctx.fillText('DOKUSHO LOG', M, 116);
  try{ ctx.letterSpacing='0px'; }catch(e){}
  ctx.textAlign='right';
  ctx.font='26px '+MONO;
  if(b.status==='want'){
    ctx.fillStyle=IACC;
    ctx.fillText('УфГсЂ┐сЂЪсЂё', W-M, 116);
    ctx.fillStyle=ISUB;
  }else{
    var dp=b.date.split('-');
    ctx.fillText((+dp[0])+'.'+(+dp[1])+'.'+(+dp[2])+' УфГС║є', W-M, 116);
  }
  ctx.textAlign='center';
  var y;
  if(cover){
    var maxS=460;
    var chh=maxS, cww=Math.round(chh*cover.width/cover.height);
    if(cww>maxS){ cww=maxS; chh=Math.round(cww*cover.height/cover.width); }
    var cx=(W-cww)/2, cy=170+(maxS-chh)/2;
    ctx.drawImage(cover, cx, cy, cww, chh);
    ctx.strokeStyle=ILINE; ctx.lineWidth=1;
    ctx.strokeRect(cx+0.5, cy+0.5, cww-1, chh-1);
    y=710;
  }else{
    ctx.font='600 60px '+DISP;
    var estT=wrapLines(ctx, 'сђј'+b.title+'сђЈ', W-2*M).slice(0,3);
    var blockH=estT.length*88+(b.author?50:0)+(b.rating?52:0);
    if(b.note){
      ctx.font='44px '+DISP;
      blockH+=70+Math.min(3, wrapLines(ctx, 'сђї'+b.note+'сђЇ', W-2*M).length)*70;
    }
    y=Math.max(280, 620-Math.round(blockH/2));
  }
  var tfs=cover?46:60, tlh=cover?68:88, tmax=cover?2:3;
  ctx.fillStyle=IINK;
  ctx.font='600 '+tfs+'px '+DISP;
  var tl=wrapLines(ctx, 'сђј'+b.title+'сђЈ', W-2*M);
  if(tl.length>tmax){ tl=tl.slice(0,tmax); tl[tmax-1]=tl[tmax-1].slice(0,-1)+'РђдсђЈ'; }
  tl.forEach(function(l){ ctx.fillText(l, W/2, y); y+=tlh; });
  if(b.author){
    ctx.fillStyle=ISUB;
    ctx.font='27px '+DISP;
    y+=6;
    ctx.fillText(b.author, W/2, y);
    y+=44;
  }
  if(b.rating){
    var sf='РўЁРўЁРўЁРўЁРўЁ'.slice(0,b.rating), se='РўєРўєРўєРўєРўє'.slice(0,5-b.rating);
    ctx.font='34px '+SANS;
    var w1=ctx.measureText(sf).width, w2=ctx.measureText(se).width;
    var sx0=(W-(w1+w2))/2;
    ctx.textAlign='left';
    ctx.fillStyle=IACC;
    ctx.fillText(sf, sx0, y+6);
    ctx.fillStyle='#d8d5cb';
    ctx.fillText(se, sx0+w1, y+6);
    ctx.textAlign='center';
    y+=52;
  }
  if(b.note){
    ctx.fillStyle=IINK;
    var nfs=cover?38:44, nlh=cover?60:70;
    ctx.font=nfs+'px '+DISP;
    var nl=wrapLines(ctx, 'сђї'+b.note+'сђЇ', W-2*M);
    if(nl.length>3){ nl=nl.slice(0,3); nl[2]=nl[2].slice(0,-1)+'РђдсђЇ'; }
    y+=cover?46:70;
    nl.forEach(function(l){
      if(y>960) return;
      ctx.fillText(l, W/2, y); y+=nlh;
    });
  }
  ctx.textAlign='left';
  ctx.fillStyle=IACC;
  ctx.font='500 28px '+MONO;
  ctx.fillText(TAG, M, 1010);
  ctx.fillStyle=ISUB;
  ctx.font='26px '+DISP;
  ctx.textAlign='right';
  ctx.fillText(b.member||'УфГТЏИlog', W-M, 1010);
  ctx.textAlign='left';
  var url;
  try{ url=cv.toDataURL('image/png'); }
  catch(e){ if(cover){ renderBookImage(b, null); } return; }
  presentImage(url, 'dokusho-'+b.date+'.png', b);
}
$('close').addEventListener('click', function(){ $('overlay').classList.remove('on'); });
$('overlay').addEventListener('click', function(e){ if(e.target===$('overlay')) $('overlay').classList.remove('on'); });

state.me=lsGet('yonda-me')||'';
try{
  var cache=JSON.parse(lsGet('yonda-cache-v1'));
  if(cache){ state.members=cache.members||[]; state.books=(cache.books||[]).map(normBook); }
}catch(e){}
render();
loadAll()
  .then(function(){
    render();
    if(!state.me){ if(!lsGet('yonda-guest')) openPick(); }
    else if(state.members.indexOf(state.me)<0){ state.me=''; lsSet('yonda-me',''); openPick(); }
    else{ checkMigrate(); }
  })
  .catch(function(){ netFail(); });
})();
