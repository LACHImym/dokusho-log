<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>読書ログ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
<style>
:root{
  --paper:#FBFBF9; --card:#FFFFFF; --ink:#1A1C20; --sub:#6E6961; --faint:#A9A399;
  --line:#E4E1D9; --shu:#C8451F; --shu-ink:#FBFBF9;
  --sans:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{ --paper:#0F1113; --card:#16191C; --ink:#EDEBE5; --sub:#9B968D; --faint:#666159; --line:#2A2E33; --shu:#E0592E; --shu-ink:#0F1113; }
}
:root[data-theme="light"]{ --paper:#FBFBF9; --card:#FFFFFF; --ink:#1A1C20; --sub:#6E6961; --faint:#A9A399; --line:#E4E1D9; --shu:#C8451F; --shu-ink:#FBFBF9; }
:root[data-theme="dark"]{ --paper:#0F1113; --card:#16191C; --ink:#EDEBE5; --sub:#9B968D; --faint:#666159; --line:#2A2E33; --shu:#E0592E; --shu-ink:#0F1113; }
*{ box-sizing:border-box; }
body{ margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased; }
main{ max-width:560px; margin:0 auto; padding:20px 20px 60px; }
header.app{ display:flex; align-items:baseline; justify-content:space-between; padding:8px 2px 18px; }
h1{ font-family:var(--sans); font-size:22px; font-weight:600; margin:0; letter-spacing:.06em; }
#whoami{ font-size:13px; color:var(--sub); background:none; border:none; font-family:var(--sans); cursor:pointer; padding:4px; }
.entry{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; }
.entry input[type="text"]{ width:100%; border:none; border-bottom:1px solid var(--line); background:none; color:var(--ink); padding:9px 2px; font-size:16px; outline:none; }
.entry input[type="text"]:focus{ border-bottom-color:var(--shu); }
#title{ font-family:var(--sans); font-size:17px; }
.entry .row{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:14px; }
#fin{ border:1px solid var(--line); background:none; color:var(--sub); border-radius:8px; padding:7px 8px; font-size:14px; font-family:var(--sans); color-scheme:light dark; }
#add{ background:var(--shu); color:var(--shu-ink); border:none; border-radius:10px; padding:10px 20px; font-size:15px; font-family:var(--sans); cursor:pointer; white-space:nowrap; }
#add:active{ transform:scale(.97); }
.month{ margin-top:30px; }
.month>.head{ display:flex; align-items:baseline; justify-content:space-between; padding:0 2px 6px; }
.month h2{ font-family:var(--sans); font-size:17px; font-weight:600; margin:0; }
.month h2 b{ color:var(--shu); font-size:20px; margin-left:6px; }
.mkimg{ background:none; border:1px solid var(--line); color:var(--sub); border-radius:8px; padding:6px 12px; font-size:13px; font-family:var(--sans); cursor:pointer; }
.mkimg:hover{ border-color:var(--shu); color:var(--shu); }
.book{ border-top:1px solid var(--line); padding:12px 2px; cursor:pointer; }
.book:last-child{ border-bottom:1px solid var(--line); }
.book .t{ font-family:var(--sans); font-weight:600; font-size:15.5px; line-height:1.5; }
.book .wrap{ display:flex; gap:12px; align-items:flex-start; }
.book .bd{ flex:1; min-width:0; }
.book img.cv{ width:42px; border-radius:3px; border:1px solid var(--line); flex:none; display:block; }
.mkcard{ flex:none; align-self:center; background:none; border:1px solid var(--line); color:var(--faint); border-radius:8px; padding:5px 10px; font-size:12px; font-family:var(--sans); cursor:pointer; white-space:nowrap; }
.mkcard:hover{ border-color:var(--shu); color:var(--shu); }
.isbnrow{ display:flex; align-items:center; gap:10px; }
.isbnrow input[type="text"]{ width:190px; flex:none; font-size:13px; }
#isbnst{ font-size:12px; color:var(--sub); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.book .m{ font-size:12.5px; color:var(--sub); margin-top:3px; }
.book .m .d{ color:var(--faint); margin-right:8px; }
.edit input[type="text"]{ width:100%; border:none; border-bottom:1px solid var(--line); background:none; color:var(--ink); padding:8px 2px; font-size:15px; outline:none; }
.edit .row{ display:flex; align-items:center; gap:8px; margin-top:12px; flex-wrap:wrap; }
.edit .row input[type="date"]{ border:1px solid var(--line); background:none; color:var(--sub); border-radius:8px; padding:6px 8px; font-size:13px; color-scheme:light dark; }
.btn{ background:none; border:1px solid var(--line); color:var(--sub); border-radius:8px; padding:7px 14px; font-size:13px; font-family:var(--sans); cursor:pointer; }
.btn.save{ border-color:var(--shu); color:var(--shu); }
.btn.del{ margin-left:auto; color:var(--faint); border:none; }
.empty{ text-align:center; color:var(--sub); font-size:14px; padding:48px 10px; line-height:2; }
.empty .big{ font-family:var(--sans); font-size:17px; color:var(--ink); }
footer.app{ margin-top:44px; text-align:center; font-size:12.5px; color:var(--faint); }
footer.app button{ background:none; border:none; color:var(--faint); font-size:12.5px; font-family:var(--sans); cursor:pointer; padding:4px 6px; text-decoration:underline; text-underline-offset:3px; }
#overlay{ position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; padding:20px; z-index:9; }
#overlay.on{ display:flex; }
#sheet{ background:var(--card); border-radius:14px; padding:14px; max-width:440px; width:100%; max-height:92vh; overflow:auto; }
#shot{ width:100%; border-radius:8px; display:block; }
#sheet .hint{ font-size:12.5px; color:var(--sub); margin:10px 2px; line-height:1.7; }
#sheet .row{ display:flex; gap:8px; justify-content:flex-end; }
</style>
</head>
<body>
<main>
<header class="app">
  <h1>読書ログ</h1>
  <button id="whoami" title="名前を変更"></button>
</header>

<section class="entry">
  <input type="text" id="title" placeholder="本のタイトル" autocomplete="off">
  <input type="text" id="note" placeholder="ひとこと（なくてもOK）" autocomplete="off">
  <div class="isbnrow">
    <input type="text" id="isbn" placeholder="ISBNで自動入力（任意）" inputmode="numeric" autocomplete="off">
    <span id="isbnst"></span>
  </div>
  <div class="row">
    <label style="font-size:13px;color:var(--sub);">読了日 <input type="date" id="fin"></label>
    <button id="add">読み終わった</button>
  </div>
</section>

<section id="shelf"></section>

<footer class="app">
  <button id="exp">データを書き出す</button>・
  <button id="imp">読み込む</button>・
  <button id="theme">テーマ切替</button>
</footer>
</main>

<div id="overlay">
  <div id="sheet">
    <img id="shot" alt="月まとめ画像">
    <p class="hint">スマホは画像を長押し→「写真に保存」または「コピー」で、そのままMisskeyに貼れます。</p>
    <div class="row">
      <button class="btn" id="share" hidden>共有…</button>
      <button class="btn save" id="dl">画像を保存</button>
      <button class="btn" id="close">閉じる</button>
    </div>
  </div>
</div>
<input type="file" id="file" accept=".json,application/json" hidden>

<script>
(function(){
'use strict';
var LS='yonda-log-v1';
var TAG='#wa読書部';
var DISP='-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif';
var SANS='-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif';

var state={name:'', books:[], editing:null};
try{
  var raw=localStorage.getItem(LS);
  if(raw){ var d=JSON.parse(raw); state.name=d.name||''; state.books=Array.isArray(d.books)?d.books:[]; }
}catch(e){}

function save(){
  try{ localStorage.setItem(LS, JSON.stringify({name:state.name, books:state.books})); }catch(e){}
}
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function today(){
  var n=new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}
function md(iso){ var p=iso.split('-'); return (+p[1])+'/'+(+p[2]); }
function ymLabel(ym){ var p=ym.split('-'); return (+p[0])+'年'+(+p[1])+'月'; }

function render(){
  $('whoami').textContent=(state.name||'名前を設定')+' ▾';
  var shelf=$('shelf');
  if(!state.books.length){
    shelf.innerHTML='<div class="empty"><div class="big">まだ記録がありません</div>読み終わった本のタイトルを入れて、最初の1冊をどうぞ。</div>';
    return;
  }
  var groups={};
  state.books.forEach(function(b){ var ym=b.date.slice(0,7); (groups[ym]=groups[ym]||[]).push(b); });
  var yms=Object.keys(groups).sort().reverse();
  var html='';
  yms.forEach(function(ym){
    var arr=groups[ym].slice().sort(function(a,b){ return a.date<b.date?1:-1; });
    html+='<section class="month"><div class="head"><h2>'+ymLabel(ym)+'<b>'+arr.length+'冊</b></h2>'+
      '<button class="mkimg" data-ym="'+ym+'">この月を1枚に</button></div>';
    arr.forEach(function(b){
      if(state.editing===b.id){
        html+='<div class="book edit" data-id="'+b.id+'">'+
          '<input type="text" class="et" value="'+esc(b.title)+'">'+
          '<input type="text" class="en" placeholder="ひとこと" value="'+esc(b.note||'')+'">'+
          '<input type="text" class="ei" placeholder="ISBN（入れると表紙・紹介文を取得）" value="'+esc(b.isbn||'')+'">'+
          '<div class="row"><input type="date" class="ed" value="'+b.date+'">'+
          '<button class="btn save" data-act="save">保存</button>'+
          '<button class="btn" data-act="cancel">やめる</button>'+
          '<button class="btn del" data-act="del">削除</button></div></div>';
      }else{
        html+='<div class="book" data-id="'+b.id+'"><div class="wrap">'+
          (b.cover?'<img class="cv" src="'+esc(b.cover)+'" alt="" loading="lazy">':'')+
          '<div class="bd"><div class="t">『'+esc(b.title)+'』</div>'+
          '<div class="m"><span class="d">'+md(b.date)+'</span>'+esc(b.note||'')+'</div></div>'+
          '<button class="mkcard">1枚に</button></div></div>';
      }
    });
    html+='</section>';
  });
  shelf.innerHTML=html;
}

$('fin').value=today();

$('add').addEventListener('click', function(){
  var t=$('title').value.trim();
  if(!t){ $('title').focus(); return; }
  state.books.push({ id:Date.now()+''+Math.floor(Math.random()*1000), title:t, note:$('note').value.trim(), date:$('fin').value||today(),
    isbn:pending?pending.isbn:'', author:pending?pending.author:'', cover:pending?pending.cover:'', desc:pending?pending.desc:'' });
  $('title').value=''; $('note').value=''; $('fin').value=today();
  $('isbn').value=''; $('isbnst').textContent=''; pending=null;
  save(); render();
});
$('title').addEventListener('keydown', function(e){ if(e.key==='Enter'){ $('add').click(); } });
$('note').addEventListener('keydown', function(e){ if(e.key==='Enter'){ $('add').click(); } });

var pending=null, settingTitle=false, isbnTimer=null;
$('title').addEventListener('input', function(){ if(!settingTitle){ pending=null; $('isbnst').textContent=''; } });
$('isbn').addEventListener('input', function(){
  var v=this.value.replace(/[^0-9Xx]/g,'');
  clearTimeout(isbnTimer);
  if(v.length!==10&&v.length!==13){ $('isbnst').textContent=v.length?'…':''; pending=null; return; }
  isbnTimer=setTimeout(function(){ lookupIsbn(v); }, 300);
});
function fetchBook(v){
  return fetch('https://api.openbd.jp/v1/get?isbn='+v)
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(!d||!d[0]) return null;
      var s=d[0].summary||{};
      var desc='';
      try{
        var tc=d[0].onix.CollateralDetail.TextContent||[];
        var t3=tc.filter(function(t){ return t.TextType==='03'; });
        desc=(t3.length?t3[0].Text:(tc.length?tc[0].Text:''))||'';
      }catch(e){}
      return { title:s.title||'', isbn:v, author:s.author||'', cover:s.cover||'', desc:String(desc).slice(0,400) };
    });
}
function lookupIsbn(v){
  $('isbnst').textContent='検索中…';
  fetchBook(v)
    .then(function(info){
      if(!info){ $('isbnst').textContent='見つかりませんでした（手入力でOK）'; pending=null; return; }
      pending=info;
      if(info.title){ settingTitle=true; $('title').value=info.title; settingTitle=false; }
      $('isbnst').textContent='✓ '+info.title+(info.author?'（'+info.author+'）':'');
    })
    .catch(function(){ $('isbnst').textContent='通信できませんでした（手入力でOK）'; pending=null; });
}

$('whoami').addEventListener('click', function(){
  var n=prompt('お名前（まとめ画像に載ります）', state.name||'');
  if(n!==null){ state.name=n.trim(); save(); render(); }
});

$('shelf').addEventListener('click', function(e){
  var mk=e.target.closest('.mkimg');
  if(mk){ makeImage(mk.getAttribute('data-ym')); return; }
  var mc=e.target.closest('.mkcard');
  if(mc){ makeBookImage(mc.closest('.book').getAttribute('data-id')); return; }
  var card=e.target.closest('.book');
  if(!card) return;
  var id=card.getAttribute('data-id');
  var act=e.target.getAttribute('data-act');
  if(card.classList.contains('edit')){
    if(!act) return;
    var b=state.books.find(function(x){ return x.id===id; });
    if(act==='save'&&b){
      var nt=card.querySelector('.et').value.trim();
      if(nt){ b.title=nt; b.note=card.querySelector('.en').value.trim(); b.date=card.querySelector('.ed').value||b.date; }
      var ni=card.querySelector('.ei').value.replace(/[^0-9Xx]/g,'');
      if(ni!==(b.isbn||'')){
        b.isbn=ni;
        if(!ni){ b.cover=''; b.desc=''; b.author=''; }
        else if(ni.length===10||ni.length===13){
          fetchBook(ni).then(function(info){
            if(info){
              if(info.author) b.author=info.author;
              if(info.cover) b.cover=info.cover;
              if(info.desc) b.desc=info.desc;
              save(); render();
            }
          }).catch(function(){});
        }
      }
    }
    if(act==='del'&&b){
      if(!confirm('『'+b.title+'』を削除しますか？')) return;
      state.books=state.books.filter(function(x){ return x.id!==id; });
    }
    state.editing=null; save(); render();
  }else{
    state.editing=id; render();
  }
});

$('theme').addEventListener('click', function(){
  var root=document.documentElement;
  var cur=root.getAttribute('data-theme');
  if(!cur){ cur=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light'; }
  var next=cur==='dark'?'light':'dark';
  root.setAttribute('data-theme', next);
  try{ localStorage.setItem(LS+'-theme', next); }catch(e){}
});
try{
  var th=localStorage.getItem(LS+'-theme');
  if(th) document.documentElement.setAttribute('data-theme', th);
}catch(e){}

$('exp').addEventListener('click', function(){
  var blob=new Blob([JSON.stringify({name:state.name, books:state.books}, null, 1)], {type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='dokusho-log-'+today()+'.json';
  a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); }, 2000);
});
$('imp').addEventListener('click', function(){ $('file').click(); });
$('file').addEventListener('change', function(){
  var f=this.files[0]; this.value='';
  if(!f) return;
  var r=new FileReader();
  r.onload=function(){
    try{
      var d=JSON.parse(r.result);
      var inc=Array.isArray(d.books)?d.books:[];
      var seen={};
      state.books.forEach(function(b){ seen[b.title+'|'+b.date]=1; });
      var added=0;
      inc.forEach(function(b){
        if(b&&b.title&&b.date&&!seen[b.title+'|'+b.date]){
          state.books.push({id:Date.now()+''+Math.floor(Math.random()*100000), title:b.title, note:b.note||'', date:b.date,
            isbn:b.isbn||'', author:b.author||'', cover:b.cover||'', desc:b.desc||''});
          seen[b.title+'|'+b.date]=1; added++;
        }
      });
      if(!state.name&&d.name) state.name=d.name;
      save(); render();
      alert(added+'冊を取り込みました。');
    }catch(e){ alert('読み込めませんでした。書き出したJSONファイルを選んでください。'); }
  };
  r.readAsText(f);
});

var STOP={};
['の','に','は','を','た','が','で','て','と','し','れ','さ','も','な','だ','です','ます','ました','でした','する','した','いる','ある','なる','なった','ない','こと','もの','ものの','よう','それ','これ','あれ','ので','から','けど','でも','また','とても','すごく','すごい','ちょっと','やっぱり','たい','たく','ため','ところ','とき','そう','いう','よく','まだ','もう','ずっと','とか','けれど','ほど','くらい','なんか','やはり','ほんと','ほんとに','本当','本当に','本','一冊','読む','読んだ','読み','読める','面白い','面白かった','おもしろい','おもしろかった','良い','良かった','よい','よかった','いい','著者','本書','作品','紹介','解説','出版','刊行','文庫','新書','単行本','シリーズ','など','たち','日本','世界一'].forEach(function(w){ STOP[w]=1; });

function topWords(texts, max){
  var freq={};
  function feed(t){
    if(!t) return;
    var words=[];
    if(window.Intl&&Intl.Segmenter){
      var seg=new Intl.Segmenter('ja',{granularity:'word'});
      for(var it of seg.segment(t)){ if(it.isWordLike) words.push(it.segment); }
    }else{
      words=t.split(/[\s、。！？!?・「」『』（）()]+/);
    }
    words.forEach(function(w){
      w=w.trim();
      if(w.length<2) return;
      if(STOP[w]) return;
      if(/^[\d\p{P}\p{S}]+$/u.test(w)) return;
      freq[w]=(freq[w]||0)+1;
    });
  }
  texts.forEach(feed);
  return Object.keys(freq).map(function(w){ return {w:w, f:freq[w]}; })
    .sort(function(a,b){ return b.f-a.f; }).slice(0,max);
}

function drawKeywords(ctx, W, M, topY, bottomY, words, INK, SUB){
  if(!words.length) return;
  ctx.font='40px '+DISP;
  function joinLine(ws){ return ws.map(function(x){ return x.w; }).join('　　'); }
  var lines=[joinLine(words)];
  if(ctx.measureText(lines[0]).width>W-2*M){
    var half=Math.ceil(words.length/2);
    lines=[joinLine(words.slice(0,half)), joinLine(words.slice(half))];
  }
  var blockH=34+18+lines.length*64;
  var y=topY+Math.max(0,(bottomY-topY-blockH)/2);
  ctx.textAlign='center';
  ctx.fillStyle=SUB;
  ctx.font='24px '+SANS;
  try{ ctx.letterSpacing='8px'; }catch(e){}
  ctx.fillText('KEYWORD', W/2, y+24);
  try{ ctx.letterSpacing='0px'; }catch(e){}
  ctx.fillStyle=INK;
  ctx.font='40px '+DISP;
  var wy=y+24+18+52;
  lines.forEach(function(l){
    ctx.fillText(l, W/2, wy);
    wy+=64;
  });
  ctx.textAlign='left';
}

function loadCovers(urls){
  return Promise.all(urls.map(function(u){
    return new Promise(function(res){
      var im=new Image();
      im.crossOrigin='anonymous';
      var to=setTimeout(function(){ res(null); }, 6000);
      im.onload=function(){ clearTimeout(to); res(im); };
      im.onerror=function(){ clearTimeout(to); res(null); };
      im.src='https://images.weserv.nl/?url='+encodeURIComponent(u.replace(/^https?:\/\//,''));
    });
  })).then(function(a){ return a.filter(Boolean); });
}
function makeImage(ym){
  var arr=state.books.filter(function(b){ return b.date.slice(0,7)===ym; })
    .sort(function(a,b){ return a.date<b.date?-1:1; });
  if(!arr.length) return;
  loadCovers(arr.map(function(b){ return b.cover; }).filter(Boolean).slice(0,8))
    .then(function(imgs){ renderImage(ym, arr, imgs); });
}
function renderImage(ym, arr, imgs){
  var PAPER='#FBFBF9', INK='#1A1C20', SUB='#8A857B', SHU='#C8451F';
  var W=1080, H=1350, M=90;
  var cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  var ctx=cv.getContext('2d');
  ctx.fillStyle=PAPER; ctx.fillRect(0,0,W,H);
  ctx.textBaseline='alphabetic';
  ctx.fillStyle=SUB;
  ctx.font='26px '+SANS;
  try{ ctx.letterSpacing='10px'; }catch(e){}
  ctx.fillText('DOKUSHO LOG', M, 140);
  try{ ctx.letterSpacing='0px'; }catch(e){}
  ctx.fillStyle=INK;
  ctx.font='bold 60px '+DISP;
  ctx.fillText(ymLabel(ym)+'の読書', M, 226);
  ctx.fillStyle=SUB;
  ctx.font='32px '+SANS;
  ctx.fillText(state.name||'', M, 280);
  ctx.textAlign='right';
  ctx.fillStyle=INK;
  ctx.font='bold 150px '+DISP;
  var numW=ctx.measureText(String(arr.length)).width;
  ctx.fillText(String(arr.length), W-M-78, 258);
  ctx.fillStyle=SHU;
  ctx.font='bold 46px '+DISP;
  ctx.textAlign='left';
  ctx.fillText('冊', W-M-64, 256);
  ctx.strokeStyle='#DDD9CF';
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(M,318); ctx.lineTo(W-M,318); ctx.stroke();
  var maxLines=9;
  var lineH=58, ly=386;
  var shown=arr.slice(0, arr.length>maxLines?maxLines-1:maxLines);
  ctx.font='34px '+DISP;
  shown.forEach(function(b){
    var t='『'+b.title+'』';
    while(ctx.measureText(t).width>W-2*M-130 && t.length>4){ t=t.slice(0,t.length-2)+'…』'; }
    ctx.fillStyle=INK;
    ctx.fillText(t, M, ly);
    ctx.fillStyle=SUB;
    ctx.font='27px '+SANS;
    ctx.textAlign='right';
    ctx.fillText(md(b.date), W-M, ly-3);
    ctx.textAlign='left';
    ctx.font='34px '+DISP;
    ly+=lineH;
  });
  if(arr.length>shown.length){
    ctx.fillStyle=SUB;
    ctx.font='30px '+DISP;
    ctx.fillText('ほか '+(arr.length-shown.length)+'冊', M, ly);
  }
  if(imgs.length){
    var ch=110, gap=18;
    var cw=imgs.map(function(im){ return Math.round(ch*im.width/im.height); });
    var total=cw.reduce(function(a,b){ return a+b; },0)+gap*(cw.length-1);
    while(total>W-2*M && cw.length>1){
      imgs=imgs.slice(0,imgs.length-1); cw.pop();
      total=cw.reduce(function(a,b){ return a+b; },0)+gap*(cw.length-1);
    }
    var cx=(W-total)/2, cy=ly+16;
    imgs.forEach(function(im,i){
      ctx.drawImage(im, cx, cy, cw[i], ch);
      ctx.strokeStyle='#DDD9CF'; ctx.lineWidth=1;
      ctx.strokeRect(cx+0.5, cy+0.5, cw[i]-1, ch-1);
      cx+=cw[i]+gap;
    });
    ly=cy+ch+10;
  }
  var notes=arr.map(function(b){ return b.note; });
  var words=topWords(notes.concat(notes, arr.map(function(b){ return b.desc||''; })), 6);
  drawKeywords(ctx, W, M, ly+40, 1230, words, INK, SUB);
  ctx.textBaseline='alphabetic';
  ctx.fillStyle=SHU;
  ctx.font='32px '+SANS;
  ctx.fillText(TAG, M, 1290);
  ctx.fillStyle=SUB;
  ctx.font='28px '+DISP;
  ctx.textAlign='right';
  ctx.fillText('読書ログ', W-M, 1290);
  ctx.textAlign='left';
  var url;
  try{ url=cv.toDataURL('image/png'); }
  catch(e){ if(imgs.length){ renderImage(ym, arr, []); } return; }
  presentImage(url, 'dokusho-'+ym+'.png');
}
function presentImage(url, fname){
  $('shot').src=url;
  $('overlay').classList.add('on');
  $('dl').onclick=function(){
    var a=document.createElement('a');
    a.href=url; a.download=fname; a.click();
  };
  var sh=$('share');
  sh.hidden=true;
  if(navigator.canShare&&window.fetch){
    fetch(url).then(function(r){ return r.blob(); }).then(function(bl){
      var f=new File([bl],fname,{type:'image/png'});
      if(navigator.canShare({files:[f]})){
        sh.hidden=false;
        sh.onclick=function(){ navigator.share({files:[f], text:TAG}).catch(function(){}); };
      }
    }).catch(function(){});
  }
}
function wrapLines(ctx, text, maxW){
  var lines=[], cur='';
  for(var i=0;i<text.length;i++){
    var t=cur+text[i];
    if(ctx.measureText(t).width>maxW && cur){ lines.push(cur); cur=text[i]; }
    else cur=t;
  }
  if(cur) lines.push(cur);
  return lines;
}
function makeBookImage(id){
  var b=state.books.find(function(x){ return x.id===id; });
  if(!b) return;
  loadCovers(b.cover?[b.cover]:[]).then(function(imgs){ renderBookImage(b, imgs[0]||null); });
}
function renderBookImage(b, cover){
  var PAPER='#FBFBF9', INK='#1A1C20', SUB='#8A857B', SHU='#C8451F';
  var W=1080, H=1080, M=90;
  var cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  var ctx=cv.getContext('2d');
  ctx.fillStyle=PAPER; ctx.fillRect(0,0,W,H);
  ctx.textBaseline='alphabetic';
  ctx.fillStyle=SUB;
  ctx.font='26px '+SANS;
  try{ ctx.letterSpacing='10px'; }catch(e){}
  ctx.fillText('DOKUSHO LOG', M, 118);
  try{ ctx.letterSpacing='0px'; }catch(e){}
  ctx.textAlign='right';
  ctx.font='30px '+SANS;
  var dp=b.date.split('-');
  ctx.fillText((+dp[0])+'.'+(+dp[1])+'.'+(+dp[2])+' 読了', W-M, 118);
  ctx.textAlign='center';
  var y;
  if(cover){
    var maxS=460;
    var chh=maxS, cww=Math.round(chh*cover.width/cover.height);
    if(cww>maxS){ cww=maxS; chh=Math.round(cww*cover.height/cover.width); }
    var cx=(W-cww)/2, cy=170+(maxS-chh)/2;
    ctx.drawImage(cover, cx, cy, cww, chh);
    ctx.strokeStyle='#DDD9CF'; ctx.lineWidth=1;
    ctx.strokeRect(cx+0.5, cy+0.5, cww-1, chh-1);
    y=710;
  }else{
    ctx.font='bold 60px '+DISP;
    var estT=wrapLines(ctx, '『'+b.title+'』', W-2*M).slice(0,3);
    var blockH=estT.length*88+(b.author?50:0);
    if(b.note){
      ctx.font='44px '+DISP;
      blockH+=70+Math.min(3, wrapLines(ctx, '「'+b.note+'」', W-2*M).length)*70;
    }
    y=Math.max(280, 620-Math.round(blockH/2));
  }
  var tfs=cover?46:60, tlh=cover?68:88, tmax=cover?2:3;
  ctx.fillStyle=INK;
  ctx.font='bold '+tfs+'px '+DISP;
  var tl=wrapLines(ctx, '『'+b.title+'』', W-2*M);
  if(tl.length>tmax){ tl=tl.slice(0,tmax); tl[tmax-1]=tl[tmax-1].slice(0,-1)+'…』'; }
  tl.forEach(function(l){ ctx.fillText(l, W/2, y); y+=tlh; });
  if(b.author){
    ctx.fillStyle=SUB;
    ctx.font='30px '+SANS;
    y+=6;
    ctx.fillText(b.author, W/2, y);
    y+=44;
  }
  if(b.note){
    ctx.fillStyle=INK;
    var nfs=cover?38:44, nlh=cover?60:70;
    ctx.font=nfs+'px '+DISP;
    var nl=wrapLines(ctx, '「'+b.note+'」', W-2*M);
    if(nl.length>3){ nl=nl.slice(0,3); nl[2]=nl[2].slice(0,-1)+'…」'; }
    y+=cover?46:70;
    nl.forEach(function(l){
      if(y>960) return;
      ctx.fillText(l, W/2, y); y+=nlh;
    });
  }
  ctx.textAlign='left';
  ctx.fillStyle=SHU;
  ctx.font='32px '+SANS;
  ctx.fillText(TAG, M, 1010);
  ctx.fillStyle=SUB;
  ctx.font='28px '+SANS;
  ctx.textAlign='right';
  ctx.fillText(state.name||'読書ログ', W-M, 1010);
  ctx.textAlign='left';
  var url;
  try{ url=cv.toDataURL('image/png'); }
  catch(e){ if(cover){ renderBookImage(b, null); } return; }
  presentImage(url, 'dokusho-'+b.date+'.png');
}
$('close').addEventListener('click', function(){ $('overlay').classList.remove('on'); });
$('overlay').addEventListener('click', function(e){ if(e.target===$('overlay')) $('overlay').classList.remove('on'); });

render();
})();
</script>
