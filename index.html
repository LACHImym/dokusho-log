<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>読書ログ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f4f3ef; --card:#fbfaf6; --muted:#ebe9e2; --ink:#131311; --sub:#6b6b66; --faint:#9a988f;
  --line:rgba(19,19,17,.08); --line-soft:rgba(19,19,17,.06);
  --accent:#ff5a36; --on-accent:#ffffff;
  --sans:'Inter',-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  --mono:'IBM Plex Mono',"Hiragino Kaku Gothic ProN",ui-monospace,monospace;
}
@media (prefers-color-scheme: dark){
  :root{ --paper:#141412; --card:#1d1c19; --muted:#282722; --ink:#f4f3ef; --sub:#a5a299; --faint:#6e6c64;
    --line:rgba(244,243,239,.1); --line-soft:rgba(244,243,239,.07); }
}
:root[data-theme="light"]{ --paper:#f4f3ef; --card:#fbfaf6; --muted:#ebe9e2; --ink:#131311; --sub:#6b6b66; --faint:#9a988f;
  --line:rgba(19,19,17,.08); --line-soft:rgba(19,19,17,.06); }
:root[data-theme="dark"]{ --paper:#141412; --card:#1d1c19; --muted:#282722; --ink:#f4f3ef; --sub:#a5a299; --faint:#6e6c64;
  --line:rgba(244,243,239,.1); --line-soft:rgba(244,243,239,.07); }
*{ box-sizing:border-box; }
body{ margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased; }
main{ max-width:560px; margin:0 auto; padding:20px 16px 60px; }
header.app{ display:flex; align-items:center; justify-content:space-between; padding:8px 2px 16px; }
h1{ font-size:22px; font-weight:600; letter-spacing:-0.03em; margin:0; }
#hdate{ font-family:var(--mono); font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--sub); margin-top:3px; }
#whoami{ display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:500; color:var(--ink); background:var(--card); border:1px solid var(--line); border-radius:999px; padding:7px 13px; font-family:var(--sans); cursor:pointer; }
#whoami:active{ transform:scale(.98); }
.dot{ display:inline-block; width:8px; height:8px; border-radius:50%; flex:none; }
#net{ display:none; font-size:12px; color:var(--accent); border:1px solid var(--line); background:var(--card); border-radius:12px; padding:10px 14px; margin-bottom:10px; }
#net.on{ display:block; }
#toast{ position:fixed; left:50%; bottom:28px; transform:translateX(-50%); background:var(--ink); color:var(--paper); font-size:13px; padding:10px 18px; border-radius:999px; opacity:0; transition:opacity .25s; pointer-events:none; z-index:20; max-width:86vw; }
#toast.on{ opacity:1; }
.banner{ font-size:13px; color:var(--sub); background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px 14px; margin-top:10px; line-height:1.8; }
.banner button{ background:var(--muted); border:none; color:var(--ink); border-radius:6px; padding:5px 12px; font-size:12px; font-family:var(--sans); font-weight:500; cursor:pointer; margin-right:6px; }
#bento{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
.bcard{ border-radius:16px; padding:14px; min-height:88px; display:flex; flex-direction:column; }
.bcard.dark{ background:var(--ink); color:var(--paper); }
.bcard.hot{ background:var(--accent); color:var(--on-accent); }
.blabel{ font-family:var(--mono); font-size:9px; letter-spacing:.15em; text-transform:uppercase; opacity:.6; }
.bbig{ font-size:34px; font-weight:600; letter-spacing:-0.03em; line-height:1.15; margin-top:auto; }
.bsub{ font-size:10px; opacity:.6; }
.entry{ background:var(--card); border:1px solid var(--line); border-radius:18px; padding:14px 16px; }
.entry input[type="text"]{ width:100%; border:none; border-bottom:1px solid var(--line); background:none; color:var(--ink); padding:9px 2px; font-size:15px; font-family:var(--sans); outline:none; border-radius:0; }
.entry input[type="text"]:focus{ border-bottom-color:var(--accent); }
#title{ font-size:16px; font-weight:500; }
.entry .row{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:14px; }
#fin{ border:1px solid var(--line); background:none; color:var(--sub); border-radius:8px; padding:7px 8px; font-size:13px; font-family:var(--mono); color-scheme:light dark; }
#add{ background:var(--ink); color:var(--paper); border:none; border-radius:10px; padding:11px 20px; font-size:14px; font-weight:600; font-family:var(--sans); cursor:pointer; white-space:nowrap; }
#add:active{ transform:scale(.98); }
#add:disabled{ opacity:.5; }
#sugg{ display:none; background:var(--paper); border:1px solid var(--line); border-radius:12px; margin-top:6px; overflow:hidden; }
#sugg.on{ display:block; }
.sg{ display:block; width:100%; text-align:left; background:none; border:none; border-top:1px solid var(--line-soft); padding:10px 12px; cursor:pointer; font-family:var(--sans); }
.sg:first-child{ border-top:none; }
.sg:active{ background:var(--muted); }
.sg .st{ font-size:13px; font-weight:600; color:var(--ink); line-height:1.4; }
.sg .sa{ font-size:11px; color:var(--sub); margin-top:2px; }
.isbnrow{ display:flex; align-items:center; gap:10px; }
.isbnrow input[type="text"]{ width:190px; flex:none; font-size:12px; font-family:var(--mono); }
#isbnst{ font-size:11px; color:var(--sub); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#filter{ display:flex; flex-wrap:wrap; gap:6px; margin-top:16px; }
.chip{ display:flex; align-items:center; gap:6px; background:var(--card); border:1px solid var(--line); color:var(--sub); border-radius:999px; padding:6px 13px; font-size:12px; font-weight:500; font-family:var(--sans); cursor:pointer; }
.chip.on{ background:var(--ink); border-color:var(--ink); color:var(--paper); }
.month{ background:var(--card); border:1px solid var(--line); border-radius:18px; padding:6px 14px 4px; margin-top:12px; }
.month>.head{ display:flex; align-items:center; gap:8px; padding:10px 2px 8px; }
.month h2{ font-family:var(--mono); font-size:10px; font-weight:500; letter-spacing:.15em; text-transform:uppercase; color:var(--sub); margin:0; }
.month .gcount{ font-family:var(--mono); font-size:11px; color:var(--ink); }
.month .gcount b{ color:var(--accent); font-weight:600; }
.mkimg{ margin-left:auto; background:none; border:1px solid var(--line); color:var(--sub); border-radius:6px; padding:4px 10px; font-family:var(--mono); font-size:10px; letter-spacing:.05em; cursor:pointer; }
.mkimg:active{ transform:scale(.98); }
.book{ border-top:1px solid var(--line-soft); padding:11px 2px; }
.book.mine{ cursor:pointer; }
.book .t{ font-size:14px; font-weight:600; line-height:1.5; letter-spacing:-0.01em; }
.book .wrap{ display:flex; gap:12px; align-items:flex-start; }
.book .bd{ flex:1; min-width:0; }
.book img.cv{ width:38px; border-radius:5px; border:1px solid var(--line); flex:none; display:block; }
.mkcard{ flex:none; align-self:center; background:none; border:1px solid var(--line); color:var(--faint); border-radius:6px; padding:4px 9px; font-family:var(--mono); font-size:10px; cursor:pointer; white-space:nowrap; }
.mkcard:active{ transform:scale(.98); }
.book .m{ display:flex; align-items:center; flex-wrap:wrap; gap:7px; font-size:12px; color:var(--sub); margin-top:5px; }
.book .m .d{ font-family:var(--mono); font-size:10px; color:var(--faint); }
.pill{ font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; padding:2px 8px; border-radius:4px; font-weight:500; }
.edit input[type="text"]{ width:100%; border:none; border-bottom:1px solid var(--line); background:none; color:var(--ink); padding:8px 2px; font-size:14px; font-family:var(--sans); outline:none; border-radius:0; }
.edit .row{ display:flex; align-items:center; gap:8px; margin-top:12px; flex-wrap:wrap; }
.edit .row input[type="date"]{ border:1px solid var(--line); background:none; color:var(--sub); border-radius:8px; padding:6px 8px; font-size:12px; font-family:var(--mono); color-scheme:light dark; }
.btn{ background:var(--muted); border:none; color:var(--ink); border-radius:8px; padding:8px 14px; font-size:12.5px; font-weight:500; font-family:var(--sans); cursor:pointer; }
.btn:active{ transform:scale(.98); }
.btn.save{ background:var(--ink); color:var(--paper); }
.btn.del{ margin-left:auto; background:none; color:var(--faint); }
.empty{ text-align:center; color:var(--sub); font-size:13px; padding:44px 10px; line-height:2; }
.empty .big{ font-size:16px; font-weight:600; color:var(--ink); letter-spacing:-0.02em; }
footer.app{ margin-top:40px; text-align:center; }
footer.app button{ background:none; border:none; color:var(--faint); font-family:var(--mono); font-size:10px; letter-spacing:.12em; cursor:pointer; padding:4px 6px; }
#overlay, #pick{ position:fixed; inset:0; background:rgba(19,19,17,.5); display:none; align-items:center; justify-content:center; padding:20px; z-index:9; }
#overlay.on, #pick.on{ display:flex; }
#sheet, #picksheet{ background:var(--card); border-radius:18px; padding:14px; max-width:440px; width:100%; max-height:92vh; overflow:auto; }
#shot{ width:100%; border-radius:10px; display:block; }
#sheet .hint{ font-size:12px; color:var(--sub); margin:10px 2px; line-height:1.7; }
#sheet .row{ display:flex; gap:8px; justify-content:flex-end; }
#picksheet h2{ font-size:17px; font-weight:600; letter-spacing:-0.02em; margin:6px 4px 4px; }
#picksheet .lead{ font-size:12px; color:var(--sub); margin:0 4px 14px; }
#members{ display:flex; flex-direction:column; gap:8px; }
.mem{ display:flex; align-items:center; gap:10px; background:var(--paper); border:1px solid var(--line); color:var(--ink); border-radius:12px; padding:12px 14px; font-size:14px; font-weight:500; font-family:var(--sans); cursor:pointer; text-align:left; }
.mem:active{ transform:scale(.99); }
#picksheet .newrow{ display:flex; gap:8px; margin-top:16px; padding-top:14px; border-top:1px solid var(--line); }
#newname{ flex:1; min-width:0; border:none; border-bottom:1px solid var(--line); background:none; color:var(--ink); padding:8px 2px; font-size:14px; font-family:var(--sans); outline:none; border-radius:0; }
#picksheet .foot{ display:flex; justify-content:flex-end; margin-top:12px; }
</style>
</head>
<body>
<main>
<header class="app">
  <div>
    <h1>読書ログ</h1>
    <div id="hdate"></div>
  </div>
  <button id="whoami" title="部員を切り替え"></button>
</header>

<div id="net"></div>

<div id="bento"></div>

<section class="entry">
  <input type="text" id="title" placeholder="本のタイトル" autocomplete="off">
  <div id="sugg"></div>
  <input type="text" id="note" placeholder="ひとこと（なくてもOK）" autocomplete="off">
  <div class="isbnrow">
    <input type="text" id="isbn" placeholder="ISBNで自動入力（任意）" inputmode="numeric" autocomplete="off">
    <span id="isbnst"></span>
  </div>
  <div class="row">
    <label style="font-size:12px;color:var(--sub);">読了日 <input type="date" id="fin"></label>
    <button id="add">読み終わった</button>
  </div>
</section>

<div id="migrate"></div>

<div id="filter"></div>

<section id="shelf"></section>

<footer class="app">
  <button id="exp">EXPORT</button>·
  <button id="imp">IMPORT</button>·
  <button id="theme">THEME</button>
</footer>
</main>

<div id="overlay">
  <div id="sheet">
    <img id="shot" alt="まとめ画像">
    <p class="hint">スマホは画像を長押し→「写真に保存」または「コピー」で、そのままMisskeyに貼れます。</p>
    <div class="row">
      <button class="btn" id="share" hidden>共有…</button>
      <button class="btn save" id="dl">画像を保存</button>
      <button class="btn" id="close">閉じる</button>
    </div>
  </div>
</div>

<div id="pick">
  <div id="picksheet">
    <h2>あなたはだれ？</h2>
    <p class="lead">名前を選ぶとその人の本棚として記録されます。</p>
    <div id="members"></div>
    <div class="newrow">
      <input type="text" id="newname" placeholder="新しい部員の名前" autocomplete="off">
      <button class="btn save" id="addmem">追加</button>
    </div>
    <div class="foot"><button class="btn" id="pickclose" hidden>閉じる</button></div>
  </div>
</div>
<input type="file" id="file" accept=".json,application/json" hidden>
<div id="toast"></div>

<script>
(function(){
'use strict';
var DB_URL='https://lkctqbrpifyyofkcippj.supabase.co';
var DB_KEY='sb_publishable_YLr0hTxmAOmE6ebF6-rS7A_LUKzdr7z';
var TAG='#wa読書部';
var CLUB='あえる読書部';
var DISP="'Inter','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif";
var SANS="'Inter','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif";
var MONO="'IBM Plex Mono','Hiragino Kaku Gothic ProN',monospace";

var state={me:'', members:[], books:[], editing:null, filter:'*'};

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
var toastTimer=null;
function toast(msg){
  var t=$('toast');
  t.textContent=msg;
  t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ t.classList.remove('on'); }, 2600);
}
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function today(){
  var n=new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}
function md(iso){ var p=iso.split('-'); return (+p[1])+'/'+(+p[2]); }
function ymLabel(ym){ var p=ym.split('-'); return (+p[0])+'年'+(+p[1])+'月'; }

var MEMCOL=[['#ff5a36','#ffffff'],['#8e6cff','#ffffff'],['#2456f0','#ffffff'],['#d4ff52','#131311']];
function memCol(name){
  var i=state.members.indexOf(name);
  if(i<0) i=0;
  return MEMCOL[i%MEMCOL.length];
}

function api(path, opts){
  opts=opts||{};
  opts.headers=Object.assign({
    'apikey':DB_KEY,
    'Authorization':'Bearer '+DB_KEY,
    'Content-Type':'application/json',
    'Prefer':'return=representation'
  }, opts.headers||{});
  return fetch(DB_URL+'/rest/v1/'+path, opts).then(function(r){
    if(r.status===204) return null;
    if(!r.ok) return r.json().catch(function(){ return {}; }).then(function(e){ var err=new Error('api '+r.status); err.status=r.status; err.body=e; throw err; });
    return r.json();
  });
}
function normBook(b){ b.desc=b.description||''; return b; }
function loadAll(){
  return Promise.all([
    api('members?select=name&order=name.asc'),
    api('books?select=*&order=date.desc,created_at.desc&limit=2000')
  ]).then(function(rs){
    state.members=rs[0].map(function(m){ return m.name; });
    state.books=rs[1].map(normBook);
    lsSet('yonda-cache-v1', JSON.stringify({members:state.members, books:state.books}));
    $('net').classList.remove('on');
  });
}
function netFail(){
  $('net').textContent='ネットにつながりませんでした。表示は前回の内容です。電波の良いところで開き直してください。';
  $('net').classList.add('on');
}

function render(){
  var mc=memCol(state.me);
  $('whoami').innerHTML=(state.me?'<span class="dot" style="background:'+mc[0]+'"></span>':'')+esc(state.me||'名前を選ぶ')+'<span style="color:var(--faint)">▾</span>';
  var nowYm=today().slice(0,7), nowY=today().slice(0,4);
  var clubM=state.books.filter(function(b){ return b.date.slice(0,7)===nowYm; }).length;
  var clubY=state.books.filter(function(b){ return b.date.slice(0,4)===nowY; }).length;
  $('bento').innerHTML=
    '<div class="bcard dark"><div class="blabel">CLUB · THIS MONTH</div><div class="bbig">'+clubM+'</div><div class="bsub">みんなで今月・冊</div></div>'+
    '<div class="bcard hot"><div class="blabel">CLUB · THIS YEAR</div><div class="bbig">'+clubY+'</div><div class="bsub">みんなで今年・冊</div></div>';
  var f=$('filter');
  if(state.members.length){
    var chips='<button class="chip'+(state.filter==='*'?' on':'')+'" data-f="*">みんな</button>';
    state.members.forEach(function(m){
      var c=memCol(m);
      chips+='<button class="chip'+(state.filter===m?' on':'')+'" data-f="'+esc(m)+'"><span class="dot" style="background:'+c[0]+'"></span>'+esc(m)+'</button>';
    });
    f.innerHTML=chips;
  }else{ f.innerHTML=''; }
  var shelf=$('shelf');
  var books=state.books.filter(function(b){ return state.filter==='*'||b.member===state.filter; });
  if(!books.length){
    shelf.innerHTML='<div class="empty"><div class="big">まだ記録がありません</div>読み終わった本のタイトルを入れて、最初の1冊をどうぞ。</div>';
    return;
  }
  var groups={};
  books.forEach(function(b){ var ym=b.date.slice(0,7); (groups[ym]=groups[ym]||[]).push(b); });
  var yms=Object.keys(groups).sort().reverse();
  var html='';
  yms.forEach(function(ym){
    var arr=groups[ym];
    html+='<section class="month"><div class="head"><h2>● '+ymLabel(ym)+'</h2>'+
      (state.filter==='*'?'<span class="gcount"><b>'+arr.length+'</b>冊</span>':'')+
      '<button class="mkimg" data-ym="'+ym+'">この月を1枚に</button></div>';
    arr.forEach(function(b){
      if(state.editing===b.id){
        html+='<div class="book edit" data-id="'+b.id+'">'+
          '<input type="text" class="et" value="'+esc(b.title)+'">'+
          '<input type="text" class="en" placeholder="ひとこと" value="'+esc(b.note||'')+'">'+
          '<input type="text" class="ei" placeholder="ISBN（入れると表紙・紹介文を取得）" value="'+esc(b.isbn||'')+'">'+
          '<div class="row"><input type="date" class="ed" value="'+b.date+'">'+
          '<button class="btn save" data-act="save">保存</button>'+
          '<button class="btn" data-act="cancel">やめる</button>'+
          '<button class="btn del" data-act="del">削除</button></div></div>';
      }else{
        var mine=b.member===state.me;
        var c=memCol(b.member);
        html+='<div class="book'+(mine?' mine':'')+'" data-id="'+b.id+'"><div class="wrap">'+
          (b.cover?'<img class="cv" src="'+esc(b.cover)+'" alt="" loading="lazy">':'')+
          '<div class="bd"><div class="t">'+esc(b.title)+'</div>'+
          '<div class="m"><span class="pill" style="background:'+c[0]+';color:'+c[1]+'">'+esc(b.member)+'</span>'+
          '<span class="d">'+md(b.date)+'</span>'+esc(b.note||'')+'</div></div>'+
          '<button class="mkcard">1枚に</button></div></div>';
      }
    });
    html+='</section>';
  });
  shelf.innerHTML=html;
}

function renderPick(){
  var box=$('members');
  box.innerHTML=state.members.map(function(m){
    var c=memCol(m);
    return '<button class="mem" data-m="'+esc(m)+'"><span class="dot" style="background:'+c[0]+'"></span>'+esc(m)+(m===state.me?'　✓':'')+'</button>';
  }).join('')||'<div style="font-size:13px;color:var(--sub);">まだ部員がいません。下で最初の部員を追加してください。</div>';
  $('pickclose').hidden=!state.me;
}
function openPick(){ renderPick(); $('pick').classList.add('on'); }
$('pick').addEventListener('click', function(e){
  var mb=e.target.closest('.mem');
  if(mb){
    state.me=mb.getAttribute('data-m');
    lsSet('yonda-me', state.me);
    $('pick').classList.remove('on');
    render(); checkMigrate();
    return;
  }
  if(e.target===$('pick')&&state.me){ $('pick').classList.remove('on'); }
});
$('pickclose').addEventListener('click', function(){ $('pick').classList.remove('on'); });
$('addmem').addEventListener('click', function(){
  var n=$('newname').value.trim();
  if(!n) return;
  if(state.members.indexOf(n)>=0){
    state.me=n; lsSet('yonda-me', n);
    $('pick').classList.remove('on'); render(); checkMigrate(); return;
  }
  api('members', {method:'POST', body:JSON.stringify({name:n})})
    .then(function(){
      state.members.push(n); state.members.sort();
      state.me=n; lsSet('yonda-me', n);
      $('newname').value='';
      $('pick').classList.remove('on');
      render(); checkMigrate();
    })
    .catch(function(e){
      if(e.status===409){
        state.me=n; lsSet('yonda-me', n);
        $('pick').classList.remove('on'); render();
      }else{
        toast('追加できませんでした。電波を確認してもう一度お試しください。');
      }
    });
});
$('whoami').addEventListener('click', openPick);
$('filter').addEventListener('click', function(e){
  var c=e.target.closest('.chip');

var pending=null, settingTitle=false, isbnTimer=null;
var RAKUTEN_APP_ID='';
var sugTimer=null, sugItems=[], sugSeq=0;
function hideSugg(){ $('sugg').classList.remove('on'); $('sugg').innerHTML=''; sugItems=[]; }
function titleSuggest(q){
  if(!RAKUTEN_APP_ID) return;
  var seq=++sugSeq;
  var cb='__rktcb'+seq;
  window[cb]=function(d){
    delete window[cb];
    if(seq!==sugSeq) return;
    var items=(d&&d.Items)||[];
    sugItems=items.slice(0,5).map(function(it){
      var v=it.Item||it;
      return { title:v.title||'', author:v.author||'', isbn:v.isbn||'', cover:v.largeImageUrl||v.mediumImageUrl||'', desc:String(v.itemCaption||'').slice(0,400) };
    }).filter(function(x){ return x.title; });
    if(!sugItems.length){ hideSugg(); return; }
    $('sugg').innerHTML=sugItems.map(function(x,i){
      return '<button class="sg" data-i="'+i+'"><span class="st">'+esc(x.title)+'</span><span class="sa" style="display:block">'+esc(x.author||'')+'</span></button>';
    }).join('');
    $('sugg').classList.add('on');
  };
  var s=document.createElement('script');
  s.src='https://app.rakuten.co.jp/services/api/BooksBook/Search/20170404?format=json&formatVersion=2&callback='+cb+'&applicationId='+RAKUTEN_APP_ID+'&hits=5&title='+encodeURIComponent(q);
  s.onerror=function(){ delete window[cb]; };
  s.onload=function(){ setTimeout(function(){ s.remove(); }, 0); };
  document.body.appendChild(s);
}
$('sugg').addEventListener('pointerdown', function(e){
  var btn=e.target.closest('.sg');
  if(!btn) return;
  e.preventDefault();
  var x=sugItems[+btn.getAttribute('data-i')];
  if(!x) return;
  settingTitle=true; $('title').value=x.title; settingTitle=false;
  hideSugg();
  pending={ isbn:x.isbn, author:x.author, cover:x.cover, desc:x.desc };
  $('isbn').value=x.isbn||'';
  $('isbnst').textContent='✓ '+x.title+(x.author?'（'+x.author+'）':'');
  if(x.isbn){
    fetchBook(x.isbn).then(function(info){
      if(info&&pending&&pending.isbn===x.isbn){
        pending={ isbn:x.isbn, author:info.author||x.author, cover:info.cover||x.cover, desc:info.desc||x.desc };
      }
    }).catch(function(){});
  }
});
document.addEventListener('click', function(e){
  if(!e.target.closest('#sugg')&&e.target!==$('title')) hideSugg();
});
$('title').addEventListener('input', function(){
  if(!settingTitle){ pending=null; $('isbnst').textContent=''; }
  clearTimeout(sugTimer);
  var v=this.value.trim();
  if(settingTitle||!RAKUTEN_APP_ID||v.length<2){ hideSugg(); return; }
  sugTimer=setTimeout(function(){ titleSuggest(v); }, 600);
});
$('isbn').addEventListener('input', function(){
  var v=this.value.replace(/[^0-9Xx]/g,'');
  clearTimeout(isbnTimer);
  if(v.length!==10&&v.length!==13){ $('isbnst').textContent=v.length?'…':''; pending=null; return; }
  isbnTimer=setTimeout(function(){ lookupIsbn(v); }, 300);
});
function fetchBook(v){
  return fetch('https://api.openbd.jp/v1/get?isbn='+v)
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(!d||!d[0]) return null;
      var s=d[0].summary||{};
      var desc='';
      try{
        var tc=d[0].onix.CollateralDetail.TextContent||[];
        var t3=tc.filter(function(t){ return t.TextType==='03'; });
        desc=(t3.length?t3[0].Text:(tc.length?tc[0].Text:''))||'';
      }catch(e){}
      return { title:s.title||'', isbn:v, author:s.author||'', cover:s.cover||'', desc:String(desc).slice(0,400) };
    });
}
function lookupIsbn(v){
  $('isbnst').textContent='検索中…';
  fetchBook(v)
    .then(function(info){
      if(!info){ $('isbnst').textContent='見つかりませんでした（手入力でOK）'; pending=null; return; }
      pending=info;
      if(info.title){ settingTitle=true; $('title').value=info.title; settingTitle=false; }
      $('isbnst').textContent='✓ '+info.title+(info.author?'（'+info.author+'）':'');
    })
    .catch(function(){ $('isbnst').textContent='通信できませんでした（手入力でOK）'; pending=null; });
}

$('shelf').addEventListener('click', function(e){
  var mk=e.target.closest('.mkimg');
  if(mk){ makeImage(mk.getAttribute('data-ym')); return; }
  var mc=e.target.closest('.mkcard');
  if(mc){ makeBookImage(mc.closest('.book').getAttribute('data-id')); return; }
  var card=e.target.closest('.book');
  if(!card) return;
  var id=card.getAttribute('data-id');
  var b=state.books.find(function(x){ return String(x.id)===String(id); });
  if(!b) return;
  var act=e.target.getAttribute('data-act');
  if(card.classList.contains('edit')){
    if(!act) return;
    if(act==='cancel'){ state.editing=null; render(); return; }
    if(act==='del'){
      if(!confirm('『'+b.title+'』を削除しますか？')) return;
      api('books?id=eq.'+b.id, {method:'DELETE'})
        .then(function(){
          state.books=state.books.filter(function(x){ return x.id!==b.id; });
          state.editing=null; render();
        })
        .catch(function(){ toast('削除できませんでした。電波を確認してもう一度お試しください。'); });
      return;
    }
    if(act==='save'){
      var patch={};
      var nt=card.querySelector('.et').value.trim();
      if(nt){ patch.title=nt; patch.note=card.querySelector('.en').value.trim(); patch.date=card.querySelector('.ed').value||b.date; }
      var ni=card.querySelector('.ei').value.replace(/[^0-9Xx]/g,'');
      var doSave=function(){
        api('books?id=eq.'+b.id, {method:'PATCH', body:JSON.stringify(patch)})
          .then(function(rs){
            Object.assign(b, normBook(rs[0]));
            state.books.sort(function(a,x){ return a.date<x.date?1:-1; });
            state.editing=null; render();
          })
          .catch(function(){ toast('保存できませんでした。電波を確認してもう一度お試しください。'); });
      };
      if(ni!==(b.isbn||'')){
        patch.isbn=ni;
        if(!ni){ patch.cover=''; patch.description=''; patch.author=''; doSave(); }
        else if(ni.length===10||ni.length===13){
          fetchBook(ni).then(function(info){
            if(info){
              if(info.author) patch.author=info.author;
              if(info.cover) patch.cover=info.cover;
              if(info.desc) patch.description=info.desc;
            }
            doSave();
          }).catch(doSave);
        }else{ doSave(); }
      }else{ doSave(); }
      return;
    }
  }else{
    if(b.member!==state.me) return;
    state.editing=b.id; render();
  }
});

function uploadBooks(inc){
  var seen={};
  state.books.forEach(function(b){ if(b.member===state.me) seen[b.title+'|'+b.date]=1; });
  var rows=[];
  inc.forEach(function(b){
    if(b&&b.title&&b.date&&!seen[b.title+'|'+b.date]){
      rows.push({ member:state.me, title:b.title, note:b.note||'', date:b.date,
        isbn:b.isbn||'', author:b.author||'', cover:b.cover||'', description:b.desc||b.description||'' });
      seen[b.title+'|'+b.date]=1;
    }
  });
  if(!rows.length) return Promise.resolve(0);
  return api('books', {method:'POST', body:JSON.stringify(rows)})
    .then(function(rs){
      rs.forEach(function(x){ state.books.push(normBook(x)); });
      state.books.sort(function(a,b){ return a.date<b.date?1:-1; });
      render();
      return rows.length;
    })
    .catch(function(){ toast('取り込みに失敗しました。電波を確認してもう一度お試しください。'); return 0; });
}

var STOP={};
['の','に','は','を','た','が','で','て','と','し','れ','さ','も','な','だ','です','ます','ました','でした','する','した','いる','ある','なる','なった','ない','こと','もの','ものの','よう','それ','これ','あれ','ので','から','けど','でも','また','とても','すごく','すごい','ちょっと','やっぱり','たい','たく','ため','ところ','とき','そう','いう','という','といった','よく','まだ','もう','ずっと','とか','けれど','ほど','くらい','なんか','やはり','ほんと','ほんとに','本当','本当に','本','一冊','読む','読んだ','読み','読める','面白い','面白かった','おもしろい','おもしろかった','良い','良かった','よい','よかった','いい','著者','本書','作品','紹介','解説','出版','刊行','文庫','新書','単行本','シリーズ','など','たち','日本','世界一'].forEach(function(w){ STOP[w]=1; });

function topWords(texts, max){
  var freq={};
  function feed(t){
    if(!t) return;
    var words=[];
    if(window.Intl&&Intl.Segmenter){
      var seg=new Intl.Segmenter('ja',{granularity:'word'});
      for(var it of seg.segment(t)){ if(it.isWordLike) words.push(it.segment); }
    }else{
      words=t.split(/[\s、。！？!?・「」『』（）()]+/);
    }
    words.forEach(function(w){
      w=w.trim();
      if(w.length<2) return;
      if(STOP[w]) return;
      if(/^[\d\p{P}\p{S}]+$/u.test(w)) return;
      freq[w]=(freq[w]||0)+1;
    });
  }
  texts.forEach(feed);
  return Object.keys(freq).map(function(w){ return {w:w, f:freq[w]}; })
    .sort(function(a,b){ return b.f-a.f; }).slice(0,max);
}

var IPAPER='#f4f3ef', ICARD='#fbfaf6', IINK='#131311', ISUB='#6b6b66', IACC='#ff5a36', ILINE='#e0ded5';

function drawKeywords(ctx, W, M, topY, bottomY, words){
  if(!words.length) return;
  ctx.font='40px '+DISP;
  function joinLine(ws){ return ws.map(function(x){ return x.w; }).join('　　'); }
  var lines=[joinLine(words)];
  if(ctx.measureText(lines[0]).width>W-2*M){
    var half=Math.ceil(words.length/2);
    lines=[joinLine(words.slice(0,half)), joinLine(words.slice(half))];
  }
  var blockH=34+18+lines.length*64;
  var y=topY+Math.max(0,(bottomY-topY-blockH)/2);
  ctx.textAlign='center';
  ctx.fillStyle=ISUB;
  ctx.font='22px '+MONO;
  try{ ctx.letterSpacing='8px'; }catch(e){}
  ctx.fillText('KEYWORD', W/2, y+24);
  try{ ctx.letterSpacing='0px'; }catch(e){}
  ctx.fillStyle=IINK;
  ctx.font='40px '+DISP;
  var wy=y+24+18+52;
  lines.forEach(function(l){
    ctx.fillText(l, W/2, wy);
    wy+=64;
  });
  ctx.textAlign='left';
}

function loadCovers(urls){
  return Promise.all(urls.map(function(u){
    return new Promise(function(res){
      var im=new Image();
      im.crossOrigin='anonymous';
      var to=setTimeout(function(){ res(null); }, 6000);
      im.onload=function(){ clearTimeout(to); res(im); };
      im.onerror=function(){ clearTimeout(to); res(null); };
      im.src='https://images.weserv.nl/?url='+encodeURIComponent(u.replace(/^https?:\/\//,''));
    });
  })).then(function(a){ return a.filter(Boolean); });
}
function fontsReady(){
  return (document.fonts&&document.fonts.ready)?document.fonts.ready:Promise.resolve();
}

function makeImage(ym){
  var arr=state.books.filter(function(b){
    return b.date.slice(0,7)===ym&&(state.filter==='*'||b.member===state.filter);
  }).sort(function(a,b){ return a.date<b.date?-1:1; });
  if(!arr.length) return;
  var who=state.filter==='*'?CLUB:state.filter;
  var mixed=state.filter==='*';
  Promise.all([loadCovers(arr.map(function(b){ return b.cover; }).filter(Boolean).slice(0,8)), fontsReady()])
    .then(function(rs){ renderImage(ym, arr, rs[0], who, mixed); });
}
function renderImage(ym, arr, imgs, who, mixed){
  var W=1080, H=1350, M=90;
  var cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  var ctx=cv.getContext('2d');
  ctx.fillStyle=IPAPER; ctx.fillRect(0,0,W,H);
  ctx.textBaseline='alphabetic';
  ctx.fillStyle=ISUB;
  ctx.font='24px '+MONO;
  try{ ctx.letterSpacing='10px'; }catch(e){}
  ctx.fillText('DOKUSHO LOG', M, 138);
  try{ ctx.letterSpacing='0px'; }catch(e){}
  ctx.fillStyle=IINK;
  ctx.font='600 56px '+DISP;
  ctx.fillText(ymLabel(ym)+'の読書', M, 224);
  ctx.fillStyle=ISUB;
  ctx.font='26px '+MONO;
  ctx.fillText(who||'', M, 274);
  if(mixed){
    var bw=250, bh=182, bx=W-M-bw, by=104;
    ctx.fillStyle=IINK;
    if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,24); ctx.fill(); }
    else{ ctx.fillRect(bx,by,bw,bh); }
    ctx.fillStyle=IPAPER;
    ctx.globalAlpha=.55;
    ctx.font='19px '+MONO;
    try{ ctx.letterSpacing='4px'; }catch(e){}
    ctx.fillText('BOOKS', bx+26, by+48);
    try{ ctx.letterSpacing='0px'; }catch(e){}
    ctx.globalAlpha=1;
    ctx.font='600 96px '+DISP;
    ctx.fillText(String(arr.length), bx+22, by+150);
    var numW=ctx.measureText(String(arr.length)).width;
    ctx.fillStyle=IACC;
    ctx.font='600 32px '+DISP;
    ctx.fillText('冊', bx+22+numW+12, by+148);
  }
  ctx.strokeStyle=ILINE;
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(M,330); ctx.lineTo(W-M,330); ctx.stroke();
  var maxLines=9;
  var lineH=58, ly=396;
  var shown=arr.slice(0, arr.length>maxLines?maxLines-1:maxLines);
  var rightW=mixed?320:140;
  ctx.font='500 33px '+DISP;
  shown.forEach(function(b){
    var maxTW=W-2*M-rightW;
    var t='『'+b.title+'』';
    if(ctx.measureText(t).width>maxTW){
      var base=b.title;
      while(base.length>1 && ctx.measureText('『'+base+'…』').width>maxTW){ base=base.slice(0,-1); }
      t='『'+base+'…』';
    }
    ctx.fillStyle=IINK;
    ctx.fillText(t, M, ly);
    ctx.fillStyle=ISUB;
    ctx.font='24px '+MONO;
    ctx.textAlign='right';
    ctx.fillText((mixed?b.member+'　':'')+md(b.date), W-M, ly-3);
    ctx.textAlign='left';
    ctx.font='500 33px '+DISP;
    ly+=lineH;
  });
  if(arr.length>shown.length){
    ctx.fillStyle=ISUB;
    ctx.font='28px '+DISP;
    ctx.fillText(mixed?('ほか '+(arr.length-shown.length)+'冊'):'ほかにも数冊', M, ly);
  }
  if(imgs.length){
    var ch=110, gap=18;
    var cw=imgs.map(function(im){ return Math.round(ch*im.width/im.height); });
    var total=cw.reduce(function(a,b){ return a+b; },0)+gap*(cw.length-1);
    while(total>W-2*M && cw.length>1){
      imgs=imgs.slice(0,imgs.length-1); cw.pop();
      total=cw.reduce(function(a,b){ return a+b; },0)+gap*(cw.length-1);
    }
    var cx=(W-total)/2, cy=ly+16;
    imgs.forEach(function(im,i){
      ctx.drawImage(im, cx, cy, cw[i], ch);
      ctx.strokeStyle=ILINE; ctx.lineWidth=1;
      ctx.strokeRect(cx+0.5, cy+0.5, cw[i]-1, ch-1);
      cx+=cw[i]+gap;
    });
    ly=cy+ch+10;
  }
  var notes=arr.map(function(b){ return b.note; });
  var words=topWords(notes.concat(notes, arr.map(function(b){ return b.desc||''; })), 6);
  drawKeywords(ctx, W, M, ly+40, 1230, words);
  ctx.textAlign='left';
  ctx.textBaseline='alphabetic';
  ctx.fillStyle=IACC;
  ctx.font='500 28px '+MONO;
  ctx.fillText(TAG, M, 1290);
  ctx.fillStyle=ISUB;
  ctx.font='26px '+DISP;
  ctx.textAlign='right';
  ctx.fillText('読書ログ', W-M, 1290);
  ctx.textAlign='left';
  var url;
  try{ url=cv.toDataURL('image/png'); }
  catch(e){ if(imgs.length){ renderImage(ym, arr, [], who, mixed); } return; }
  presentImage(url, 'dokusho-'+ym+'.png');
}
function presentImage(url, fname){
  $('shot').src=url;
  $('overlay').classList.add('on');
  $('dl').onclick=function(){
    var a=document.createElement('a');
    a.href=url; a.download=fname; a.click();
  };
  var sh=$('share');
  sh.hidden=true;
  if(navigator.canShare&&window.fetch){
    fetch(url).then(function(r){ return r.blob(); }).then(function(bl){
      var f=new File([bl],fname,{type:'image/png'});
      if(navigator.canShare({files:[f]})){
        sh.hidden=false;
        sh.onclick=function(){ navigator.share({files:[f], text:TAG}).catch(function(){}); };
      }
    }).catch(function(){});
  }
}
function wrapLines(ctx, text, maxW){
  var lines=[], cur='';
  for(var i=0;i<text.length;i++){
    var t=cur+text[i];
    if(ctx.measureText(t).width>maxW && cur){ lines.push(cur); cur=text[i]; }
    else cur=t;
  }
  if(cur) lines.push(cur);
  return lines;
}
function makeBookImage(id){
  var b=state.books.find(function(x){ return String(x.id)===String(id); });
  if(!b) return;
  Promise.all([loadCovers(b.cover?[b.cover]:[]), fontsReady()])
    .then(function(rs){ renderBookImage(b, rs[0][0]||null); });
}
function renderBookImage(b, cover){
  var W=1080, H=1080, M=90;
  var cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  var ctx=cv.getContext('2d');
  ctx.fillStyle=IPAPER; ctx.fillRect(0,0,W,H);
  ctx.textBaseline='alphabetic';
  ctx.fillStyle=ISUB;
  ctx.font='24px '+MONO;
  try{ ctx.letterSpacing='10px'; }catch(e){}
  ctx.fillText('DOKUSHO LOG', M, 116);
  try{ ctx.letterSpacing='0px'; }catch(e){}
  ctx.textAlign='right';
  ctx.font='26px '+MONO;
  var dp=b.date.split('-');
  ctx.fillText((+dp[0])+'.'+(+dp[1])+'.'+(+dp[2])+' 読了', W-M, 116);
  ctx.textAlign='center';
  var y;
  if(cover){
    var maxS=460;
    var chh=maxS, cww=Math.round(chh*cover.width/cover.height);
    if(cww>maxS){ cww=maxS; chh=Math.round(cww*cover.height/cover.width); }
    var cx=(W-cww)/2, cy=170+(maxS-chh)/2;
    ctx.drawImage(cover, cx, cy, cww, chh);
    ctx.strokeStyle=ILINE; ctx.lineWidth=1;
    ctx.strokeRect(cx+0.5, cy+0.5, cww-1, chh-1);
    y=710;
  }else{
    ctx.font='600 60px '+DISP;
    var estT=wrapLines(ctx, '『'+b.title+'』', W-2*M).slice(0,3);
    var blockH=estT.length*88+(b.author?50:0);
    if(b.note){
      ctx.font='44px '+DISP;
      blockH+=70+Math.min(3, wrapLines(ctx, '「'+b.note+'」', W-2*M).length)*70;
    }
    y=Math.max(280, 620-Math.round(blockH/2));
  }
  var tfs=cover?46:60, tlh=cover?68:88, tmax=cover?2:3;
  ctx.fillStyle=IINK;
  ctx.font='600 '+tfs+'px '+DISP;
  var tl=wrapLines(ctx, '『'+b.title+'』', W-2*M);
  if(tl.length>tmax){ tl=tl.slice(0,tmax); tl[tmax-1]=tl[tmax-1].slice(0,-1)+'…』'; }
  tl.forEach(function(l){ ctx.fillText(l, W/2, y); y+=tlh; });
  if(b.author){
    ctx.fillStyle=ISUB;
    ctx.font='27px '+DISP;
    y+=6;
    ctx.fillText(b.author, W/2, y);
    y+=44;
  }
  if(b.note){
    ctx.fillStyle=IINK;
    var nfs=cover?38:44, nlh=cover?60:70;
    ctx.font=nfs+'px '+DISP;
    var nl=wrapLines(ctx, '「'+b.note+'」', W-2*M);
    if(nl.length>3){ nl=nl.slice(0,3); nl[2]=nl[2].slice(0,-1)+'…」'; }
    y+=cover?46:70;
    nl.forEach(function(l){
      if(y>960) return;
      ctx.fillText(l, W/2, y); y+=nlh;
    });
  }
  ctx.textAlign='left';
  ctx.fillStyle=IACC;
  ctx.font='500 28px '+MONO;
  ctx.fillText(TAG, M, 1010);
  ctx.fillStyle=ISUB;
  ctx.font='26px '+DISP;
  ctx.textAlign='right';
  ctx.fillText(b.member||'読書ログ', W-M, 1010);
  ctx.textAlign='left';
  var url;
  try{ url=cv.toDataURL('image/png'); }
  catch(e){ if(cover){ renderBookImage(b, null); } return; }
  presentImage(url, 'dokusho-'+b.date+'.png');
}
$('close').addEventListener('click', function(){ $('overlay').classList.remove('on'); });
$('overlay').addEventListener('click', function(e){ if(e.target===$('overlay')) $('overlay').classList.remove('on'); });

state.me=lsGet('yonda-me')||'';
try{
  var cache=JSON.parse(lsGet('yonda-cache-v1'));
  if(cache){ state.members=cache.members||[]; state.books=(cache.books||[]).map(normBook); }
}catch(e){}
render();
loadAll()
  .then(function(){
    render();
    if(!state.me){ openPick(); }
    else if(state.members.indexOf(state.me)<0){ state.me=''; lsSet('yonda-me',''); openPick(); }
    else{ checkMigrate(); }
  })
  .catch(function(){ netFail(); });
})();
</script>
