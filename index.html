</style>

<script>
(function(){
'use strict';
var DB_URL='https://lkctqbrpifyyofkcippj.supabase.co';
var DB_KEY='sb_publishable_YLr0hTxmAOmE6ebF6-rS7A_LUKzdr7z';
var TAG='#waиӘӯжӣёйғЁ';
var CLUB='гҒӮгҒҲгӮӢиӘӯжӣёйғЁ';
var APP_URL='https://lachimym.github.io/dokusho-log/';
var DISP="'Inter','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif";
var SANS="'Inter','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif";
var MONO="'IBM Plex Mono','Hiragino Kaku Gothic ProN',monospace";

var state={me:'', members:[], books:[], editing:null, filter:'*'};

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
var toastTimer=null;
function toast(msg){
  var t=$('toast');
  t.textContent=msg;
  t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ t.classList.remove('on'); }, 2600);
}
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function today(){
  var n=new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}
function md(iso){ var p=iso.split('-'); return (+p[1])+'/'+(+p[2]); }
function ymLabel(ym){ var p=ym.split('-'); return (+p[0])+'е№ҙ'+(+p[1])+'жңҲ'; }

var MEMCOL=[['#ff5a36','#ffffff'],['#8e6cff','#ffffff'],['#2456f0','#ffffff'],['#d4ff52','#131311']];
function memCol(name){
  var i=state.members.indexOf(name);
  if(i<0) i=0;
  return MEMCOL[i%MEMCOL.length];
}

function api(path, opts){
  opts=opts||{};
  opts.headers=Object.assign({
    'apikey':DB_KEY,
    'Authorization':'Bearer '+DB_KEY,
    'Content-Type':'application/json',
    'Prefer':'return=representation'
  }, opts.headers||{});
  return fetch(DB_URL+'/rest/v1/'+path, opts).then(function(r){
    if(r.status===204) return null;
    if(!r.ok) return r.json().catch(function(){ return {}; }).then(function(e){ var err=new Error('api '+r.status); err.status=r.status; err.body=e; throw err; });
    return r.json();
  });
}
function normBook(b){ b.desc=b.description||''; b.status=b.status||'read'; b.rating=+(b.rating||0); b.link=b.link||''; b.genre=b.genre||''; return b; }
function loadAll(){
  return Promise.all([
    api('members?select=name&order=name.asc'),
    api('books?select=*&order=date.desc,created_at.desc&limit=2000')
  ]).then(function(rs){
    state.members=rs[0].map(function(m){ return m.name; });
    state.books=rs[1].map(normBook);
    lsSet('yonda-cache-v1', JSON.stringify({members:state.members, books:state.books}));
    $('net').classList.remove('on');
  });
}
function netFail(){
  $('net').textContent='гғҚгғғгғҲгҒ«гҒӨгҒӘгҒҢгӮҠгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹгҖӮиЎЁзӨәгҒҜеүҚеӣһгҒ®еҶ…е®№гҒ§гҒҷгҖӮйӣ»жіўгҒ®иүҜгҒ„гҒЁгҒ“гӮҚгҒ§й–ӢгҒҚзӣҙгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ';
  $('net').classList.add('on');
}

  $('whoami').innerHTML=(state.me?'<span class="dot" style="background:'+mc[0]+'"></span>':'')+esc(state.me||'гӮІгӮ№гғҲпјҲиҰӢгӮӢгҒ гҒ‘пјү')+'<span style="color:var(--faint)">в–ҫ</span>';

function fetchBook(v){
  return fetch('https://api.openbd.jp/v1/get?isbn='+v)
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(!d||!d[0]) return null;
      var s=d[0].summary||{};
      var desc='';
      try{
        var tc=d[0].onix.CollateralDetail.TextContent||[];
        var t3=tc.filter(function(t){ return t.TextType==='03'; });
        desc=(t3.length?t3[0].Text:(tc.length?tc[0].Text:''))||'';
      }catch(e){}
      return { title:s.title||'', isbn:v, author:s.author||'', cover:s.cover||'', desc:String(desc).slice(0,400), genre:'' };
    });
}
function isbn13(v){
  if(v.length!==10) return v;
  var core='978'+v.slice(0,9);
  var sum=0;
  for(var i=0;i<12;i++){ sum+=(+core[i])*(i%2?3:1); }
  return core+((10-sum%10)%10);
}

function genreFromId(gid){
  if(!gid) return '';
  var paths=String(gid).split('/');
  var content='', fmt='';
  for(var i=0;i<paths.length;i++){
    var p=paths[i], top=p.slice(0,6);
    if(top==='001019'||top==='001020'){
      var sub=GEN_SUB[p.slice(6,9)];
      if(sub&&!fmt) fmt=sub;
    }else if(GEN_TOP[top]){
      if(!content) content=GEN_TOP[top];
    }
  }
  return content||fmt||'';
}
function rakutenGenreByTitle(title){
  if(!RKT_APP||!RKT_KEY||!title) return Promise.resolve('');
  return fetch('https://openapi.rakuten.co.jp/services/api/BooksBook/Search/20170404?format=json&formatVersion=2&applicationId='+RKT_APP+'&accessKey='+encodeURIComponent(RKT_KEY)+'&hits=5&title='+encodeURIComponent(title))
    .then(function(r){ return r.json(); })
    .then(function(d){
      var items=(d&&d.Items)||[];
      for(var i=0;i<items.length;i++){
        var it=items[i]; if(it&&it.Item) it=it.Item;
        var g=genreFromId(it.booksGenreId);
        if(g) return g;
      }
      return '';
    })
    .catch(function(){ return ''; });
}
function autoGenre(b){
  var p=b.isbn?rakutenByIsbn(b.isbn).then(function(info){ return info?info.genre:''; })
              :rakutenGenreByTitle(b.title);
  p.then(function(g){
    if(!g) return;
    api('books?id=eq.'+b.id, {method:'PATCH', body:JSON.stringify({genre:g})})
      .then(function(rs){
        var row=state.books.find(function(x){ return x.id===b.id; });
        if(row){ row.genre=g; render(); }
      })
      .catch(function(){});
  });
}
function rakutenByIsbn(v){
  if(!RKT_APP||!RKT_KEY) return Promise.resolve(null);
  return fetch('https://openapi.rakuten.co.jp/services/api/BooksBook/Search/20170404?format=json&formatVersion=2&applicationId='+RKT_APP+'&accessKey='+encodeURIComponent(RKT_KEY)+'&hits=1&isbn='+isbn13(v))
    .then(function(r){ return r.json(); })
    .then(function(d){
      var it=(d&&d.Items&&d.Items[0])||null;
      if(it&&it.Item) it=it.Item;
      if(!it) return null;
      return { title:it.title||'', isbn:v, author:it.author||'', cover:it.largeImageUrl||it.mediumImageUrl||'', desc:String(it.itemCaption||'').slice(0,400), genre:genreFromId(it.booksGenreId) };
    })
    .catch(function(){ return null; });
}
function fetchBookFull(v){
  return Promise.all([
    fetchBook(v).catch(function(){ return null; }),
    rakutenByIsbn(v)
  ]).then(function(r){
    var info=r[0], rk=r[1];
    if(!info&&!rk) return null;
    if(!info) return rk;
    if(!rk) return info;
    return { title:info.title||rk.title, isbn:v, author:info.author||rk.author, cover:info.cover||rk.cover, desc:info.desc||rk.desc, genre:info.genre||rk.genre };
  });
}
function lookupIsbn(v){

    }
    return;
  }
  var card=e.target.closest('.book');
  if(!card) return;
  var id=card.getAttribute('data-id');
  var b=state.books.find(function(x){ return String(x.id)===String(id); });
  if(!b) return;
  var act=e.target.getAttribute('data-act');
  if(card.classList.contains('edit')){
    if(!act) return;
    if(act==='cancel'){ state.editing=null; render(); return; }
    if(act==='del'){
      if(!confirm('гҖҺ'+b.title+'гҖҸгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹ')) return;
      api('books?id=eq.'+b.id, {method:'DELETE'})
        .then(function(){
          state.books=state.books.filter(function(x){ return x.id!==b.id; });
          state.editing=null; render();
        })
        .catch(function(){ toast('еүҠйҷӨгҒ§гҒҚгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹгҖӮйӣ»жіўгӮ’зўәиӘҚгҒ—гҒҰгӮӮгҒҶдёҖеәҰгҒҠи©ҰгҒ—гҒҸгҒ гҒ•гҒ„гҖӮ'); });
      return;
    }
    if(act==='save'){
      var patch={};
      var nt=card.querySelector('.et').value.trim();
      if(nt){ patch.title=nt; patch.note=card.querySelector('.en').value.trim(); patch.date=card.querySelector('.ed').value||b.date; }
      patch.link=card.querySelector('.el').value.trim();
      patch.rating=+(card.querySelector('.es').getAttribute('data-v')||0);
      patch.genre=card.querySelector('.eg').value.trim();
      var ni=card.querySelector('.ei').value.replace(/[^0-9Xx]/g,'');
      var doSave=function(){
        api('books?id=eq.'+b.id, {method:'PATCH', body:JSON.stringify(patch)})
          .then(function(rs){
            Object.assign(b, normBook(rs[0]));
            state.books.sort(function(a,x){ return a.date<x.date?1:-1; });
            state.editing=null; render();
          })
          .catch(function(){ toast('дҝқеӯҳгҒ§гҒҚгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹгҖӮйӣ»жіўгӮ’зўәиӘҚгҒ—гҒҰгӮӮгҒҶдёҖеәҰгҒҠи©ҰгҒ—гҒҸгҒ гҒ•гҒ„гҖӮ'); });
      };
      if(ni!==(b.isbn||'')){
        patch.isbn=ni;
        if(!ni){ patch.cover=''; patch.description=''; patch.author=''; doSave(); }
        else if(ni.length===10||ni.length===13){
          fetchBookFull(ni).then(function(info){
            if(info){
              if(info.author) patch.author=info.author;
              if(info.cover) patch.cover=info.cover;
              if(info.desc) patch.description=info.desc;
              if(info.genre&&!patch.genre) patch.genre=info.genre;
            }
            doSave();
          }).catch(doSave);
        }else{ doSave(); }
      }else{ doSave(); }
      return;
    }
  }else{
    if(b.member!==state.me) return;
    state.editing=b.id; render();
  }
});

function uploadBooks(inc){
  var seen={};
  state.books.forEach(function(b){ if(b.member===state.me) seen[b.title+'|'+b.date]=1; });
  var rows=[];
  inc.forEach(function(b){
    if(b&&b.title&&b.date&&!seen[b.title+'|'+b.date]){
      rows.push({ member:state.me, title:b.title, note:b.note||'', date:b.date, status:b.status||'read',
        rating:+(b.rating||0), link:b.link||'', genre:b.genre||'',
        isbn:b.isbn||'', author:b.author||'', cover:b.cover||'', description:b.desc||b.description||'' });
      seen[b.title+'|'+b.date]=1;
    }
  });
  if(!rows.length) return Promise.resolve(0);
  return api('books', {method:'POST', body:JSON.stringify(rows)})
    .then(function(rs){
      rs.forEach(function(x){ state.books.push(normBook(x)); });
      state.books.sort(function(a,b){ return a.date<b.date?1:-1; });
      render();
      return rows.length;
    })
    .catch(function(){ toast('еҸ–гӮҠиҫјгҒҝгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹгҖӮйӣ»жіўгӮ’зўәиӘҚгҒ—гҒҰгӮӮгҒҶдёҖеәҰгҒҠи©ҰгҒ—гҒҸгҒ гҒ•гҒ„гҖӮ'); return 0; });
}

function topWords(items, max){
  var freq={};
  function feed(item){
    var t=item.t, ex=item.ex||'';
    if(!t) return;
    var words=[];
    if(window.Intl&&Intl.Segmenter){
      var seg=new Intl.Segmenter('ja',{granularity:'word'});
      for(var it of seg.segment(t)){ if(it.isWordLike) words.push(it.segment); }
    }else{
      words=t.split(/[\sгҖҒгҖӮпјҒпјҹ!?гғ»гҖҢгҖҚгҖҺгҖҸпјҲпјү()]+/);
    }
    var perText={};
    words.forEach(function(w){
      w=w.trim();
      if(w.length<2) return;
      if(STOP[w]) return;
      if(ex&&ex.indexOf(w)!==-1) return;
      if(/^[\d\p{P}\p{S}\s]+$/u.test(w)) return;
      if(/^[гғјгҖңгғ»вҖҰвҖҘвҖ•вҖ”вҖ“~]+$/.test(w)) return;
      if(w.length<=3&&/^[гҒҖ-гӮҹгғј]+$/.test(w)) return;
      perText[w]=(perText[w]||0)+1;
      if(perText[w]>2) return;
      freq[w]=(freq[w]||0)+1;
    });
  }
  items.forEach(feed);
  var list=Object.keys(freq).map(function(w){ return {w:w, f:freq[w]}; })
    .sort(function(a,b){ return b.f-a.f; });
  var strong=list.filter(function(x){ return x.f>=2; });
  return (strong.length>=3?strong:list).slice(0,max);
}

function drawKeywords(ctx, W, M, topY, bottomY, words){
  if(!words.length) return;
  ctx.font='40px '+DISP;
  function joinLine(ws){ return ws.map(function(x){ return x.w; }).join('гҖҖгҖҖ'); }
  var lines=[joinLine(words)];
  if(ctx.measureText(lines[0]).width>W-2*M){
    var half=Math.ceil(words.length/2);
    lines=[joinLine(words.slice(0,half)), joinLine(words.slice(half))];
  }
  var blockH=34+18+lines.length*64;
  var y=topY+Math.max(0,(bottomY-topY-blockH)/2);
  ctx.textAlign='center';
  ctx.fillStyle=ISUB;
  ctx.font='22px '+MONO;
  try{ ctx.letterSpacing='8px'; }catch(e){}
  ctx.fillText('KEYWORD', W/2, y+24);
  try{ ctx.letterSpacing='0px'; }catch(e){}
  ctx.fillStyle=IINK;
  ctx.font='40px '+DISP;
  var wy=y+24+18+52;
  lines.forEach(function(l){
    ctx.fillText(l, W/2, wy);
    wy+=64;
  });
  ctx.textAlign='left';
}

function loadCovers(urls){
  return Promise.all(urls.map(function(u){
    return new Promise(function(res){
      var im=new Image();
      im.crossOrigin='anonymous';
      var to=setTimeout(function(){ res(null); }, 6000);
      im.onload=function(){ clearTimeout(to); res(im); };
      im.onerror=function(){ clearTimeout(to); res(null); };
      im.src='https://images.weserv.nl/?url='+encodeURIComponent(u.replace(/^https?:\/\//,''));
    });
  })).then(function(a){ return a.filter(Boolean); });
}
function fontsReady(){
  return (document.fonts&&document.fonts.ready)?document.fonts.ready:Promise.resolve();
}

function makeImage(ym){
  var arr=state.books.filter(function(b){
    return b.status!=='want'&&b.date.slice(0,7)===ym&&(state.filter==='*'||b.member===state.filter);
  }).sort(function(a,b){ return a.date<b.date?-1:1; });
  if(!arr.length) return;
  var who=state.filter==='*'?CLUB:state.filter;
  var mixed=state.filter==='*';
  Promise.all([loadCovers(arr.map(function(b){ return b.cover; }).filter(Boolean).slice(0,8)), fontsReady()])
    .then(function(rs){ renderImage(ym, arr, rs[0], who, mixed); });
}
function renderImage(ym, arr, imgs, who, mixed){
  var W=1080, H=1350, M=90;
  var cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  var ctx=cv.getContext('2d');
  ctx.fillStyle=IPAPER; ctx.fillRect(0,0,W,H);
  ctx.textBaseline='alphabetic';
  ctx.fillStyle=ISUB;
  ctx.font='24px '+MONO;
  try{ ctx.letterSpacing='10px'; }catch(e){}
  ctx.fillText('DOKUSHO LOG', M, 138);
  try{ ctx.letterSpacing='0px'; }catch(e){}
  ctx.fillStyle=IINK;
  ctx.font='600 56px '+DISP;
  ctx.fillText(ymLabel(ym)+'гҒ®иӘӯжӣё', M, 224);
  ctx.fillStyle=ISUB;
  ctx.font='26px '+MONO;
  ctx.fillText(who||'', M, 274);
  if(mixed){
    var bw=250, bh=182, bx=W-M-bw, by=104;
    ctx.fillStyle=IINK;
    if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,24); ctx.fill(); }
    else{ ctx.fillRect(bx,by,bw,bh); }
    ctx.fillStyle=IPAPER;
    ctx.globalAlpha=.55;
    ctx.font='19px '+MONO;
    try{ ctx.letterSpacing='4px'; }catch(e){}
    ctx.fillText('BOOKS', bx+26, by+48);
    try{ ctx.letterSpacing='0px'; }catch(e){}
    ctx.globalAlpha=1;
    ctx.font='600 96px '+DISP;
    ctx.fillText(String(arr.length), bx+22, by+150);
    var numW=ctx.measureText(String(arr.length)).width;
    ctx.fillStyle=IACC;
    ctx.font='600 32px '+DISP;
    ctx.fillText('еҶҠ', bx+22+numW+12, by+148);
  }
  ctx.strokeStyle=ILINE;
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(M,330); ctx.lineTo(W-M,330); ctx.stroke();
  var maxLines=9;
  var lineH=58, ly=396;
  var shown=arr.slice(0, arr.length>maxLines?maxLines-1:maxLines);
  var rightW=mixed?320:140;
  ctx.font='500 33px '+DISP;
  shown.forEach(function(b){
    var maxTW=W-2*M-rightW;
    var t='гҖҺ'+b.title+'гҖҸ';
    if(ctx.measureText(t).width>maxTW){
      var base=b.title;
      while(base.length>1 && ctx.measureText('гҖҺ'+base+'вҖҰгҖҸ').width>maxTW){ base=base.slice(0,-1); }
      t='гҖҺ'+base+'вҖҰгҖҸ';
    }
    ctx.fillStyle=IINK;
    ctx.fillText(t, M, ly);
    ctx.fillStyle=ISUB;
    ctx.font='24px '+MONO;
    ctx.textAlign='right';
    ctx.fillText((mixed?b.member+'гҖҖ':'')+md(b.date), W-M, ly-3);
    ctx.textAlign='left';
    ctx.font='500 33px '+DISP;
    ly+=lineH;
  });
  if(arr.length>shown.length){
    ctx.fillStyle=ISUB;
    ctx.font='28px '+DISP;
    ctx.fillText(mixed?('гҒ»гҒӢ '+(arr.length-shown.length)+'еҶҠ'):'гҒ»гҒӢгҒ«гӮӮж•°еҶҠ', M, ly);
  }
  if(imgs.length){
    var ch=110, gap=18;
    var cw=imgs.map(function(im){ return Math.round(ch*im.width/im.height); });
    var total=cw.reduce(function(a,b){ return a+b; },0)+gap*(cw.length-1);
    while(total>W-2*M && cw.length>1){
      imgs=imgs.slice(0,imgs.length-1); cw.pop();
      total=cw.reduce(function(a,b){ return a+b; },0)+gap*(cw.length-1);
    }
    var cx=(W-total)/2, cy=ly+16;
    imgs.forEach(function(im,i){
      ctx.drawImage(im, cx, cy, cw[i], ch);
      ctx.strokeStyle=ILINE; ctx.lineWidth=1;
      ctx.strokeRect(cx+0.5, cy+0.5, cw[i]-1, ch-1);
      cx+=cw[i]+gap;
    });
    ly=cy+ch+10;
  }
  var kwItems=[];
  arr.forEach(function(b){
    kwItems.push({t:b.note, ex:b.title});
    kwItems.push({t:b.note, ex:b.title});
    kwItems.push({t:b.desc||'', ex:b.title});
  });
  var words=topWords(kwItems, 6);
  drawKeywords(ctx, W, M, ly+40, 1230, words);
  ctx.textAlign='left';
  ctx.textBaseline='alphabetic';
  ctx.fillStyle=IACC;
  ctx.font='500 28px '+MONO;
  ctx.fillText(TAG, M, 1290);
  ctx.fillStyle=ISUB;
  ctx.font='26px '+DISP;
  ctx.textAlign='right';
  ctx.fillText('иӘӯжӣёгғӯгӮ°', W-M, 1290);
  ctx.textAlign='left';
  var url;
  try{ url=cv.toDataURL('image/png'); }
  catch(e){ if(imgs.length){ renderImage(ym, arr, [], who, mixed); } return; }
  presentImage(url, 'dokusho-'+ym+'.png');
}
function presentImage(url, fname, book){
  $('shot').src=url;
  $('overlay').classList.add('on');
  var tc=$('txtcopy');
  tc.hidden=!book;
  if(book){ tc.onclick=function(){ copyText(makePostText(book)); }; }
  $('dl').onclick=function(){
    var a=document.createElement('a');
    a.href=url; a.download=fname; a.click();
  };
  var sh=$('share');
  sh.hidden=true;
  if(navigator.canShare&&window.fetch){
    fetch(url).then(function(r){ return r.blob(); }).then(function(bl){
      var f=new File([bl],fname,{type:'image/png'});
      if(navigator.canShare({files:[f]})){
        sh.hidden=false;
        sh.onclick=function(){ navigator.share({files:[f], text:TAG}).catch(function(){}); };
      }
    }).catch(function(){});
  }
}
function wrapLines(ctx, text, maxW){
  var lines=[], cur='';
  for(var i=0;i<text.length;i++){
    var t=cur+text[i];
    if(ctx.measureText(t).width>maxW && cur){ lines.push(cur); cur=text[i]; }
    else cur=t;
  }
  if(cur) lines.push(cur);
  return lines;
}
function makeBookImage(id){
  var b=state.books.find(function(x){ return String(x.id)===String(id); });
  if(!b) return;
  Promise.all([loadCovers(b.cover?[b.cover]:[]), fontsReady()])
    .then(function(rs){ renderBookImage(b, rs[0][0]||null); });
}
function renderBookImage(b, cover){
  var W=1080, H=1080, M=90;
  var cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  var ctx=cv.getContext('2d');
  ctx.fillStyle=IPAPER; ctx.fillRect(0,0,W,H);
  ctx.textBaseline='alphabetic';
  ctx.fillStyle=ISUB;
  ctx.font='24px '+MONO;
  try{ ctx.letterSpacing='10px'; }catch(e){}
  ctx.fillText('DOKUSHO LOG', M, 116);
  try{ ctx.letterSpacing='0px'; }catch(e){}
  ctx.textAlign='right';
  ctx.font='26px '+MONO;
  if(b.status==='want'){
    ctx.fillStyle=IACC;
    ctx.fillText('иӘӯгҒҝгҒҹгҒ„', W-M, 116);
    ctx.fillStyle=ISUB;
  }else{
    var dp=b.date.split('-');
    ctx.fillText((+dp[0])+'.'+(+dp[1])+'.'+(+dp[2])+' иӘӯдәҶ', W-M, 116);
  }
  ctx.textAlign='center';
  var y;
  if(cover){
    var maxS=460;
    var chh=maxS, cww=Math.round(chh*cover.width/cover.height);
    if(cww>maxS){ cww=maxS; chh=Math.round(cww*cover.height/cover.width); }
    var cx=(W-cww)/2, cy=170+(maxS-chh)/2;
    ctx.drawImage(cover, cx, cy, cww, chh);
    ctx.strokeStyle=ILINE; ctx.lineWidth=1;
    ctx.strokeRect(cx+0.5, cy+0.5, cww-1, chh-1);
    y=710;
  }else{
    ctx.font='600 60px '+DISP;
    var estT=wrapLines(ctx, 'гҖҺ'+b.title+'гҖҸ', W-2*M).slice(0,3);
    var blockH=estT.length*88+(b.author?50:0)+(b.rating?52:0);
    if(b.note){
      ctx.font='44px '+DISP;
      blockH+=70+Math.min(3, wrapLines(ctx, 'гҖҢ'+b.note+'гҖҚ', W-2*M).length)*70;
    }
    y=Math.max(280, 620-Math.round(blockH/2));
  }
  var tfs=cover?46:60, tlh=cover?68:88, tmax=cover?2:3;
  ctx.fillStyle=IINK;
  ctx.font='600 '+tfs+'px '+DISP;
  var tl=wrapLines(ctx, 'гҖҺ'+b.title+'гҖҸ', W-2*M);
  if(tl.length>tmax){ tl=tl.slice(0,tmax); tl[tmax-1]=tl[tmax-1].slice(0,-1)+'вҖҰгҖҸ'; }
  tl.forEach(function(l){ ctx.fillText(l, W/2, y); y+=tlh; });
  if(b.author){
    ctx.fillStyle=ISUB;
    ctx.font='27px '+DISP;
    y+=6;
    ctx.fillText(b.author, W/2, y);
    y+=44;
  }
  if(b.rating){
    var sf='вҳ…вҳ…вҳ…вҳ…вҳ…'.slice(0,b.rating), se='вҳҶвҳҶвҳҶвҳҶвҳҶ'.slice(0,5-b.rating);
    ctx.font='34px '+SANS;
    var w1=ctx.measureText(sf).width, w2=ctx.measureText(se).width;
    var sx0=(W-(w1+w2))/2;
    ctx.textAlign='left';
    ctx.fillStyle=IACC;
    ctx.fillText(sf, sx0, y+6);
    ctx.fillStyle='#d8d5cb';
    ctx.fillText(se, sx0+w1, y+6);
    ctx.textAlign='center';
    y+=52;
  }
  if(b.note){
    ctx.fillStyle=IINK;
    var nfs=cover?38:44, nlh=cover?60:70;
    ctx.font=nfs+'px '+DISP;
    var nl=wrapLines(ctx, 'гҖҢ'+b.note+'гҖҚ', W-2*M);
    if(nl.length>3){ nl=nl.slice(0,3); nl[2]=nl[2].slice(0,-1)+'вҖҰгҖҚ'; }
    y+=cover?46:70;
    nl.forEach(function(l){
      if(y>960) return;
      ctx.fillText(l, W/2, y); y+=nlh;
    });
  }
  ctx.textAlign='left';
  ctx.fillStyle=IACC;
  ctx.font='500 28px '+MONO;
  ctx.fillText(TAG, M, 1010);
  ctx.fillStyle=ISUB;
  ctx.font='26px '+DISP;
  ctx.textAlign='right';
  ctx.fillText(b.member||'иӘӯжӣёгғӯгӮ°', W-M, 1010);
  ctx.textAlign='left';
  var url;
  try{ url=cv.toDataURL('image/png'); }
  catch(e){ if(cover){ renderBookImage(b, null); } return; }
  presentImage(url, 'dokusho-'+b.date+'.png', b);
}
$('close').addEventListener('click', function(){ $('overlay').classList.remove('on'); });
$('overlay').addEventListener('click', function(e){ if(e.target===$('overlay')) $('overlay').classList.remove('on'); });

state.me=lsGet('yonda-me')||'';
try{
  var cache=JSON.parse(lsGet('yonda-cache-v1'));
  if(cache){ state.members=cache.members||[]; state.books=(cache.books||[]).map(normBook); }
}catch(e){}
render();
loadAll()
  .then(function(){
    render();
    if(!state.me){ if(!lsGet('yonda-guest')) openPick(); }
    else if(state.members.indexOf(state.me)<0){ state.me=''; lsSet('yonda-me',''); openPick(); }
    else{ checkMigrate(); }
  })
  .catch(function(){ netFail(); });
})();
</script>
