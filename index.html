<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>読書log</title>
<link rel="icon" type="image/png" href="icon-180.png">
<link rel="apple-touch-icon" href="icon-180.png">

<meta property="og:type" content="website">
<meta property="og:site_name" content="読書log">
<meta property="og:title" content="読書log｜#wa読書部">
<meta property="og:description" content="みんなで読んだ本を記録して見せ合う読書ログ。">
<meta property="og:url" content="https://lachimym.github.io/dokusho-log/">
<meta property="og:image" content="https://lachimym.github.io/dokusho-log/ogp.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="1200">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="読書log｜#wa読書部">
<meta name="twitter:description" content="みんなで読んだ本を記録して見せ合う読書ログ。">
<meta name="twitter:image" content="https://lachimym.github.io/dokusho-log/ogp.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f4f3ef; --card:#fbfaf6; --muted:#ebe9e2; --ink:#131311; --sub:#6b6b66; --faint:#9a988f;
  --line:rgba(19,19,17,.08); --line-soft:rgba(19,19,17,.06);
  --accent:#ff5a36; --on-accent:#ffffff;
  --sans:'Inter',-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  --mono:'IBM Plex Mono',"Hiragino Kaku Gothic ProN",ui-monospace,monospace;
}
@media (prefers-color-scheme: dark){
  :root{ --paper:#141412; --card:#1d1c19; --muted:#282722; --ink:#f4f3ef; --sub:#a5a299; --faint:#6e6c64;
    --line:rgba(244,243,239,.1); --line-soft:rgba(244,243,239,.07); }
}
:root[data-theme="light"]{ --paper:#f4f3ef; --card:#fbfaf6; --muted:#ebe9e2; --ink:#131311; --sub:#6b6b66; --faint:#9a988f;
  --line:rgba(19,19,17,.08); --line-soft:rgba(19,19,17,.06); }
:root[data-theme="dark"]{ --paper:#141412; --card:#1d1c19; --muted:#282722; --ink:#f4f3ef; --sub:#a5a299; --faint:#6e6c64;
  --line:rgba(244,243,239,.1); --line-soft:rgba(244,243,239,.07); }
*{ box-sizing:border-box; }
body{ margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased; }
main{ max-width:560px; margin:0 auto; padding:14px 16px 60px; }
header.app{ position:relative; text-align:center; padding:2px 0 8px; }
#menu{ position:fixed; top:10px; right:12px; z-index:25; width:42px; height:42px; display:flex; align-items:center; justify-content:center; background:var(--card); border:1px solid var(--line); border-radius:12px; color:var(--ink); cursor:pointer; box-shadow:0 1px 4px rgba(19,19,17,.06); }
#menu:active{ transform:scale(.95); }
.logo{ width:172px; max-width:56%; height:auto; }
#logodark{ display:none; }
@media (prefers-color-scheme: dark){ #logo{ display:none; } #logodark{ display:inline-block; } }
:root[data-theme="dark"] #logo{ display:none; }
:root[data-theme="dark"] #logodark{ display:inline-block; }
:root[data-theme="light"] #logo{ display:inline-block; }
:root[data-theme="light"] #logodark{ display:none; }
#net{ display:none; font-size:12px; color:var(--accent); border:1px solid var(--line); background:var(--card); border-radius:12px; padding:10px 14px; margin-bottom:10px; }
#net.on{ display:block; }
#toast{ position:fixed; left:50%; bottom:28px; transform:translateX(-50%); background:var(--ink); color:var(--paper); font-size:13px; padding:10px 18px; border-radius:999px; opacity:0; transition:opacity .25s; pointer-events:none; z-index:40; max-width:86vw; }
#toast.on{ opacity:1; }
.banner{ font-size:13px; color:var(--sub); background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px 14px; margin-top:10px; line-height:1.8; }
.banner button{ background:var(--muted); border:none; color:var(--ink); border-radius:6px; padding:5px 12px; font-size:12px; font-family:var(--sans); font-weight:500; cursor:pointer; margin-right:6px; }
.banner button.acc{ background:var(--ink); color:var(--paper); }
.ptext{ font-size:12px; color:var(--sub); background:var(--paper); border:1px solid var(--line-soft); border-radius:8px; padding:8px 10px; margin:8px 0; white-space:pre-wrap; word-break:break-all; line-height:1.7; }
#bento{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
.bcard{ border-radius:16px; padding:14px 16px; min-height:82px; display:flex; align-items:center; justify-content:space-between; }
.bcard.dark{ background:var(--ink); color:var(--paper); }
.bcard.hot{ background:var(--accent); color:var(--on-accent); }
.blabel{ font-size:13px; font-weight:600; line-height:1.35; }
.blabel small{ font-size:10.5px; font-weight:500; opacity:.65; }
#tagline{ text-align:center; font-size:12.5px; font-weight:500; color:var(--sub); letter-spacing:.02em; margin:2px 0 14px; }
.bnum{ display:flex; align-items:baseline; gap:3px; }
.bbig{ font-size:34px; font-weight:700; letter-spacing:-0.03em; line-height:1; }
.bunit{ font-size:13px; font-weight:500; opacity:.85; }
#recbtn{ width:100%; display:flex; align-items:center; justify-content:center; gap:8px; background:var(--muted); border:none; color:var(--ink); border-radius:16px; padding:16px; font-size:15px; font-weight:600; font-family:var(--sans); cursor:pointer; margin-bottom:4px; }
#recbtn:active{ transform:scale(.99); }
#recbtn .plus{ width:24px; height:24px; border-radius:50%; background:var(--ink); color:var(--paper); display:flex; align-items:center; justify-content:center; font-size:16px; }
#filterwrap{ position:relative; margin-top:14px; }
#filter{ display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; padding-right:26px; scroll-behavior:smooth; }
#filter::-webkit-scrollbar{ display:none; }
.chip{ display:flex; align-items:center; gap:6px; flex:none; background:var(--card); border:1px solid var(--line); color:var(--sub); border-radius:999px; padding:6px 13px; font-size:12px; font-weight:500; font-family:var(--sans); cursor:pointer; }
.chip.on{ background:var(--ink); border-color:var(--ink); color:var(--paper); }
.dot{ display:inline-block; width:8px; height:8px; border-radius:50%; flex:none; }
#filtnext{ position:absolute; right:0; top:0; bottom:0; width:26px; display:flex; align-items:center; justify-content:flex-end; background:linear-gradient(90deg, transparent, var(--paper) 55%); border:none; color:var(--sub); cursor:pointer; }
#monthback{ display:none; align-items:center; gap:8px; font-size:12px; color:var(--sub); margin-top:12px; }
#monthback.on{ display:flex; }
#monthback button{ background:var(--muted); border:none; color:var(--ink); border-radius:8px; padding:6px 12px; font-size:12px; font-weight:500; font-family:var(--sans); cursor:pointer; }
.sect{ margin-top:20px; }
.sect>.head{ display:flex; align-items:center; gap:8px; padding:0 2px 10px; }
.sect .stitle{ font-size:14px; font-weight:600; display:flex; align-items:center; gap:7px; }
.sect .stitle .mk{ width:7px; height:7px; border-radius:50%; background:var(--ink); flex:none; }
.sect .scount{ font-family:var(--mono); font-size:12px; color:var(--ink); }
.sect .scount b{ color:var(--accent); font-weight:600; }
.mkimg{ margin-left:auto; background:none; border:none; color:var(--faint); cursor:pointer; display:flex; align-items:center; gap:4px; font-family:var(--mono); font-size:10px; letter-spacing:.05em; }
.mkimg:active{ transform:scale(.96); }
.grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px 14px; }
.gcard{ min-width:0; }
.gcard.mine .cvwrap{ cursor:pointer; }
.cvwrap{ position:relative; aspect-ratio:1/1; border-radius:12px; overflow:hidden; background:var(--muted); border:1px solid var(--line); }
.cvwrap img{ width:100%; height:100%; object-fit:contain; display:block; }
.cvwrap .noimg{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--faint); font-family:var(--mono); font-size:15px; font-weight:500; letter-spacing:.1em; text-align:center; line-height:1.5; }
.sharebtn{ position:absolute; top:8px; right:8px; width:30px; height:30px; border-radius:9px; background:rgba(251,250,246,.92); border:1px solid var(--line); color:var(--ink); display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0; }
:root[data-theme="dark"] .sharebtn{ background:rgba(29,28,25,.92); }
@media (prefers-color-scheme: dark){ .sharebtn{ background:rgba(29,28,25,.92); } }
.sharebtn:active{ transform:scale(.92); }
.gg{ font-size:10.5px; color:var(--sub); margin-top:9px; }
.gt{ font-size:13.5px; font-weight:600; line-height:1.4; letter-spacing:-0.01em; margin-top:3px; }
.gm{ display:flex; align-items:center; flex-wrap:wrap; gap:6px; margin-top:6px; font-size:11px; color:var(--sub); }
.gm .d{ font-family:var(--mono); font-size:10px; color:var(--faint); }
.pill{ font-family:var(--mono); font-size:9px; letter-spacing:.08em; padding:2px 7px; border-radius:4px; font-weight:500; }
.rstars{ color:var(--accent); font-size:10px; letter-spacing:1px; }
.gnote{ font-size:11.5px; color:var(--sub); margin-top:5px; line-height:1.65; }
.blink{ display:inline-block; margin-top:5px; color:var(--accent); font-size:11px; text-decoration:none; border-bottom:1px solid var(--accent); }
.fin1{ margin-top:8px; background:none; border:1px solid var(--accent); color:var(--accent); border-radius:8px; padding:5px 12px; font-size:11px; font-weight:600; font-family:var(--sans); cursor:pointer; }
.fin1:active{ transform:scale(.98); }
.empty{ text-align:center; color:var(--sub); font-size:13px; padding:44px 10px; line-height:2; }
.empty .big{ font-size:16px; font-weight:600; color:var(--ink); letter-spacing:-0.02em; }
footer.app{ margin-top:40px; text-align:center; }
footer.app button{ background:none; border:none; color:var(--faint); font-family:var(--mono); font-size:10px; letter-spacing:.12em; cursor:pointer; padding:4px 6px; }
/* edit card (spans grid) */
.ecard{ grid-column:1/-1; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; }
.ecard input[type="text"]{ width:100%; border:none; border-bottom:1px solid var(--line); background:none; color:var(--ink); padding:8px 2px; font-size:14px; font-family:var(--sans); outline:none; border-radius:0; }
.ecard input[type="text"]:focus{ border-bottom-color:var(--accent); }
.ecard .es{ margin-top:8px; }
.ecard .row{ display:flex; align-items:center; gap:8px; margin-top:12px; flex-wrap:wrap; }
.ecard .row input[type="date"]{ border:1px solid var(--line); background:none; color:var(--sub); border-radius:8px; padding:6px 8px; font-size:12px; font-family:var(--mono); color-scheme:light dark; }
.es{ display:flex; gap:2px; }
.estar{ background:none; border:none; font-size:22px; line-height:1; color:var(--faint); cursor:pointer; padding:2px; }
.estar.on{ color:var(--accent); }
.btn{ background:var(--muted); border:none; color:var(--ink); border-radius:8px; padding:8px 14px; font-size:12.5px; font-weight:500; font-family:var(--sans); cursor:pointer; }
.btn:active{ transform:scale(.98); }
.btn.save{ background:var(--ink); color:var(--paper); }
.btn.del{ margin-left:auto; background:none; color:var(--faint); }
/* modals */
.modal{ position:fixed; inset:0; background:rgba(19,19,17,.5); display:none; z-index:30; }
.modal.on{ display:flex; }
#overlay, #pick, #entrymodal, #editmodal{ align-items:center; justify-content:center; padding:20px; }
#sheet, #picksheet, #esheet, #edsheet{ background:var(--card); border-radius:18px; padding:16px; max-width:440px; width:100%; max-height:92vh; overflow:auto; }
#edsheet input[type="text"]{ width:100%; border:none; border-bottom:1px solid var(--line); background:none; color:var(--ink); padding:9px 2px; font-family:var(--sans); font-size:14px; outline:none; border-radius:0; }
#edsheet input[type="text"]:focus{ border-bottom-color:var(--accent); }
#edsheet input#ed-title{ font-size:16px; font-weight:500; }
#edsheet input#ed-isbn{ width:150px; flex:none; font-family:var(--mono); font-size:13px; }
#edsheet input#ed-link, #edsheet input#ed-genre{ font-size:12.5px; }
#ed-isbnst{ font-size:11px; color:var(--sub); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#ed-del{ color:var(--faint); background:none; }
#shot{ width:100%; border-radius:10px; display:block; }
#shotswrap{ display:none; position:relative; }
#shots{ display:flex; overflow-x:auto; scroll-snap-type:x mandatory; scrollbar-width:none; border-radius:10px; }
#shots::-webkit-scrollbar{ display:none; }
#shots img{ flex:0 0 100%; scroll-snap-align:center; width:100%; border-radius:10px; display:block; }
#shotctrl{ display:none; align-items:center; justify-content:center; gap:16px; margin-top:12px; }
#shotswrap.multi #shotctrl{ display:flex; }
.shotnav{ width:36px; height:36px; border-radius:50%; background:var(--muted); color:var(--ink); border:none; font-size:22px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0; }
.shotnav:active{ transform:scale(.92); }
#shotdots{ display:flex; justify-content:center; gap:7px; }
.shotdot{ width:7px; height:7px; border-radius:50%; background:var(--line); }
.shotdot.on{ background:var(--accent); }
#sheet .hint{ font-size:12px; color:var(--sub); margin:10px 2px; line-height:1.7; }
#sheet .row{ display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; }
.mhead{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.mhead span{ font-size:16px; font-weight:600; }
.xbtn{ width:30px; height:30px; border-radius:8px; background:var(--muted); border:none; color:var(--ink); font-size:14px; cursor:pointer; }
#esheet input#title{ font-size:16px; font-weight:500; }
#esheet input#note{ font-size:15px; }
.ncount{ text-align:right; font-family:var(--mono); font-size:10px; color:var(--faint); margin-top:2px; }
.isbnrow{ display:flex; align-items:center; gap:10px; margin-top:6px; }
.isbnrow input{ width:150px; flex:none; font-size:13px !important; font-family:var(--mono); }
#isbnst{ font-size:11px; color:var(--sub); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#esheet input#link{ font-size:12px !important; margin-top:6px; }
.starsrow{ display:flex; align-items:center; gap:10px; margin-top:12px; }
.starsrow .lbl{ font-size:12px; color:var(--sub); }
.datebtns{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:14px; }
.datebtns label{ font-size:12px; color:var(--sub); }
.datebtns input[type="date"]{ border:1px solid var(--line); background:none; color:var(--sub); border-radius:8px; padding:7px 8px; font-size:13px; font-family:var(--mono); color-scheme:light dark; }
.datebtns .acts{ display:flex; gap:8px; }
#want{ background:var(--muted); border:none; color:var(--ink); border-radius:10px; padding:11px 16px; font-size:14px; font-weight:600; font-family:var(--sans); cursor:pointer; white-space:nowrap; }
#add{ background:var(--ink); color:var(--paper); border:none; border-radius:10px; padding:11px 20px; font-size:14px; font-weight:600; font-family:var(--sans); cursor:pointer; white-space:nowrap; }
#want:active, #add:active{ transform:scale(.98); }
#want:disabled, #add:disabled{ opacity:.5; }
#esheet input#title{ width:100%; }
#esheet > #esheet-form input[type="text"]{ width:100%; border:none; border-bottom:1px solid var(--line); background:none; color:var(--ink); padding:9px 2px; font-family:var(--sans); outline:none; border-radius:0; }
#esheet input[type="text"]{ width:100%; border:none; border-bottom:1px solid var(--line); background:none; color:var(--ink); padding:9px 2px; font-family:var(--sans); outline:none; border-radius:0; }
#esheet input[type="text"]:focus{ border-bottom-color:var(--accent); }
#sugg{ display:none; background:var(--paper); border:1px solid var(--line); border-radius:12px; margin-top:6px; overflow:hidden; }
#sugg.on{ display:block; }
.sg{ display:block; width:100%; text-align:left; background:none; border:none; border-top:1px solid var(--line-soft); padding:10px 12px; cursor:pointer; font-family:var(--sans); }
.sg:first-child{ border-top:none; }
.sg:active{ background:var(--muted); }
.sg .st{ font-size:13px; font-weight:600; color:var(--ink); line-height:1.4; }
.sg .sa{ font-size:11px; color:var(--sub); margin-top:2px; }
/* pick */
#picksheet h2{ font-size:17px; font-weight:600; letter-spacing:-0.02em; margin:6px 4px 4px; }
#picksheet .lead{ font-size:12px; color:var(--sub); margin:0 4px 14px; }
#members{ display:flex; flex-direction:column; gap:8px; }
.mem{ display:flex; align-items:center; gap:10px; background:var(--paper); border:1px solid var(--line); color:var(--ink); border-radius:12px; padding:12px 14px; font-size:14px; font-weight:500; font-family:var(--sans); cursor:pointer; text-align:left; }
.mem:active{ transform:scale(.99); }
#picksheet .newrow{ display:flex; gap:8px; margin-top:16px; padding-top:14px; border-top:1px solid var(--line); }
#newname{ flex:1; min-width:0; border:none; border-bottom:1px solid var(--line); background:none; color:var(--ink); padding:8px 2px; font-size:14px; font-family:var(--sans); outline:none; border-radius:0; }
#picksheet .foot{ display:flex; justify-content:flex-end; gap:8px; margin-top:12px; }
#pickmsg{ font-size:12px; color:var(--accent); margin:0 4px 12px; }
/* drawer */
#drawer{ justify-content:flex-end; }
#dsheet{ background:var(--card); width:82%; max-width:340px; height:100%; padding:18px 16px; overflow:auto; }
#drawer .mhead{ margin-bottom:14px; }
#drec{ width:100%; display:flex; align-items:center; justify-content:center; gap:8px; background:var(--ink); color:var(--paper); border:none; border-radius:14px; padding:14px; font-size:15px; font-weight:600; font-family:var(--sans); cursor:pointer; margin-bottom:20px; }
#drec:active{ transform:scale(.99); }
#drec .plus{ width:22px; height:22px; border-radius:50%; background:var(--paper); color:var(--ink); display:flex; align-items:center; justify-content:center; font-size:15px; }
.dsect{ margin-bottom:22px; }
.dlabel{ font-family:var(--mono); font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--faint); margin-bottom:8px; }
#dwho{ display:flex; align-items:center; gap:9px; width:100%; background:var(--paper); border:1px solid var(--line); color:var(--ink); border-radius:12px; padding:12px 14px; font-size:14px; font-weight:500; font-family:var(--sans); cursor:pointer; text-align:left; }
#dmonths{ display:flex; flex-direction:column; gap:2px; }
.mrow{ display:flex; align-items:center; justify-content:space-between; width:100%; background:none; border:none; color:var(--ink); border-radius:10px; padding:11px 8px; font-size:14px; font-family:var(--sans); cursor:pointer; text-align:left; border-bottom:1px solid var(--line-soft); }
.mrow:last-child{ border-bottom:none; }
.mrow.on{ color:var(--accent); font-weight:600; }
.mrow .mc{ font-family:var(--mono); font-size:12px; color:var(--faint); }
</style>
</head>
<body>
<main>
<header class="app">
  <button id="menu" aria-label="メニュー"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
  <img id="logo" class="logo" src="logo.png" alt="読書log #wa読書部">
  <img id="logodark" class="logo" src="logo-dark.png" alt="読書log #wa読書部">
</header>

<div id="net"></div>

<p id="tagline">年に１冊でも、みんなで寄せれば無限大</p>

<div id="bento"></div>

<button id="recbtn"><span class="plus">＋</span>記録する</button>

<div id="postbox"></div>
<div id="migrate"></div>

<div id="filterwrap">
  <div id="filter"></div>
  <button id="filtnext" aria-label="右へ"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>
</div>

<div id="monthback"><button id="tonow">← 今月に戻る</button><span id="mbnow"></span></div>

<section id="shelf"></section>

<footer class="app">
  <button id="exp">EXPORT</button>·
  <button id="imp">IMPORT</button>·
  <button id="theme">THEME</button>
</footer>
</main>

<div id="overlay" class="modal">
  <div id="sheet">
    <img id="shot" alt="シェア画像">
    <div id="shotswrap">
      <div id="shots"></div>
      <div id="shotctrl">
        <button id="shotprev" class="shotnav" aria-label="前へ">‹</button>
        <div id="shotdots"></div>
        <button id="shotnext" class="shotnav" aria-label="次へ">›</button>
      </div>
    </div>
    <p class="hint" id="hint">スマホは画像を長押し→「写真に保存」または「コピー」で、そのままMisskeyに貼れます。</p>
    <div class="row">

<script>
(function(){
'use strict';
var DB_URL='https://lkctqbrpifyyofkcippj.supabase.co';
var DB_KEY='sb_publishable_YLr0hTxmAOmE6ebF6-rS7A_LUKzdr7z';
var TAG='#wa読書部';
var CLUB='あえる読書部';
var APP_URL='https://lachimym.github.io/dokusho-log/?v=3';
var DISP="'Inter','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif";
var SANS="'Inter','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif";
var MONO="'IBM Plex Mono','Hiragino Kaku Gothic ProN',monospace";
var NOTE_MAX=80;

var state={me:'', members:[], books:[], editing:null, filter:'*', viewMonth:null};

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
var toastTimer=null;
function toast(msg){
  var t=$('toast');
  t.textContent=msg;
  t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ t.classList.remove('on'); }, 2600);
}
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function today(){
  var n=new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}
function md(iso){ var p=iso.split('-'); return (+p[1])+'/'+(+p[2]); }
function ymLabel(ym){ var p=ym.split('-'); return (+p[0])+'年'+(+p[1])+'月'; }
function ymDot(ym){ var p=ym.split('-'); return (+p[0])+'.'+(+p[1]); }

var MEMCOL=[['#ff5a36','#ffffff'],['#8e6cff','#ffffff'],['#2456f0','#ffffff'],['#d4ff52','#131311']];
function memCol(name){
  var i=state.members.indexOf(name);
  if(i<0) i=0;
  return MEMCOL[i%MEMCOL.length];
}

function api(path, opts){
  opts=opts||{};
  opts.headers=Object.assign({
    'apikey':DB_KEY,
    'Authorization':'Bearer '+DB_KEY,
    'Content-Type':'application/json',
    'Prefer':'return=representation'
  }, opts.headers||{});
  return fetch(DB_URL+'/rest/v1/'+path, opts).then(function(r){
    if(r.status===204) return null;
    if(!r.ok) return r.json().catch(function(){ return {}; }).then(function(e){ var err=new Error('api '+r.status); err.status=r.status; err.body=e; throw err; });
    return r.json();
  });
}
function normBook(b){ b.desc=b.description||''; b.status=b.status||'read'; b.rating=+(b.rating||0); b.link=b.link||''; b.genre=b.genre||''; return b; }
function loadAll(){
  return Promise.all([
    api('members?select=name&order=name.asc'),
    api('books?select=*&order=date.desc,created_at.desc&limit=2000')
  ]).then(function(rs){
    state.members=rs[0].map(function(m){ return m.name; });
    state.books=rs[1].map(normBook);
    lsSet('yonda-cache-v1', JSON.stringify({members:state.members, books:state.books}));
    $('net').classList.remove('on');
  });
}
function netFail(){
  $('net').textContent='ネットにつながりませんでした。表示は前回の内容です。電波の良いところで開き直してください。';
  $('net').classList.add('on');
}

function starsHtml(v){
  var h='';
  for(var i=1;i<=5;i++){ h+='<button type="button" class="estar'+(i<=v?' on':'')+'" data-n="'+i+'">★</button>'; }
  return h;
}

function cardHtml(b){
  var mine=b.member===state.me;
  var c=memCol(b.member);
  var isWant=b.status==='want';
  var shareSvg='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><path d="M12 3v13"/><path d="M8 7l4-4 4 4"/></svg>';
  return '<div class="gcard'+(mine?' mine':'')+'" data-id="'+b.id+'">'+
    '<div class="cvwrap">'+
      (b.cover?'<img class="cv" src="'+esc(b.cover)+'" alt="" loading="lazy">':'<span class="noimg">NO<br>IMAGE</span>')+
      '<button class="sharebtn" aria-label="シェア">'+shareSvg+'</button>'+
    '</div>'+
    (b.genre?'<div class="gg">'+esc(b.genre)+'</div>':'')+
    '<div class="gt">'+esc(b.title)+'</div>'+
    '<div class="gm"><span class="pill" style="background:'+c[0]+';color:'+c[1]+'">'+esc(b.member)+'</span>'+
    (isWant?'':'<span class="d">'+md(b.date)+'</span>')+
    (b.rating?'<span class="rstars">'+'★★★★★'.slice(0,b.rating)+'</span>':'')+'</div>'+
    (b.note?'<div class="gnote">'+esc(b.note)+'</div>':'')+
    (b.link?'<a class="blink" href="'+esc(b.link)+'" target="_blank" rel="noopener">リンク↗</a>':'')+
    (isWant&&mine?'<div><button class="fin1">読了にする</button></div>':'')+
    '</div>';
}

function render(){
  var nowYm=today().slice(0,7), nowY=today().slice(0,4);
  var clubM=state.books.filter(function(b){ return b.status!=='want'&&b.date.slice(0,7)===nowYm; }).length;
  var clubY=state.books.filter(function(b){ return b.status!=='want'&&b.date.slice(0,4)===nowY; }).length;
  $('bento').innerHTML=
    '<div class="bcard dark"><span class="blabel">今月<br><small>みんなで</small></span><span class="bnum"><span class="bbig">'+clubM+'</span><span class="bunit">冊</span></span></div>'+
    '<div class="bcard hot"><span class="blabel">今年<br><small>みんなで</small></span><span class="bnum"><span class="bbig">'+clubY+'</span><span class="bunit">冊</span></span></div>';

  var f=$('filter');
  if(state.members.length){
    var chips='<button class="chip'+(state.filter==='*'?' on':'')+'" data-f="*">ALL</button>';
    chips+='<button class="chip'+(state.filter==='#tsundoku'?' on':'')+'" data-f="#tsundoku">積読</button>';
    state.members.forEach(function(m){
      var c=memCol(m);
      chips+='<button class="chip'+(state.filter===m?' on':'')+'" data-f="'+esc(m)+'"><span class="dot" style="background:'+c[0]+'"></span>'+esc(m)+'</button>';
    });
    f.innerHTML=chips;
  }else{ f.innerHTML=''; }

  var isTsundoku=state.filter==='#tsundoku';
  var viewingPast=!isTsundoku && !!state.viewMonth && state.viewMonth!==nowYm;
  var mb=$('monthback');
  if(viewingPast){ mb.classList.add('on'); $('mbnow').textContent=ymLabel(state.viewMonth)+'を表示中'; }
  else{ mb.classList.remove('on'); }

  var shelf=$('shelf');
  var html='';

  if(isTsundoku){
    var allWants=state.books.filter(function(b){ return b.status==='want'; })
      .sort(function(a,b){ return a.date<b.date?1:-1; });
    html+='<section class="sect"><div class="head"><span class="stitle"><span class="mk"></span>積読</span>'+
      '<span class="scount"><b>'+allWants.length+'</b>冊</span></div>';
    if(allWants.length){
      html+='<div class="grid">';
      allWants.forEach(function(b){ html+=cardHtml(b); });
      html+='</div>';
    }else{
      html+='<div class="empty"><div class="big">積読はまだありません</div>「＋記録する」の「積読」から追加できます。</div>';
    }
    html+='</section>';
    shelf.innerHTML=html;
    return;
  }

  var byMember=state.books.filter(function(b){ return state.filter==='*'||b.member===state.filter; });

  if(!viewingPast && state.filter!=='*'){
    var wants=byMember.filter(function(b){ return b.status==='want'; })
      .sort(function(a,b){ return a.date<b.date?1:-1; });
    if(wants.length){
      html+='<section class="sect"><div class="head"><span class="stitle"><span class="mk"></span>積読</span>'+
        '<span class="scount"><b>'+wants.length+'</b>冊</span></div><div class="grid">';
      wants.forEach(function(b){ html+=cardHtml(b); });
      html+='</div></section>';
    }
  }

  var targetYm=viewingPast?state.viewMonth:nowYm;
  var reads=byMember.filter(function(b){ return b.status!=='want'&&b.date.slice(0,7)===targetYm; })
    .sort(function(a,b){ return a.date<b.date?1:-1; });
  html+='<section class="sect"><div class="head"><span class="stitle"><span class="mk"></span>'+ymDot(targetYm)+'</span>'+
    '<span class="scount"><b>'+reads.length+'</b>冊</span>'+
    '<button class="mkimg" data-ym="'+targetYm+'"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 15l4-4 5 5"/><circle cx="9" cy="9" r="1.5"/></svg>まとめ画像</button></div>';
  if(reads.length){
    html+='<div class="grid">';
    reads.forEach(function(b){ html+=cardHtml(b); });
    html+='</div>';
  }else{
    html+='<div class="empty"><div class="big">まだ記録がありません</div>「＋記録する」から最初の1冊をどうぞ。</div>';
  }
  html+='</section>';
  shelf.innerHTML=html;
}

function fmtDrawer(){
  var who=state.me||'ゲスト（見るだけ）';
  var c=memCol(state.me);
  $('dwho').innerHTML=(state.me?'<span class="dot" style="background:'+c[0]+'"></span>':'')+esc(who)+'　<span style="color:var(--faint);margin-left:auto">切替 ▾</span>';
  var nowYm=today().slice(0,7);
  var groups={};
  state.books.forEach(function(b){ if(b.status!=='want'){ var ym=b.date.slice(0,7); groups[ym]=(groups[ym]||0)+1; } });
  var yms=Object.keys(groups).sort().reverse();
  var html='<button class="mrow'+((!state.viewMonth||state.viewMonth===nowYm)?' on':'')+'" data-ym="__now"><span>今月</span><span class="mc">'+(groups[nowYm]||0)+'冊</span></button>';
  yms.forEach(function(ym){
    if(ym===nowYm) return;
    html+='<button class="mrow'+(state.viewMonth===ym?' on':'')+'" data-ym="'+ym+'"><span>'+ymLabel(ym)+'</span><span class="mc">'+groups[ym]+'冊</span></button>';
  });
  $('dmonths').innerHTML=html;
}
function openDrawer(){ fmtDrawer(); $('drawer').classList.add('on'); }
$('menu').addEventListener('click', openDrawer);
$('dclose').addEventListener('click', function(){ $('drawer').classList.remove('on'); });
$('drec').addEventListener('click', function(){ $('drawer').classList.remove('on'); openEntry(); });
$('drawer').addEventListener('click', function(e){
  if(e.target===$('drawer')){ $('drawer').classList.remove('on'); return; }
  var mr=e.target.closest('.mrow');
  if(mr){
    var ym=mr.getAttribute('data-ym');
    state.viewMonth=(ym==='__now')?null:ym;
    $('drawer').classList.remove('on');
    render();
    window.scrollTo(0,0);
    return;
  }
  if(e.target.closest('#dwho')){ $('drawer').classList.remove('on'); openPick(); }
});
$('tonow').addEventListener('click', function(){ state.viewMonth=null; render(); });

/* filter scroll */
$('filtnext').addEventListener('click', function(){ $('filter').scrollBy({left:160,behavior:'smooth'}); });
$('filter').addEventListener('click', function(e){
  var c=e.target.closest('.chip');
  if(!c) return;
  state.filter=c.getAttribute('data-f');
  render();
});

/* record modal */
function openEntry(){
  if(!state.me){ openPick('記録するには名前が必要です。選ぶか、下の欄で追加してください。'); return; }
  $('entrymodal').classList.add('on');
  setTimeout(function(){ $('title').focus(); }, 50);
}
function closeEntry(){ $('entrymodal').classList.remove('on'); hideSugg(); }
$('recbtn').addEventListener('click', openEntry);
$('ecancel').addEventListener('click', closeEntry);
$('entrymodal').addEventListener('click', function(e){ if(e.target===$('entrymodal')) closeEntry(); });

function renderPick(){
  var box=$('members');
  box.innerHTML=state.members.map(function(m){
    var c=memCol(m);
    return '<button class="mem" data-m="'+esc(m)+'"><span class="dot" style="background:'+c[0]+'"></span>'+esc(m)+(m===state.me?'　✓':'')+'</button>';
  }).join('')||'<div style="font-size:13px;color:var(--sub);">まだ部員がいません。下で最初の部員を追加してください。</div>';
  $('pickclose').hidden=!state.me;
  $('guest').hidden=!!state.me;
}
function openPick(msg){
  renderPick();
  var pm=$('pickmsg');
  if(msg){ pm.textContent=msg; pm.hidden=false; }
  else{ pm.hidden=true; }
  $('pick').classList.add('on');
}
$('pick').addEventListener('click', function(e){
  var mb=e.target.closest('.mem');
  if(mb){
    state.me=mb.getAttribute('data-m');
    lsSet('yonda-me', state.me);
    lsSet('yonda-guest','');
    $('pick').classList.remove('on');
    render(); checkMigrate();
    return;
  }
  if(e.target===$('pick')&&(state.me||lsGet('yonda-guest'))){ $('pick').classList.remove('on'); }
});
$('pickclose').addEventListener('click', function(){ $('pick').classList.remove('on'); });
$('guest').addEventListener('click', function(){
  lsSet('yonda-guest','1');
  $('pick').classList.remove('on');
  render();
});
$('addmem').addEventListener('click', function(){
  var n=$('newname').value.trim();
  if(!n) return;
  if(state.members.indexOf(n)>=0){
    state.me=n; lsSet('yonda-me', n);
    $('pick').classList.remove('on'); render(); checkMigrate(); return;
  }
  api('members', {method:'POST', body:JSON.stringify({name:n})})
    .then(function(){
      state.members.push(n); state.members.sort();
      state.me=n; lsSet('yonda-me', n);
      lsSet('yonda-guest','');
      $('newname').value='';
      $('pick').classList.remove('on');
      render(); checkMigrate();
    })
    .catch(function(e){
      if(e.status===409){
        state.me=n; lsSet('yonda-me', n);
        $('pick').classList.remove('on'); render();
      }else{
        toast('追加できませんでした。電波を確認してもう一度お試しください。');
      }
    });
});

$('fin').value=today();
$('stars').innerHTML=starsHtml(0);
$('stars').addEventListener('click', function(e){
  var b=e.target.closest('.estar');
  if(!b) return;
  var cur=+(this.getAttribute('data-v')||0), n=+b.getAttribute('data-n');
  var nv=(n===cur)?0:n;
  this.setAttribute('data-v', nv);
  this.innerHTML=starsHtml(nv);
});
$('note').addEventListener('input', function(){ $('ncount').textContent=this.value.length; });

function makePostText(b){
  var lines=[];
  var who=b.author?'（'+b.author+'）':'';
  if(b.status==='want'){
    lines.push('積読『'+b.title+'』'+who);
  }else{
    var dp=b.date.split('-');
    lines.push((+dp[0])+'.'+(+dp[1])+'.'+(+dp[2])+' 読了『'+b.title+'』'+who);
  }
  if(b.rating) lines.push('★★★★★'.slice(0,b.rating)+'☆☆☆☆☆'.slice(0,5-b.rating));
  if(b.note) lines.push('「'+b.note+'」');
  lines.push(TAG+' '+APP_URL);
  return lines.join('\n');
}
function fallbackCopy(txt){
  var ta=document.createElement('textarea');
  ta.value=txt;
  ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand('copy'); toast('投稿用テキストをコピーしました。'); }
  catch(e){ toast('コピーできませんでした。長押しで選択してコピーしてください。'); }
  ta.remove();
}
function copyText(txt){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(
      function(){ toast('投稿用テキストをコピーしました。'); },
      function(){ fallbackCopy(txt); }
    );
  }else{ fallbackCopy(txt); }
}
function showPostBanner(b){
  var box=$('postbox');
  box.innerHTML='<div class="banner">登録しました。Misskeyに貼る用のテキスト：'+
    '<div class="ptext">'+esc(makePostText(b))+'</div>'+
    '<button class="acc" id="pb-copy">テキストをコピー</button>'+
    '<button id="pb-close">とじる</button></div>';
  $('pb-copy').onclick=function(){ copyText(makePostText(b)); };
  $('pb-close').onclick=function(){ box.innerHTML=''; };
}
function submitBook(status){
  var t=$('title').value.trim();
  if(!t){ $('title').focus(); return; }
  if(!state.me){ closeEntry(); openPick('記録するには名前が必要です。選ぶか、下の欄で追加してください。'); return; }
  $('add').disabled=true; $('want').disabled=true;
  var row={
    member:state.me, title:t, note:$('note').value.trim().slice(0,NOTE_MAX),
    date:(status==='want'?today():($('fin').value||today())), status:status,
    rating:+($('stars').getAttribute('data-v')||0),
    link:$('link').value.trim(),
    isbn:pending?pending.isbn:'', author:pending?pending.author:'',
    cover:pending?pending.cover:'', description:pending?pending.desc:'',
    genre:pending?(pending.genre||''):''
  };
  api('books', {method:'POST', body:JSON.stringify(row)})
    .then(function(rs){
      var saved=normBook(rs[0]);
      state.books.unshift(saved);
      state.books.sort(function(a,b){ return a.date<b.date?1:-1; });
      $('title').value=''; $('note').value=''; $('ncount').textContent='0'; $('fin').value=today();
      $('isbn').value=''; $('isbnst').textContent=''; pending=null;
      $('link').value='';
      $('stars').setAttribute('data-v','0');
      $('stars').innerHTML=starsHtml(0);
      state.viewMonth=null;
      closeEntry();
      render();
      showPostBanner(saved);
      if(!saved.genre&&saved.title) autoGenre(saved);
      if(status==='want') toast('「積読」に追加しました。');
      else toast('読了を記録しました。おつかれさまです。');
    })
    .catch(function(){ toast('保存できませんでした。電波を確認してもう一度お試しください。'); })
    .then(function(){ $('add').disabled=false; $('want').disabled=false; });
}
$('add').addEventListener('click', function(){ submitBook('read'); });

var sugTimer=null, sugItems=[], sugSeq=0;
function hideSugg(){ $('sugg').classList.remove('on'); $('sugg').innerHTML=''; sugItems=[]; }
function titleSuggest(q){
  if(!RKT_APP||!RKT_KEY) return;
  var seq=++sugSeq;
  fetch('https://openapi.rakuten.co.jp/services/api/BooksBook/Search/20170404?format=json&formatVersion=2&applicationId='+RKT_APP+'&accessKey='+encodeURIComponent(RKT_KEY)+'&hits=5&title='+encodeURIComponent(q))
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(seq!==sugSeq) return;
      var items=(d&&d.Items)||[];
      sugItems=items.slice(0,5).map(function(it){
        var v=(it&&it.Item)||it||{};
        return { title:v.title||'', author:v.author||'', isbn:v.isbn||'', cover:v.largeImageUrl||v.mediumImageUrl||'', desc:String(v.itemCaption||'').slice(0,400), genre:genreFromId(v.booksGenreId) };
      }).filter(function(x){ return x.title; });
      if(!sugItems.length){ hideSugg(); return; }
      $('sugg').innerHTML=sugItems.map(function(x,i){
        return '<button class="sg" data-i="'+i+'"><span class="st">'+esc(x.title)+'</span><span class="sa" style="display:block">'+esc(x.author||'')+'</span></button>';
      }).join('');
      $('sugg').classList.add('on');
    })
    .catch(function(){});
}

function fetchBook(v){
  return fetch('https://api.openbd.jp/v1/get?isbn='+v)
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(!d||!d[0]) return null;
      var s=d[0].summary||{};
      var desc='';
      try{
        var tc=d[0].onix.CollateralDetail.TextContent||[];
        var t3=tc.filter(function(t){ return t.TextType==='03'; });
        desc=(t3.length?t3[0].Text:(tc.length?tc[0].Text:''))||'';
      }catch(e){}
      return { title:s.title||'', isbn:v, author:s.author||'', cover:s.cover||'', desc:String(desc).slice(0,400), genre:'' };
    });
}
function isbn13(v){
  if(v.length!==10) return v;
  var core='978'+v.slice(0,9);
  var sum=0;
  for(var i=0;i<12;i++){ sum+=(+core[i])*(i%2?3:1); }
  return core+((10-sum%10)%10);
}
var GEN_TOP={'001001':'漫画','001002':'語学・学習','001003':'絵本・児童書','001004':'小説・エッセイ','001005':'IT・コンピュータ','001006':'ビジネス・経済','001007':'旅行・アウトドア','001008':'人文・社会','001009':'芸術・ホビー','001010':'暮らし・健康','001011':'エンタメ','001012':'科学・技術','001013':'写真集','001016':'資格・検定','001017':'ライトノベル','001021':'BL','001028':'医学・看護','001029':'TL'};
var GEN_SUB={'001':'小説・エッセイ','002':'暮らし・健康','003':'芸術・ホビー','005':'語学・学習','006':'旅行・アウトドア','007':'人文・社会','008':'ビジネス・経済','009':'IT・コンピュータ','010':'科学・技術','011':'漫画','012':'ライトノベル','013':'エンタメ','014':'写真集'};
function genreFromId(gid){
  if(!gid) return '';
  var paths=String(gid).split('/');
  var content='', fmt='';
  for(var i=0;i<paths.length;i++){
    var p=paths[i], top=p.slice(0,6);
    if(top==='001019'||top==='001020'){
      var sub=GEN_SUB[p.slice(6,9)];
      if(sub&&!fmt) fmt=sub;
    }else if(GEN_TOP[top]){
      if(!content) content=GEN_TOP[top];
    }
  }
  return content||fmt||'';
}
function rakutenGenreByTitle(title){
  if(!RKT_APP||!RKT_KEY||!title) return Promise.resolve('');
  return fetch('https://openapi.rakuten.co.jp/services/api/BooksBook/Search/20170404?format=json&formatVersion=2&applicationId='+RKT_APP+'&accessKey='+encodeURIComponent(RKT_KEY)+'&hits=5&title='+encodeURIComponent(title))
    .then(function(r){ return r.json(); })
    .then(function(d){
      var items=(d&&d.Items)||[];
      for(var i=0;i<items.length;i++){
        var it=items[i]; if(it&&it.Item) it=it.Item;
        var g=genreFromId(it.booksGenreId);
        if(g) return g;
      }
      return '';
    })
    .catch(function(){ return ''; });
}
function autoGenre(b){
  var p=b.isbn?rakutenByIsbn(b.isbn).then(function(info){ return info?info.genre:''; })
              :rakutenGenreByTitle(b.title);
  p.then(function(g){
    if(!g) return;
    api('books?id=eq.'+b.id, {method:'PATCH', body:JSON.stringify({genre:g})})
      .then(function(rs){
        var row=state.books.find(function(x){ return x.id===b.id; });
        if(row){ row.genre=g; render(); }
      })
      .catch(function(){});
  });
}
function rakutenByIsbn(v){
  if(!RKT_APP||!RKT_KEY) return Promise.resolve(null);
  return fetch('https://openapi.rakuten.co.jp/services/api/BooksBook/Search/20170404?format=json&formatVersion=2&applicationId='+RKT_APP+'&accessKey='+encodeURIComponent(RKT_KEY)+'&hits=1&isbn='+isbn13(v))
    .then(function(r){ return r.json(); })
    .then(function(d){
      var it=(d&&d.Items&&d.Items[0])||null;
      if(it&&it.Item) it=it.Item;
      if(!it) return null;
      return { title:it.title||'', isbn:v, author:it.author||'', cover:it.largeImageUrl||it.mediumImageUrl||'', desc:String(it.itemCaption||'').slice(0,400), genre:genreFromId(it.booksGenreId) };
    })
    .catch(function(){ return null; });
}
function fetchBookFull(v){
  return Promise.all([
    fetchBook(v).catch(function(){ return null; }),
    rakutenByIsbn(v)
  ]).then(function(r){
    var info=r[0], rk=r[1];
    if(!info&&!rk) return null;
    if(!info) return rk;
    if(!rk) return info;
    return { title:info.title||rk.title, isbn:v, author:info.author||rk.author, cover:info.cover||rk.cover, desc:info.desc||rk.desc, genre:info.genre||rk.genre };
  });
}
function lookupIsbn(v){
  $('isbnst').textContent='検索中…';
  fetchBookFull(v)
    .then(function(info){
      if(!info){ $('isbnst').textContent='見つかりませんでした（手入力でOK）'; pending=null; return; }
      pending=info;
      if(info.title){ settingTitle=true; $('title').value=info.title; settingTitle=false; }
      $('isbnst').textContent='✓ '+info.title+(info.author?'（'+info.author+'）':'')+(info.genre?'／'+info.genre:'');
    })
    .catch(function(){ $('isbnst').textContent='通信できませんでした（手入力でOK）'; pending=null; });
}

function uploadBooks(inc){
  var seen={};
  state.books.forEach(function(b){ if(b.member===state.me) seen[b.title+'|'+b.date]=1; });
  var rows=[];
  inc.forEach(function(b){
    if(b&&b.title&&b.date&&!seen[b.title+'|'+b.date]){
      rows.push({ member:state.me, title:b.title, note:b.note||'', date:b.date, status:b.status||'read',
        rating:+(b.rating||0), link:b.link||'', genre:b.genre||'',
        isbn:b.isbn||'', author:b.author||'', cover:b.cover||'', description:b.desc||b.description||'' });
      seen[b.title+'|'+b.date]=1;
    }
  });
  if(!rows.length) return Promise.resolve(0);
  return api('books', {method:'POST', body:JSON.stringify(rows)})
    .then(function(rs){
      rs.forEach(function(x){ state.books.push(normBook(x)); });
      state.books.sort(function(a,b){ return a.date<b.date?1:-1; });
      render();
      return rows.length;
    })
    .catch(function(){ toast('取り込みに失敗しました。電波を確認してもう一度お試しください。'); return 0; });
}

function topWords(items, max){
  var freq={};
  function feed(item){
    var t=item.t, ex=item.ex||'';
    if(!t) return;
    var words=[];
    if(window.Intl&&Intl.Segmenter){
      var seg=new Intl.Segmenter('ja',{granularity:'word'});
      var scriptOf=function(s){
        if(/^[゠-ヿー・]+$/.test(s)) return 'kana';
        if(/^[一-龯々〆ヶ]+$/.test(s)) return 'kanji';
        return '';
      };
      var buf='', bufSc='';
      var flush=function(){ if(buf) words.push(buf); buf=''; bufSc=''; };
      for(var it of seg.segment(t)){
        if(!it.isWordLike){ flush(); continue; }
        var s=it.segment, sc=scriptOf(s);
        if(buf&&sc&&sc===bufSc){ buf+=s; }
        else { flush(); buf=s; bufSc=sc; }
      }
      flush();
    }else{
      words=t.split(/[\s、。！？!?・「」『』（）()]+/);
    }
    var perText={};
    words.forEach(function(w){
      w=w.trim();
      if(w.length<2) return;
      if(STOP[w]) return;
      if(ex&&ex.indexOf(w)!==-1) return;
      if(/^[\d\p{P}\p{S}\s]+$/u.test(w)) return;
      if(/^[ー〜・…‥―—–~]+$/.test(w)) return;
      if(w.length<=3&&/^[぀-ゟー]+$/.test(w)) return;
      perText[w]=(perText[w]||0)+1;
      if(perText[w]>2) return;
      freq[w]=(freq[w]||0)+1;
    });
  }
  items.forEach(feed);
  var list=Object.keys(freq).map(function(w){ return {w:w, f:freq[w]}; })
    .sort(function(a,b){ return b.f-a.f; });
  var strong=list.filter(function(x){ return x.f>=2; });
  return (strong.length>=3?strong:list).slice(0,max);
}

var IPAPER='#f4f3ef', ICARD='#fbfaf6', IINK='#131311', ISUB='#6b6b66', IACC='#ff5a36', ILINE='#e0ded5';

function drawKeywords(ctx, W, M, topY, bottomY, words){
  if(!words.length) return;
  ctx.font='40px '+DISP;
  function joinLine(ws){ return ws.map(function(x){ return x.w; }).join('　　'); }
  var lines=[joinLine(words)];
  if(ctx.measureText(lines[0]).width>W-2*M){
    var half=Math.ceil(words.length/2);
    lines=[joinLine(words.slice(0,half)), joinLine(words.slice(half))];
  }
  var blockH=34+18+lines.length*64;
  var y=topY+Math.max(0,(bottomY-topY-blockH)/2);
  ctx.textAlign='center';
  ctx.fillStyle=ISUB;
  ctx.font='22px '+MONO;
  try{ ctx.letterSpacing='8px'; }catch(e){}
  ctx.fillText('KEYWORD', W/2, y+24);
  try{ ctx.letterSpacing='0px'; }catch(e){}
  ctx.fillStyle=IINK;
  ctx.font='40px '+DISP;
  var wy=y+24+18+52;
  lines.forEach(function(l){
    ctx.fillText(l, W/2, wy);
    wy+=64;
  });
  ctx.textAlign='left';
}

function loadCovers(urls){
  return Promise.all(urls.map(function(u){
    return new Promise(function(res){
      var im=new Image();
      im.crossOrigin='anonymous';
      var to=setTimeout(function(){ res(null); }, 6000);
      im.onload=function(){ clearTimeout(to); res(im); };
      im.onerror=function(){ clearTimeout(to); res(null); };
      im.src='https://images.weserv.nl/?url='+encodeURIComponent(u.replace(/^https?:\/\//,''));
    });
  })).then(function(a){ return a.filter(Boolean); });
}
function fontsReady(){
  return (document.fonts&&document.fonts.ready)?document.fonts.ready:Promise.resolve();
}

function loadCoverMap(books){
  return Promise.all(books.map(function(b){
    if(!b.cover) return Promise.resolve([b.id,null]);
    return new Promise(function(res){
      var im=new Image(); im.crossOrigin='anonymous';
      var to=setTimeout(function(){ res([b.id,null]); }, 6000);
      im.onload=function(){ clearTimeout(to); res([b.id,im]); };
      im.onerror=function(){ clearTimeout(to); res([b.id,null]); };
      im.src='https://images.weserv.nl/?url='+encodeURIComponent(String(b.cover).replace(/^https?:\/\//,''));
    });
  })).then(function(pairs){ var m={}; pairs.forEach(function(p){ m[p[0]]=p[1]; }); return m; });
}
function last12(ym){
  var y=+ym.slice(0,4), m=+ym.slice(5,7), out=[];
  for(var i=11;i>=0;i--){
    var mm=m-i, yy=y;
    while(mm<=0){ mm+=12; yy--; }
    out.push(yy+'-'+String(mm).padStart(2,'0'));
  }
  return out;
}
function roundRectPath(ctx,x,y,w,h,r){
  if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(x,y,w,h,r); return; }
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function drawShareIcon(ctx,x,y,s){
  ctx.save();
  ctx.fillStyle=IPAPER; ctx.strokeStyle=ILINE; ctx.lineWidth=1.5;
  roundRectPath(ctx,x,y,s,s,s*0.28); ctx.fill(); ctx.stroke();
  ctx.strokeStyle=IINK; ctx.lineWidth=s*0.09; ctx.lineCap='round'; ctx.lineJoin='round';
  var cx=x+s/2, top=y+s*0.26, bot=y+s*0.74;
  ctx.beginPath(); ctx.moveTo(cx,top); ctx.lineTo(cx,bot); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-s*0.16,top+s*0.16); ctx.lineTo(cx,top); ctx.lineTo(cx+s*0.16,top+s*0.16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+s*0.22,y+s*0.52); ctx.lineTo(x+s*0.22,y+s*0.78); ctx.lineTo(x+s*0.78,y+s*0.78); ctx.lineTo(x+s*0.78,y+s*0.52); ctx.stroke();
  ctx.restore();
}

function makeImage(ym){
  var arr=state.books.filter(function(b){
    return b.status!=='want'&&b.date.slice(0,7)===ym&&(state.filter==='*'||b.member===state.filter);
  }).sort(function(a,b){ return a.date<b.date?-1:1; });
  if(!arr.length){ toast('この月の記録がまだありません。'); return; }
  var who=state.filter==='*'?CLUB:state.filter;
  var mixed=state.filter==='*';
  toast('まとめ画像を作成中…');
  Promise.all([loadCoverMap(arr), fontsReady()])
    .then(function(rs){ buildSlides(ym, arr, rs[0], who, mixed); })
    .catch(function(){ buildSlides(ym, arr, {}, who, mixed); });
}
function buildSlides(ym, arr, coverMap, who, mixed){
  var PER=6;
  var bookPages=Math.ceil(arr.length/PER);
  var total=1+bookPages;
  var urls=[];
  var u1=renderSummaryPage(ym, arr, who, mixed, 1, total);
  if(u1) urls.push(u1);
  for(var p=0;p<bookPages;p++){
    var chunk=arr.slice(p*PER,(p+1)*PER);
    var u=renderBookPage(ym, chunk, coverMap, mixed, p+2, total);
    if(u) urls.push(u);
  }
  if(!urls.length){ toast('画像を作成できませんでした。'); return; }
  presentSlides(urls, ym);
}
function pageFooter(ctx, W, H, pageNo, total){
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillStyle=ISUB; ctx.font='24px '+MONO;
  ctx.fillText(pageNo+'/'+total, W/2, H-46);
  ctx.textAlign='left';
}
function renderSummaryPage(ym, arr, who, mixed, pageNo, total){
  var W=1080, H=1350, M=90;
  var cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  var ctx=cv.getContext('2d');
  ctx.fillStyle=IPAPER; ctx.fillRect(0,0,W,H);
  ctx.textBaseline='alphabetic';
  // header title
  ctx.fillStyle=IINK; ctx.font='600 46px '+DISP;
  ctx.fillText(ymLabel(ym)+' の読書log', M, 96);
  ctx.fillStyle=IACC; ctx.font='500 24px '+MONO;
  ctx.fillText(TAG, M, 138);
  // bento (ALLのまとめのみ「みんなで◯冊」)。桁数が増えても被らないよう段組み＋自動縮小
  if(mixed){
    var bw=282, bh=118, bx=W-M-bw, by=54, pad=24;
    ctx.fillStyle=IINK; roundRectPath(ctx,bx,by,bw,bh,26); ctx.fill();
    ctx.textAlign='left'; ctx.fillStyle=IPAPER;
    ctx.font='500 24px '+DISP;
    ctx.fillText('みんなで', bx+pad, by+42);
    var num=String(arr.length), unitFs=26;
    ctx.font='500 '+unitFs+'px '+DISP;
    var unitW=ctx.measureText('冊').width+8;
    var numFs=62, avail=bw-2*pad-unitW;
    ctx.font='600 '+numFs+'px '+DISP;
    while(numFs>28 && ctx.measureText(num).width>avail){ numFs-=2; ctx.font='600 '+numFs+'px '+DISP; }
    var numW=ctx.measureText(num).width, baseY=by+bh-24;
    ctx.fillText(num, bx+pad, baseY);
    ctx.font='500 '+unitFs+'px '+DISP;
    ctx.fillText('冊', bx+pad+numW+8, baseY);
  }
  // divider
  ctx.strokeStyle=ILINE; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(M,190); ctx.lineTo(W-M,190); ctx.stroke();
  // keyword grid
  ctx.textAlign='center'; ctx.fillStyle=IACC; ctx.font='500 24px '+MONO;
  try{ ctx.letterSpacing='4px'; }catch(e){}
  ctx.fillText('keyword', W/2, 244);
  try{ ctx.letterSpacing='0px'; }catch(e){}
  var kwItems=[];
  arr.forEach(function(b){ kwItems.push({t:b.note, ex:b.title}); kwItems.push({t:b.note, ex:b.title}); kwItems.push({t:b.desc||'', ex:b.title}); });
  var words=topWords(kwItems, 12).map(function(x){ return x.w; });
  var cols=4, colW=(W-2*M)/cols, rowY=[330,420,510];
  ctx.fillStyle=IINK;
  var maxW=colW-14;
  words.slice(0,12).forEach(function(w,i){
    var col=i%cols, row=Math.floor(i/cols);
    var cx=M+colW*col+colW/2, cy=rowY[row];
    var fs=40;
    ctx.font=fs+'px '+DISP;
    while(fs>24&&ctx.measureText(w).width>maxW){ fs-=2; ctx.font=fs+'px '+DISP; }
    var t=w;
    if(ctx.measureText(t).width>maxW){ while(t.length>1&&ctx.measureText(t+'…').width>maxW){ t=t.slice(0,-1); } t=t+'…'; }
    ctx.fillText(t, cx, cy);
  });
  ctx.font='40px '+DISP;
  ctx.textAlign='left';
  // divider
  ctx.strokeStyle=ILINE; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(M,610); ctx.lineTo(W-M,610); ctx.stroke();
  // past year bar chart
  ctx.fillStyle=IINK; ctx.font='600 34px '+DISP;
  ctx.fillText('過去1年の記録', M, 672);
  var months=last12(ym);
  var counts=months.map(function(mm){
    return state.books.filter(function(b){ return b.status!=='want'&&b.date.slice(0,7)===mm&&(state.filter==='*'||b.member===state.filter); }).length;
  });
  var maxC=Math.max.apply(null, counts.concat([1]));
  var chartTop=760, chartBot=1150, plot=chartBot-chartTop;
  var slot=(W-2*M)/12, barW=slot*0.5;
  months.forEach(function(mm,i){
    var h=Math.round(counts[i]/maxC*plot);
    if(counts[i]>0&&h<6) h=6;
    var x=M+slot*i+(slot-barW)/2, y=chartBot-h;
    ctx.fillStyle=(i===11)?IACC:IINK;
    roundRectPath(ctx,x,y,barW,h,6); ctx.fill();
  });
  ctx.strokeStyle=ILINE; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(M,chartBot); ctx.lineTo(W-M,chartBot); ctx.stroke();
  ctx.fillStyle=ISUB; ctx.font='22px '+MONO;
  ctx.textAlign='center';
  ctx.fillText(ymLabel(months[0]), M+slot*0.5+40, chartBot+40);
  ctx.fillStyle=IACC;
  ctx.fillText((+ym.slice(5,7))+'月', M+slot*11.5, chartBot+40);
  ctx.textAlign='left'; ctx.fillStyle=IINK;
  pageFooter(ctx, W, H, pageNo, total);
  try{ return cv.toDataURL('image/png'); }catch(e){ return null; }
}
function drawBookCard(ctx, b, cover, x, y, cw, mixed){
  var coverH=Math.round(cw*1.18);
  // cover
  ctx.save();
  roundRectPath(ctx,x,y,cw,coverH,16); ctx.clip();
  ctx.fillStyle='#ece9e2'; ctx.fillRect(x,y,cw,coverH);
  if(cover){
    var scale=Math.min(cw/cover.width,coverH/cover.height);
    var dw=cover.width*scale, dh=cover.height*scale;
    ctx.drawImage(cover, x+(cw-dw)/2, y+(coverH-dh)/2, dw, dh);
  }else{
    ctx.fillStyle='#b7b3a8'; ctx.textAlign='center'; ctx.font='500 22px '+MONO;
    ctx.fillText('NO', x+cw/2, y+coverH/2-6);
    ctx.fillText('IMAGE', x+cw/2, y+coverH/2+24);
    ctx.textAlign='left';
  }
  ctx.restore();
  ctx.strokeStyle=ILINE; ctx.lineWidth=1; roundRectPath(ctx,x+0.5,y+0.5,cw-1,coverH-1,16); ctx.stroke();
  var ty=y+coverH+34;
  if(b.genre){ ctx.fillStyle=ISUB; ctx.font='21px '+DISP; ctx.fillText(b.genre, x, ty); ty+=30; }
  ctx.fillStyle=IINK; ctx.font='600 27px '+DISP;
  var tl=wrapLines(ctx, '『'+b.title+'』', cw);
  if(tl.length>2){ tl=tl.slice(0,2); tl[1]=tl[1].slice(0,-1)+'…』'; }
  tl.forEach(function(l){ ctx.fillText(l, x, ty); ty+=34; });
  ty+=4;
  // member pill + date + stars
  var c=memCol(b.member);
  ctx.font='500 18px '+MONO;
  var pw=ctx.measureText(b.member).width+22, ph=26;
  ctx.fillStyle=c[0]; roundRectPath(ctx,x,ty-19,pw,ph,7); ctx.fill();
  ctx.fillStyle=c[1]; ctx.fillText(b.member, x+11, ty);
  var rx=x+pw+12;
  ctx.fillStyle=ISUB; ctx.font='20px '+MONO;
  ctx.fillText(md(b.date), rx, ty);
  rx+=ctx.measureText(md(b.date)).width+12;
  if(b.rating){ ctx.fillStyle=IACC; ctx.font='20px '+SANS; ctx.fillText('★★★★★'.slice(0,b.rating), rx, ty); }
  ty+=34;
  if(b.note){
    ctx.fillStyle=ISUB; ctx.font='21px '+DISP;
    var nl=wrapLines(ctx, b.note, cw);
    if(nl.length>2){ nl=nl.slice(0,2); nl[1]=nl[1].slice(0,-1)+'…'; }
    nl.forEach(function(l){ ctx.fillText(l, x, ty); ty+=28; });
  }
}
function renderBookPage(ym, books, coverMap, mixed, pageNo, total){
  var W=1080, H=1350, M=70;
  var cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  var ctx=cv.getContext('2d');
  ctx.fillStyle=IPAPER; ctx.fillRect(0,0,W,H);
  ctx.textBaseline='alphabetic';
  ctx.fillStyle=IINK; ctx.font='600 44px '+DISP;
  ctx.fillText(ymLabel(ym)+' の読書log', M, 100);
  var gap=28, cols=3, cw=Math.floor((W-2*M-gap*(cols-1))/cols);
  var rowH=545, top=150;
  books.forEach(function(b,i){
    var col=i%cols, row=Math.floor(i/cols);
    var x=M+col*(cw+gap), y=top+row*rowH;
    drawBookCard(ctx, b, coverMap[b.id]||null, x, y, cw, mixed);
  });
  pageFooter(ctx, W, H, pageNo, total);
  try{ return cv.toDataURL('image/png'); }catch(e){ return null; }
}
function presentSlides(urls, ym){
  $('shot').style.display='none';
  var wrap=$('shotswrap'), box=$('shots');
  wrap.style.display='block';
  wrap.classList.toggle('multi', urls.length>1);
  box.innerHTML=urls.map(function(u,i){ return '<img src="'+u+'" alt="まとめ '+(i+1)+'枚目">'; }).join('');
  $('shotdots').innerHTML=urls.map(function(u,i){ return '<span class="shotdot'+(i===0?' on':'')+'"></span>'; }).join('');
  function idx(){ return Math.round(box.scrollLeft/box.clientWidth); }
  function sync(){
    var n=idx();
    var dots=$('shotdots').children;
    for(var k=0;k<dots.length;k++){ dots[k].classList.toggle('on', k===n); }
  }
  box.onscroll=sync;
  $('shotprev').onclick=function(){ box.scrollTo({left:(idx()-1)*box.clientWidth, behavior:'smooth'}); };
  $('shotnext').onclick=function(){ box.scrollTo({left:(idx()+1)*box.clientWidth, behavior:'smooth'}); };
  $('txtcopy').hidden=true; $('share').hidden=true;
  $('hint').textContent=urls.length>1?('‹ ›で切り替え・スマホは各画像を長押しで保存できます。（全'+urls.length+'枚）'):'スマホは画像を長押しで保存できます。';
  var dl=$('dl');
  dl.textContent=urls.length>1?('画像を保存（'+urls.length+'枚）'):'画像を保存';
  dl.onclick=function(){
    urls.forEach(function(u,i){
      setTimeout(function(){
        var a=document.createElement('a'); a.href=u; a.download='dokusho-'+ym+'-'+(i+1)+'.png'; a.click();
      }, i*450);
    });
  };
  $('overlay').classList.add('on');
  $('sheet').scrollTop=0;
  requestAnimationFrame(function(){ box.scrollLeft=0; sync(); });
  setTimeout(function(){ box.scrollLeft=0; sync(); }, 60);
}
function presentImage(url, fname, book){
  $('sheet').scrollTop=0;
  $('shotswrap').style.display='none'; $('shots').innerHTML='';
  $('shot').style.display='block';
  $('hint').textContent='スマホは画像を長押し→「写真に保存」または「コピー」で、そのままMisskeyに貼れます。';
  $('dl').textContent='画像を保存';
  $('shot').src=url;
  $('overlay').classList.add('on');
  var tc=$('txtcopy');
  tc.hidden=!book;
  if(book){ tc.onclick=function(){ copyText(makePostText(book)); }; }
  $('dl').onclick=function(){
    var a=document.createElement('a');
    a.href=url; a.download=fname; a.click();
  };
  var sh=$('share');
  sh.hidden=true;
  if(navigator.canShare&&window.fetch){
    fetch(url).then(function(r){ return r.blob(); }).then(function(bl){
      var f=new File([bl],fname,{type:'image/png'});
      if(navigator.canShare({files:[f]})){
        sh.hidden=false;
        sh.onclick=function(){ navigator.share({files:[f], text:TAG}).catch(function(){}); };
      }
    }).catch(function(){});
  }
}
function wrapLines(ctx, text, maxW){
  var lines=[], cur='';
  for(var i=0;i<text.length;i++){
    var t=cur+text[i];
    if(ctx.measureText(t).width>maxW && cur){ lines.push(cur); cur=text[i]; }
    else cur=t;
  }
  if(cur) lines.push(cur);
  return lines;
}
function makeBookImage(id){
  var b=state.books.find(function(x){ return String(x.id)===String(id); });
  if(!b) return;
  Promise.all([loadCovers(b.cover?[b.cover]:[]), fontsReady()])
    .then(function(rs){ renderBookImage(b, rs[0][0]||null); });
}
function renderBookImage(b, cover){
  var W=1080, H=1080, M=90;
  var cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  var ctx=cv.getContext('2d');
  ctx.fillStyle=IPAPER; ctx.fillRect(0,0,W,H);
  ctx.textBaseline='alphabetic';
  ctx.fillStyle=ISUB;
  ctx.font='24px '+MONO;
  try{ ctx.letterSpacing='10px'; }catch(e){}
  ctx.fillText('DOKUSHO LOG', M, 116);
  try{ ctx.letterSpacing='0px'; }catch(e){}
  ctx.textAlign='right';
  ctx.font='26px '+MONO;
  if(b.status==='want'){
    ctx.fillStyle=IACC;
    ctx.fillText('積読', W-M, 116);
    ctx.fillStyle=ISUB;
  }else{
    var dp=b.date.split('-');
    ctx.fillText((+dp[0])+'.'+(+dp[1])+'.'+(+dp[2])+' 読了', W-M, 116);
  }
  ctx.textAlign='center';
  var y;
  if(cover){
    var maxS=460;
    var chh=maxS, cww=Math.round(chh*cover.width/cover.height);
    if(cww>maxS){ cww=maxS; chh=Math.round(cww*cover.height/cover.width); }
    var cx=(W-cww)/2, cy=170+(maxS-chh)/2;
    ctx.drawImage(cover, cx, cy, cww, chh);
    ctx.strokeStyle=ILINE; ctx.lineWidth=1;
    ctx.strokeRect(cx+0.5, cy+0.5, cww-1, chh-1);
    y=710;
  }else{
    ctx.font='600 60px '+DISP;
    var estT=wrapLines(ctx, '『'+b.title+'』', W-2*M).slice(0,3);
    var blockH=estT.length*88+(b.author?50:0)+(b.rating?52:0);
    if(b.note){
      ctx.font='44px '+DISP;
      blockH+=70+Math.min(3, wrapLines(ctx, '「'+b.note+'」', W-2*M).length)*70;
    }
    y=Math.max(280, 620-Math.round(blockH/2));
  }
  var tfs=cover?46:60, tlh=cover?68:88, tmax=cover?2:3;
  ctx.fillStyle=IINK;
  ctx.font='600 '+tfs+'px '+DISP;
  var tl=wrapLines(ctx, '『'+b.title+'』', W-2*M);
  if(tl.length>tmax){ tl=tl.slice(0,tmax); tl[tmax-1]=tl[tmax-1].slice(0,-1)+'…』'; }
  tl.forEach(function(l){ ctx.fillText(l, W/2, y); y+=tlh; });
  if(b.author){
    ctx.fillStyle=ISUB;
    ctx.font='27px '+DISP;
    y+=6;
    ctx.fillText(b.author, W/2, y);
    y+=44;
  }
  if(b.rating){
    var sf='★★★★★'.slice(0,b.rating), se='☆☆☆☆☆'.slice(0,5-b.rating);
    ctx.font='34px '+SANS;
    var w1=ctx.measureText(sf).width, w2=ctx.measureText(se).width;
    var sx0=(W-(w1+w2))/2;
    ctx.textAlign='left';
    ctx.fillStyle=IACC;
    ctx.fillText(sf, sx0, y+6);
    ctx.fillStyle='#d8d5cb';
    ctx.fillText(se, sx0+w1, y+6);
    ctx.textAlign='center';
    y+=52;
  }
  if(b.note){
    ctx.fillStyle=IINK;
    var nfs=cover?38:44, nlh=cover?60:70;
    ctx.font=nfs+'px '+DISP;
    var nl=wrapLines(ctx, '「'+b.note+'」', W-2*M);
    if(nl.length>3){ nl=nl.slice(0,3); nl[2]=nl[2].slice(0,-1)+'…」'; }
    y+=cover?46:70;
    nl.forEach(function(l){
      if(y>960) return;
      ctx.fillText(l, W/2, y); y+=nlh;
    });
  }
  ctx.textAlign='left';
  ctx.fillStyle=IACC;
  ctx.font='500 28px '+MONO;
  ctx.fillText(TAG, M, 1010);
  ctx.fillStyle=ISUB;
  ctx.font='26px '+DISP;
  ctx.textAlign='right';
  ctx.fillText(b.member||'読書log', W-M, 1010);
  ctx.textAlign='left';
  var url;
  try{ url=cv.toDataURL('image/png'); }
  catch(e){ if(cover){ renderBookImage(b, null); } return; }
  presentImage(url, 'dokusho-'+b.date+'.png', b);
}
$('close').addEventListener('click', function(){ $('overlay').classList.remove('on'); });
$('overlay').addEventListener('click', function(e){ if(e.target===$('overlay')) $('overlay').classList.remove('on'); });

state.me=lsGet('yonda-me')||'';
try{
  var cache=JSON.parse(lsGet('yonda-cache-v1'));
  if(cache){ state.members=cache.members||[]; state.books=(cache.books||[]).map(normBook); }
}catch(e){}
render();
loadAll()
  .then(function(){
    render();
    if(!state.me){ if(!lsGet('yonda-guest')) openPick(); }
    else if(state.members.indexOf(state.me)<0){ state.me=''; lsSet('yonda-me',''); openPick(); }
    else{ checkMigrate(); }
  })
  .catch(function(){ netFail(); });
})();
